  <text x="480" y="355" class="section-label">GKE Cluster (Standard mode) — n2-standard-4 (4 vCPU / 16 GB) — 3 to 25 nodes — GKE CA + KEDA v2.x</text>

  <!-- NGINX GKE -->
  <rect x="480" y="370" width="210" height="72" rx="6" fill="#dae8fc" stroke="#1565c0" stroke-width="1.5"/>
  <text x="585" y="393" class="box-label-top">NGINX Ingress v4.15.1</text>
  <text x="585" y="409" class="note">GCP ILB-backed (private)</text>
