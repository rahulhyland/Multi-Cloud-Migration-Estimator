<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="380" viewBox="0 0 1460 380" style="background:#ffffff;font-family:Arial,sans-serif;">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="730" y="38" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">HxTS — GCP Target Architecture</text>

  <!-- 1. Clients / HxP Services -->
  <rect x="40" y="120" width="180" height="60" rx="6" ry="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="130" y="147" font-size="12" text-anchor="middle" fill="#000000">Clients /</text>
  <text x="130" y="163" font-size="12" text-anchor="middle" fill="#000000">HxP Services</text>

  <!-- 2. Cloud DNS + HTTPS LB + Cloud Armor -->
  <rect x="270" y="110" width="300" height="80" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="420" y="143" font-size="11" text-anchor="middle" fill="#000000">Cloud DNS + HTTPS LB</text>
  <text x="420" y="159" font-size="11" text-anchor="middle" fill="#000000">+ Cloud Armor</text>
  <text x="420" y="175" font-size="10" text-anchor="middle" fill="#555555">TLS via Certificate Manager</text>

  <!-- 3. GKE -->
  <rect x="620" y="90" width="260" height="120" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="750" y="143" font-size="12" text-anchor="middle" fill="#000000">GKE (Router, Rest, Engines)</text>
  <text x="750" y="161" font-size="11" text-anchor="middle" fill="#000000">KEDA + Cluster Autoscaler</text>

  <!-- 4. Pub/Sub -->
  <rect x="930" y="100" width="230" height="80" rx="6" ry="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="1045" y="133" font-size="12" text-anchor="middle" fill="#000000">Pub/Sub</text>
  <text x="1045" y="149" font-size="10" text-anchor="middle" fill="#000000">Topics + Subscriptions</text>
  <text x="1045" y="165" font-size="10" text-anchor="middle" fill="#555555">(+ Cloud Tasks)</text>

  <!-- 5. Filestore / GCS -->
  <rect x="1210" y="110" width="210" height="70" rx="6" ry="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1315" y="142" font-size="12" text-anchor="middle" fill="#000000">Filestore / GCS</text>
  <text x="1315" y="158" font-size="10" text-anchor="middle" fill="#000000">CMEK + Backup</text>

  <!-- 6. Cloud Operations + Datadog -->
  <rect x="620" y="265" width="250" height="60" rx="6" ry="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="745" y="292" font-size="12" text-anchor="middle" fill="#000000">Cloud Operations</text>
  <text x="745" y="308" font-size="10" text-anchor="middle" fill="#000000">+ Datadog</text>

  <!-- Arrows -->
  <!-- Clients → Edge -->
  <line x1="220" y1="150" x2="268" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Edge → GKE -->
  <line x1="570" y1="150" x2="618" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- GKE → Pub/Sub -->
  <line x1="880" y1="135" x2="928" y2="135" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- GKE → Filestore/GCS -->
  <line x1="880" y1="155" x2="1208" y2="148" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- GKE → Cloud Ops -->
  <line x1="750" y1="210" x2="745" y2="263" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Embedded mxGraphModel for draw.io editing -->
  <mxGraphModel dx="1600" dy="900" grid="1" gridSize="10">
    <root>
      <mxCell id="0"/>
      <mxCell id="1" parent="0"/>
      <mxCell id="42" value="Clients / HxP Services" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#dae8fc;strokeColor=#6c8ebf;" vertex="1" parent="1"><mxGeometry x="40" y="120" width="180" height="60" as="geometry"/></mxCell>
      <mxCell id="43" value="Cloud DNS + HTTPS LB + Cloud Armor&#xa;TLS via Certificate Manager" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#fff2cc;strokeColor=#d6b656;" vertex="1" parent="1"><mxGeometry x="270" y="110" width="300" height="80" as="geometry"/></mxCell>
      <mxCell id="44" value="GKE (Router, Rest, Engines)&#xa;KEDA + Cluster Autoscaler" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;" vertex="1" parent="1"><mxGeometry x="620" y="90" width="260" height="120" as="geometry"/></mxCell>
      <mxCell id="45" value="Pub/Sub Topics + Subscriptions&#xa;(+ Cloud Tasks for point queues)" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;" vertex="1" parent="1"><mxGeometry x="930" y="100" width="230" height="80" as="geometry"/></mxCell>
      <mxCell id="46" value="Filestore / GCS&#xa;CMEK + Backup" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#e1d5e7;strokeColor=#9673a6;" vertex="1" parent="1"><mxGeometry x="1210" y="110" width="210" height="70" as="geometry"/></mxCell>
      <mxCell id="47" value="Cloud Operations + Datadog" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ffe6cc;strokeColor=#d79b00;" vertex="1" parent="1"><mxGeometry x="620" y="265" width="250" height="60" as="geometry"/></mxCell>
      <mxCell id="48" style="endArrow=classic;html=1;" edge="1" parent="1" source="42" target="43"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="49" style="endArrow=classic;html=1;" edge="1" parent="1" source="43" target="44"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="50" style="endArrow=classic;html=1;" edge="1" parent="1" source="44" target="45"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="51" style="endArrow=classic;html=1;" edge="1" parent="1" source="44" target="46"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="52" style="endArrow=classic;html=1;" edge="1" parent="1" source="44" target="47"><mxGeometry relative="1" as="geometry"/></mxCell>
    </root>
  </mxGraphModel>
</svg>
