  <!-- cert-manager cluster -->
  <rect x="480" y="540" width="210" height="58" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="585" y="562" class="box-label-top">cert-manager v1.20.0</text>
  <text x="585" y="579" class="note">GCP DNS01 · Workload Identity</text>

  <!-- Datadog -->
  <rect x="480" y="613" width="210" height="58" rx="6" fill="#e1d5e7" stroke="#7b1fa2" stroke-width="1.5"/>
  <text x="585" y="636" class="box-label-top">Datadog Agent v3.193.0</text>
  <text x="585" y="653" class="note">APM · JVM · SLO (unchanged)</text>

  <!-- Velero -->
  <rect x="480" y="686" width="210" height="58" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="585" y="708" class="box-label-top">Velero v12.0.0</text>
  <text x="585" y="725" class="note">→ GCS cross-region · Workload Id</text>

  <!-- GCP Workload Identity -->
  <rect x="480" y="758" width="210" height="58" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="585" y="780" class="box-label-top">GCP Workload Identity</text>
  <text x="585" y="797" class="note">+ Secret Manager CSI Driver</text>

