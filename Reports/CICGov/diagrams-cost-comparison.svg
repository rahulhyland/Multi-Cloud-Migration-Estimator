<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 540" width="1000" height="540" style="background:#fff;">
  <defs></defs>
  <rect x="0" y="0" width="1000" height="540" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="500" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#212529">Regional 30-Day Cost Comparison — AWS vs Azure vs GCP (USD)</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#6c757d">Directional estimates. Bold = primary deployment region. All costs in USD.</text>

  <!-- Y axis -->
  <line x1="80" y1="65" x2="80" y2="450" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="80" y1="450" x2="960" y2="450" stroke="#adb5bd" stroke-width="1.5"/>

  <!-- Y grid + labels: max $700 -->
  <text x="74" y="454" text-anchor="end" font-size="10" fill="#495057">$0</text>
  <text x="74" y="398" text-anchor="end" font-size="10" fill="#495057">$100</text>
  <text x="74" y="342" text-anchor="end" font-size="10" fill="#495057">$200</text>
  <text x="74" y="285" text-anchor="end" font-size="10" fill="#495057">$300</text>
  <text x="74" y="229" text-anchor="end" font-size="10" fill="#495057">$400</text>
  <text x="74" y="173" text-anchor="end" font-size="10" fill="#495057">$500</text>
  <text x="74" y="117" text-anchor="end" font-size="10" fill="#495057">$600</text>
  <text x="74" y="65" text-anchor="end" font-size="10" fill="#495057">$700</text>
  <line x1="80" y1="398" x2="960" y2="398" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="342" x2="960" y2="342" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="285" x2="960" y2="285" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="229" x2="960" y2="229" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="173" x2="960" y2="173" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="80" y1="117" x2="960" y2="117" stroke="#e9ecef" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Scale: 700 units = 385px → 1 unit = 0.55px; baseline y=450 -->
  <!-- Group 1: US -->
  <!-- AWS US=$589: 450-(589*0.55)=450-323.9=126 h=324 -->
  <rect x="105" y="126" width="40" height="324" fill="#ff9900" opacity="0.9"/>
  <text x="125" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#e65100">$589</text>
  <!-- Azure US=$484: 450-(484*0.55)=450-266.2=184 h=266 -->
  <rect x="150" y="184" width="40" height="266" fill="#0078d4" opacity="0.9"/>
  <text x="170" y="178" text-anchor="middle" font-size="9" font-weight="bold" fill="#0050a0">$484</text>
  <!-- GCP US=$350: 450-(350*0.55)=450-192.5=258 h=192 -->
  <rect x="195" y="258" width="40" height="192" fill="#34a853" opacity="0.9"/>
  <text x="215" y="252" text-anchor="middle" font-size="9" font-weight="bold" fill="#1b5e20">$350</text>
  <text x="170" y="468" text-anchor="middle" font-size="10" font-weight="bold" fill="#212529">US</text>
  <text x="170" y="480" text-anchor="middle" font-size="9" fill="#6c757d">(primary)</text>

  <!-- Group 2: EU -->
  <!-- AWS EU=$636: 450-(636*0.55)=450-349.8=100 h=350 -->
  <rect x="300" y="100" width="40" height="350" fill="#ff9900" opacity="0.75"/>
  <text x="320" y="94" text-anchor="middle" font-size="9" fill="#e65100">$636</text>
  <!-- Azure EU=$523: 450-(523*0.55)=450-287.65=162 h=288 -->
  <rect x="345" y="162" width="40" height="288" fill="#0078d4" opacity="0.75"/>
  <text x="365" y="156" text-anchor="middle" font-size="9" fill="#0050a0">$523</text>
  <!-- GCP EU=$378: 450-(378*0.55)=450-207.9=242 h=208 -->
  <rect x="390" y="242" width="40" height="208" fill="#34a853" opacity="0.75"/>
  <text x="410" y="236" text-anchor="middle" font-size="9" fill="#1b5e20">$378</text>
  <text x="365" y="468" text-anchor="middle" font-size="10" fill="#212529">EU</text>
  <text x="365" y="480" text-anchor="middle" font-size="9" fill="#6c757d">(not yet deployed)</text>

  <!-- Group 3: AU -->
  <!-- AWS AU=$678: 450-(678*0.55)=450-372.9=77 h=373 -->
  <rect x="495" y="77" width="40" height="373" fill="#ff9900" opacity="0.75"/>
  <text x="515" y="71" text-anchor="middle" font-size="9" fill="#e65100">$678</text>
  <!-- Azure AU=$558: 450-(558*0.55)=450-306.9=143 h=307 -->
  <rect x="540" y="143" width="40" height="307" fill="#0078d4" opacity="0.75"/>
  <text x="560" y="137" text-anchor="middle" font-size="9" fill="#0050a0">$558</text>
  <!-- GCP AU=$402: 450-(402*0.55)=450-221.1=229 h=221 -->
  <rect x="585" y="229" width="40" height="221" fill="#34a853" opacity="0.75"/>
  <text x="605" y="223" text-anchor="middle" font-size="9" fill="#1b5e20">$402</text>
  <text x="560" y="468" text-anchor="middle" font-size="10" fill="#212529">AU</text>
  <text x="560" y="480" text-anchor="middle" font-size="9" fill="#6c757d">(prod-au deployed)</text>

  <!-- Delta annotations -->
  <rect x="700" y="80" width="260" height="155" rx="6" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
  <text x="830" y="98" text-anchor="middle" font-size="11" font-weight="bold" fill="#212529">Cost Delta vs AWS (US)</text>
  <text x="710" y="118" font-size="10" fill="#0078d4">Azure US: $484 → -17.8% vs AWS</text>
  <text x="710" y="134" font-size="10" fill="#34a853">GCP US: $350 → -40.6% vs AWS</text>
  <text x="710" y="155" font-size="10" fill="#0078d4">Azure EU: $523 → -17.8% vs AWS EU</text>
  <text x="710" y="171" font-size="10" fill="#34a853">GCP EU: $378 → -40.6% vs AWS EU</text>
  <text x="710" y="192" font-size="10" fill="#0078d4">Azure AU: $558 → -17.7% vs AWS AU</text>
  <text x="710" y="208" font-size="10" fill="#34a853">GCP AU: $402 → -40.7% vs AWS AU</text>
  <text x="710" y="226" font-size="9" fill="#6c757d">GCP advantage: free Pub/Sub + Logging tiers</text>

  <!-- Legend -->
  <rect x="180" y="498" width="14" height="12" fill="#ff9900"/>
  <text x="198" y="509" font-size="11" fill="#212529">AWS</text>
  <rect x="280" y="498" width="14" height="12" fill="#0078d4"/>
  <text x="298" y="509" font-size="11" fill="#212529">Azure</text>
  <rect x="370" y="498" width="14" height="12" fill="#34a853"/>
  <text x="388" y="509" font-size="11" fill="#212529">GCP</text>
  <text x="550" y="509" font-size="10" fill="#6c757d">* Faded bars = not yet in production. All estimates directional.</text>
</svg>
