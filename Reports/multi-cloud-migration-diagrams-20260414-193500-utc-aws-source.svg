  <path d="M1265 363 L1140 312" class="carrow"/>
  <path d="M1580 203 L1580 255" class="carrow"/>
  <path d="M1170 312 L1390 363" class="carrow"/>
  <path d="M990 360 L1390 456" class="arrow"/>

  <text x="46" y="655" class="text" style="font-size:10px;text-anchor:start">Legend: Cyan arrows = request/data flow, Amber dashed = control/scaling/security/observability flow</text>
</svg>
