  <!-- GKE CA + KEDA -->
  <rect x="480" y="456" width="210" height="70" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="585" y="478" class="box-label-top">GKE Cluster Autoscaler</text>
  <text x="585" y="496" class="note">+ KEDA v2.x (event-driven HPA)</text>
