  <rect class="node" x="620" y="230" width="120" height="36"/><text class="txt small" x="635" y="253">imagemagick</text>
  <rect class="node" x="750" y="230" width="105" height="36"/><text class="txt small" x="768" y="253">libreoffice</text>
