<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1820 700" width="1820" height="700">
  <defs>
    <style>
      .box{fill:#dae8fc;stroke:#6c8ebf;stroke-width:2}.edge{fill:#fff2cc;stroke:#d6b656;stroke-width:2}.k8s{fill:#d5e8d4;stroke:#82b366;stroke-width:2}.sec{fill:#f8cecc;stroke:#b85450;stroke-width:2}.ops{fill:#ffe6cc;stroke:#d79b00;stroke-width:2}.zone{fill:#f5f5f5;stroke:#666;stroke-width:2;stroke-dasharray:6 6}
      .text{font-family:Arial,sans-serif;font-size:12px;text-anchor:middle;fill:#111827;stroke:#fff;stroke-width:.75;paint-order:stroke}
      .arrow{stroke:#00e5ff;stroke-width:2.4;fill:none;marker-end:url(#ah);filter:url(#glow)}.carrow{stroke:#ffd166;stroke-width:2.2;fill:none;stroke-dasharray:6 4;marker-end:url(#ahc);filter:url(#glow)}
