  <!-- Pods → Atlas -->
  <path d="M1580,432 C1660,432 1690,484 1690,484" fill="none" stroke="#9900cc" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>
  <!-- Datadog Agent → Datadog SaaS -->
  <line x1="690" y1="642" x2="1690" y2="1030" stroke="#9673a6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <!-- Velero → GCS -->
  <path d="M585,744 C585,1100 710,1100 710,1183" fill="none" stroke="#aa6600" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arrow-orange)"/>
  <!-- GCP SCC → Cloud Functions -->
  <line x1="1795" y1="770" x2="400" y2="497" stroke="#cc0000" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>

  <!-- Legend -->
  <rect x="40" y="1215" width="1200" height="250" rx="6" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="1242" class="section-label">Legend — GCP Target Architecture</text>
  <line x1="70" y1="1268" x2="130" y2="1268" stroke="#0066cc" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="140" y="1272" class="box-label" style="text-anchor:start">Request flow: Clients → Cloud DNS → HTTPS LB + Cloud Armor → NGINX Ingress → HXPR Pods</text>
  <line x1="70" y1="1298" x2="130" y2="1298" stroke="#ff6600" stroke-width="2" stroke-dasharray="7,3" marker-end="url(#arrow-orange)"/>
  <text x="140" y="1302" class="box-label" style="text-anchor:start">Messaging flow: Pods → GCP Cloud Pub/Sub (SDK: pubsub-java) · $0.04/M msgs (10× AWS SQS)</text>
  <line x1="70" y1="1328" x2="130" y2="1328" stroke="#009900" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="140" y="1332" class="box-label" style="text-anchor:start">Search flow: Pods → OpenSearch 2.11 self-hosted on GKE (n1-highmem-2 × 12)</text>
  <line x1="70" y1="1358" x2="130" y2="1358" stroke="#9900cc" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>
  <text x="140" y="1362" class="box-label" style="text-anchor:start">Database flow: Pods → MongoDB Atlas M40 (GCP-backed, Private Service Connect)</text>
  <line x1="70" y1="1388" x2="130" y2="1388" stroke="#cc0000" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="140" y="1392" class="box-label" style="text-anchor:start">Security flow: GCP SCC + Cloud DLP → Cloud Functions (Python 3.10, malware quarantine)</text>
  <line x1="70" y1="1418" x2="130" y2="1418" stroke="#9673a6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-purple)"/>
  <text x="140" y="1422" class="box-label" style="text-anchor:start">Observability: Datadog Agent → Datadog SaaS (cloud-agnostic, no change)</text>
  <text x="140" y="1452" class="note" style="text-anchor:start">Cost delta vs AWS: −4.3% (US) · −4.1% (EU) · −2.7% (AU) at on-demand pricing · GCP sustained-use discount applies automatically</text>
