<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-label="AWS source architecture diagram">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .panel { fill: #121a2b; stroke: #4cc9f0; stroke-width: 2; rx: 10; }
      .node { fill: #1b2640; stroke: #8ad7ff; stroke-width: 1.8; rx: 8; }
      .sec { fill: #2a1f3d; stroke: #ff85c2; stroke-width: 1.8; rx: 8; }
      .msg { fill: #203a2a; stroke: #76ff9f; stroke-width: 1.8; rx: 8; }
      .obs { fill: #3b2a1b; stroke: #ffd166; stroke-width: 1.8; rx: 8; }
      .txt { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; font-size: 14px; fill: #f5fbff; paint-order: stroke; stroke: #06101d; stroke-width: 1px; }
      .small { font-size: 12px; }
      .title { font-size: 20px; font-weight: 700; }
      .arrowA { stroke: #55f4ff; stroke-width: 3; fill: none; marker-end: url(#ahA); filter: url(#glowA); }
      .arrowB { stroke: #ff9de0; stroke-width: 3; fill: none; marker-end: url(#ahB); filter: url(#glowB); }
      .arrowC { stroke: #9cffb3; stroke-width: 3; fill: none; marker-end: url(#ahC); filter: url(#glowC); }
      .arrowD { stroke: #ffd36b; stroke-width: 3; fill: none; marker-end: url(#ahD); filter: url(#glowD); }
    </style>
    <filter id="glowA"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowB"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowC"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowD"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="ahA" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#55f4ff"/></marker>
    <marker id="ahB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#ff9de0"/></marker>
    <marker id="ahC" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#9cffb3"/></marker>
    <marker id="ahD" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#ffd36b"/></marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="980"/>
  <text class="txt title" x="36" y="42">AWS Source Architecture (From IaC)</text>

  <rect class="panel" x="30" y="70" width="420" height="200"/>
  <text class="txt" x="48" y="98">Clients and Edge</text>
  <rect class="node" x="50" y="115" width="160" height="42"/><text class="txt small" x="62" y="141">Clients / Upstream Apps</text>
  <rect class="node" x="230" y="115" width="190" height="42"/><text class="txt small" x="244" y="141">DNS / Domain (Route53)</text>
  <rect class="node" x="50" y="175" width="180" height="42"/><text class="txt small" x="64" y="201">Ingress ALB/NLB</text>
  <rect class="sec" x="250" y="175" width="170" height="42"/><text class="txt small" x="260" y="201">WAFv2 + Logging</text>

  <rect class="panel" x="470" y="70" width="640" height="500"/>
  <text class="txt" x="490" y="98">EKS Cluster Boundary (m5.xlarge node group)</text>
  <rect class="node" x="495" y="120" width="130" height="40"/><text class="txt small" x="520" y="145">REST Pod</text>
  <rect class="node" x="640" y="120" width="130" height="40"/><text class="txt small" x="666" y="145">Router Pod</text>
  <rect class="node" x="785" y="120" width="140" height="40"/><text class="txt small" x="806" y="145">KEDA</text>
  <rect class="sec" x="940" y="120" width="150" height="40"/><text class="txt small" x="952" y="145">Network Policies</text>

  <rect class="panel" x="495" y="185" width="595" height="165"/>
  <text class="txt small" x="510" y="208">Engine Group</text>
  <rect class="node" x="510" y="220" width="90" height="36"/><text class="txt small" x="536" y="243">tika</text>
  <rect class="node" x="610" y="220" width="120" height="36"/><text class="txt small" x="623" y="243">imagemagick</text>
  <rect class="node" x="740" y="220" width="100" height="36"/><text class="txt small" x="757" y="243">libreoffice</text>
  <rect class="node" x="850" y="220" width="90" height="36"/><text class="txt small" x="876" y="243">misc</text>
  <rect class="node" x="950" y="220" width="120" height="36"/><text class="txt small" x="968" y="243">docfilters</text>
  <rect class="node" x="510" y="268" width="120" height="36"/><text class="txt small" x="534" y="291">docmerge</text>
  <rect class="node" x="640" y="268" width="90" height="36"/><text class="txt small" x="671" y="291">aio</text>
  <rect class="sec" x="740" y="268" width="170" height="36"/><text class="txt small" x="758" y="291">Kubernetes Secrets</text>

  <rect class="panel" x="470" y="590" width="640" height="210"/>
  <text class="txt" x="490" y="618">Messaging and Security Services</text>
  <rect class="msg" x="500" y="635" width="130" height="40"/><text class="txt small" x="545" y="660">SQS</text>
  <rect class="msg" x="645" y="635" width="130" height="40"/><text class="txt small" x="690" y="660">SNS</text>
  <rect class="sec" x="790" y="635" width="130" height="40"/><text class="txt small" x="836" y="660">KMS</text>
  <rect class="sec" x="935" y="635" width="150" height="40"/><text class="txt small" x="958" y="660">Secrets Manager</text>
  <rect class="node" x="500" y="695" width="170" height="40"/><text class="txt small" x="525" y="720">VPC Endpoint Service</text>
  <rect class="node" x="685" y="695" width="170" height="40"/><text class="txt small" x="730" y="720">EFS (elastic)</text>
  <rect class="node" x="870" y="695" width="210" height="40"/><text class="txt small" x="900" y="720">S3 Velero Backup (STANDARD)</text>

  <rect class="panel" x="1130" y="70" width="340" height="730"/>
  <text class="txt" x="1150" y="98">Operations and Network</text>
  <rect class="obs" x="1160" y="120" width="280" height="44"/><text class="txt small" x="1260" y="147">Datadog</text>
  <rect class="obs" x="1160" y="180" width="280" height="44"/><text class="txt small" x="1235" y="207">CloudWatch Logs</text>
  <rect class="node" x="1160" y="240" width="280" height="72"/><text class="txt small" x="1178" y="270">VPC + Subnets</text><text class="txt small" x="1178" y="290">Public/Private Segments</text>
  <rect class="node" x="1160" y="330" width="280" height="44"/><text class="txt small" x="1210" y="357">Route53 Records</text>
  <rect class="node" x="1160" y="390" width="280" height="44"/><text class="txt small" x="1215" y="417">Security Groups</text>
  <rect class="sec" x="1160" y="450" width="280" height="44"/><text class="txt small" x="1190" y="477">Not found in IaC: AWS Shield</text>

  <path class="arrowA" d="M210 136 L230 136"/>
  <path class="arrowA" d="M140 157 L140 175"/>
  <path class="arrowA" d="M230 196 L495 140"/>
  <path class="arrowB" d="M420 196 L250 196"/>
  <path class="arrowA" d="M625 140 L640 140"/>
  <path class="arrowA" d="M770 140 L785 140"/>
  <path class="arrowC" d="M705 160 L705 220"/>
  <path class="arrowC" d="M560 160 L560 220"/>
  <path class="arrowC" d="M705 160 L1010 220"/>
  <path class="arrowD" d="M855 140 L855 635"/>
  <path class="arrowD" d="M560 304 L560 635"/>
  <path class="arrowD" d="M700 304 L710 635"/>
  <path class="arrowB" d="M825 304 L790 635"/>
  <path class="arrowB" d="M960 304 L935 635"/>
  <path class="arrowA" d="M1085 655 L1160 200"/>
  <path class="arrowA" d="M1070 715 L1160 262"/>
</svg>
