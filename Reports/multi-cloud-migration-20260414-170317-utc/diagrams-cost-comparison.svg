<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Regional cost comparison chart: Azure vs GCP by capability and region">
  <defs>
    <style>
      .bg{fill:#0d1726}.T{font-family:'IBM Plex Sans','Segoe UI',sans-serif;fill:#ddf0ff;paint-order:stroke;stroke:#060f1e;stroke-width:0.8px}
      .axis{stroke:#3a5a80;stroke-width:1.5}.grid{stroke:#1f3254;stroke-width:1}
      .azure{fill:#33c3ff}.gcp{fill:#7dff9f}.aws{fill:#ff9f43}
      .label{font-size:12px}.title{font-size:20px;font-weight:700}.legend{font-size:13px}
      .cat{font-size:11px;fill:#a8d8ff}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="T title" x="600" y="44" text-anchor="middle">Regional Cost Comparison (USD/month) — AWS Baseline vs Azure vs GCP</text>
  <text class="T legend" x="940" y="88" text-anchor="middle">Legend</text>
  <rect class="aws" x="870" y="96" width="20" height="14"/><text class="T label" x="898" y="108">AWS (baseline)</text>
  <rect class="azure" x="870" y="116" width="20" height="14"/><text class="T label" x="898" y="128">Azure</text>
  <rect class="gcp" x="870" y="136" width="20" height="14"/><text class="T label" x="898" y="148">GCP</text>

  <!-- Y axis labels (USD) -->
  <text class="T label" x="62" y="608" text-anchor="end">0</text>
  <text class="T label" x="62" y="508" text-anchor="end">500</text>
  <text class="T label" x="62" y="408" text-anchor="end">1 000</text>
  <text class="T label" x="62" y="308" text-anchor="end">1 500</text>
  <text class="T label" x="62" y="208" text-anchor="end">2 000</text>
  <text class="T label" x="62" y="108" text-anchor="end">2 500</text>

  <!-- Y axis -->
  <line class="axis" x1="70" y1="75" x2="70" y2="615"/>
  <!-- X axis -->
  <line class="axis" x1="70" y1="612" x2="850" y2="612"/>
  <!-- Grid lines -->
  <line class="grid" x1="70" y1="512" x2="850" y2="512"/>
  <line class="grid" x1="70" y1="412" x2="850" y2="412"/>
  <line class="grid" x1="70" y1="312" x2="850" y2="312"/>
  <line class="grid" x1="70" y1="212" x2="850" y2="212"/>
  <line class="grid" x1="70" y1="112" x2="850" y2="112"/>

  <!-- US group: x=90 — scale: 1 unit = 0.2px/$ so $2000=400px, bar height from y=612 -->
  <!-- AWS US total ~$2 160/mo: bar height 432 → y=180 -->
  <!-- Azure US total ~$2 100/mo: 420 → 192 -->
  <!-- GCP US total ~$1 890/mo: 378 → 234 -->
  <text class="T cat" x="195" y="636" text-anchor="middle">US-East</text>
  <rect class="aws" x="105" y="180" width="50" height="432"/><text class="T label" x="130" y="172" text-anchor="middle" fill="#ff9f43">$2 160</text>
  <rect class="azure" x="163" y="192" width="50" height="420"/><text class="T label" x="188" y="184" text-anchor="middle" fill="#33c3ff">$2 100</text>
  <rect class="gcp" x="221" y="234" width="50" height="378"/><text class="T label" x="246" y="226" text-anchor="middle" fill="#7dff9f">$1 890</text>

  <!-- EU group: x=330 -->
  <!-- AWS EU ~$2 340: 468 → 144 -->
  <!-- Azure EU ~$2 310: 462 → 150 -->
  <!-- GCP EU ~$2 070: 414 → 198 -->
  <text class="T cat" x="420" y="636" text-anchor="middle">EU-Central</text>
  <rect class="aws" x="330" y="144" width="50" height="468"/><text class="T label" x="355" y="136" text-anchor="middle" fill="#ff9f43">$2 340</text>
  <rect class="azure" x="388" y="150" width="50" height="462"/><text class="T label" x="413" y="142" text-anchor="middle" fill="#33c3ff">$2 310</text>
  <rect class="gcp" x="446" y="198" width="50" height="414"/><text class="T label" x="471" y="190" text-anchor="middle" fill="#7dff9f">$2 070</text>

  <!-- AU group: x=555 -->
  <!-- AWS AU ~$2 620: 524 → 88 -->
  <!-- Azure AU ~$2 520: 504 → 108 -->
  <!-- GCP AU ~$2 260: 452 → 160 -->
  <text class="T cat" x="645" y="636" text-anchor="middle">AP-Southeast</text>
  <rect class="aws" x="555" y="88" width="50" height="524"/><text class="T label" x="580" y="80" text-anchor="middle" fill="#ff9f43">$2 620</text>
  <rect class="azure" x="613" y="108" width="50" height="504"/><text class="T label" x="638" y="100" text-anchor="middle" fill="#33c3ff">$2 520</text>
  <rect class="gcp" x="671" y="160" width="50" height="452"/><text class="T label" x="696" y="152" text-anchor="middle" fill="#7dff9f">$2 260</text>

  <!-- Delta annotation -->
  <text class="T label" x="100" y="668" fill="#a8d8ff">Azure Δ vs AWS: US −3%, EU −1%, AU −4%</text>
  <text class="T label" x="100" y="688" fill="#a8d8ff">GCP Δ vs AWS: US −13%, EU −11%, AU −14%</text>
  <text class="T" x="600" y="665" text-anchor="middle" font-size="11" fill="#6a9abf">* All values are directional estimates in USD. Confidence: Medium.</text>
</svg>
