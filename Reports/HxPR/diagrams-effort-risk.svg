<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 780" width="920" height="780" font-family="Segoe UI, Arial, sans-serif">
  <rect width="920" height="780" fill="#ffffff" rx="8"/>
  <text x="460" y="34" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">HxPR Migration Effort vs Risk — Capability Matrix</text>

  <!-- Quadrant backgrounds -->
  <!-- Q1: Small effort, High risk (top-left) -->
  <rect x="80" y="60" width="260" height="280" fill="#ffeacc" opacity="0.4" rx="4"/>
  <text x="210" y="80" text-anchor="middle" font-size="10" fill="#cc8800" font-weight="bold">Watch</text>

  <!-- Q2: Large effort, High risk (top-right) -->
  <rect x="340" y="60" width="520" height="280" fill="#ffd7d7" opacity="0.4" rx="4"/>
  <text x="600" y="80" text-anchor="middle" font-size="10" fill="#cc0000" font-weight="bold">Critical — Resolve First</text>

  <!-- Q3: Small effort, Low risk (bottom-left) -->
  <rect x="80" y="340" width="260" height="280" fill="#d5f0db" opacity="0.4" rx="4"/>
  <text x="210" y="360" text-anchor="middle" font-size="10" fill="#007722" font-weight="bold">Quick Wins</text>

  <!-- Q4: Large effort, Low risk (bottom-right) -->
  <rect x="340" y="340" width="520" height="280" fill="#d4e8ff" opacity="0.4" rx="4"/>
  <text x="600" y="360" text-anchor="middle" font-size="10" fill="#0050aa" font-weight="bold">Complex but Manageable</text>

  <!-- Axes -->
  <line x1="80" y1="630" x2="870" y2="630" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="55" x2="80" y2="635" stroke="#333" stroke-width="2"/>
  <!-- Arrow heads -->
  <polygon points="870,626 870,634 882,630" fill="#333"/>
  <polygon points="76,55 84,55 80,43" fill="#333"/>

  <!-- X axis labels -->
  <text x="476" y="656" text-anchor="middle" font-size="13" fill="#333">← Effort →</text>
  <text x="210" y="656" text-anchor="middle" font-size="11" fill="#666">S (1–2 weeks)</text>
  <text x="470" y="656" text-anchor="middle" font-size="11" fill="#666">M (3–6 weeks)</text>
  <text x="700" y="656" text-anchor="middle" font-size="11" fill="#666">L (7–12 weeks)</text>

  <!-- Y axis labels -->
  <text x="50" y="480" text-anchor="middle" font-size="11" fill="#666" transform="rotate(-90,50,480)">← Risk →</text>
  <text x="65" y="490" text-anchor="end" font-size="11" fill="#666">Low</text>
  <text x="65" y="340" text-anchor="end" font-size="11" fill="#666">Med</text>
  <text x="65" y="190" text-anchor="end" font-size="11" fill="#666">High</text>

  <!-- Grid lines -->
  <line x1="80" y1="340" x2="870" y2="340" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="340" y1="55" x2="340" y2="630" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="600" y1="55" x2="600" y2="630" stroke="#ddd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ============ DATA POINTS ============ -->
  <!-- Positions: x: S=210, M=470, L=700; y: Low=490, Med=340, High=190 -->

  <!-- MongoDB Atlas: S, Low → (210, 490) -->
  <ellipse cx="210" cy="510" rx="65" ry="18" fill="#00684A" stroke="#004C36" stroke-width="1.5" opacity="0.9"/>
  <text x="210" y="514" text-anchor="middle" font-size="10" fill="#ffffff" font-weight="bold">MongoDB Atlas</text>

  <!-- Datadog: S, Low → (155, 475) -->
  <ellipse cx="155" cy="475" rx="50" ry="16" fill="#f4d5e8" stroke="#b85480" stroke-width="1.5" opacity="0.9"/>
  <text x="155" y="479" text-anchor="middle" font-size="10" fill="#7a2050">Datadog</text>

  <!-- Velero: S, Low → (230, 475) -->
  <ellipse cx="248" cy="468" rx="40" ry="15" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" opacity="0.9"/>
  <text x="248" y="472" text-anchor="middle" font-size="9.5" fill="#004ea2">Velero</text>

  <!-- Serverless Lambda: S, Low → (160, 440) -->
  <ellipse cx="160" cy="440" rx="48" ry="15" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5" opacity="0.9"/>
  <text x="160" y="444" text-anchor="middle" font-size="9.5" fill="#7a4a00">Serverless</text>

  <!-- Observability: S, Low → (248,438) -->
  <ellipse cx="255" cy="435" rx="50" ry="15" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5" opacity="0.9"/>
  <text x="255" y="439" text-anchor="middle" font-size="9.5" fill="#5a4070">Observability</text>

  <!-- Storage S3→Blob: M, Med → (435, 350) -->
  <ellipse cx="435" cy="363" rx="75" ry="17" fill="#fff4e6" stroke="#d79b00" stroke-width="1.5" opacity="0.9"/>
  <text x="435" y="367" text-anchor="middle" font-size="10" fill="#7a4a00">Storage (S3→Blob)</text>

  <!-- Networking ALB→AppGW: M, Med → (470, 395) -->
  <ellipse cx="490" cy="398" rx="88" ry="17" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5" opacity="0.9"/>
  <text x="490" y="402" text-anchor="middle" font-size="10" fill="#00408A">Networking (ALB→AppGW)</text>

  <!-- Compute EKS→AKS: M, Med → (520, 330) -->
  <ellipse cx="520" cy="330" rx="82" ry="17" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5" opacity="0.9"/>
  <text x="520" y="334" text-anchor="middle" font-size="10" fill="#7a4a00">Compute (EKS→AKS)</text>

  <!-- HxPR App + SDK: M, Med → (485, 305) -->
  <ellipse cx="485" cy="305" rx="95" ry="17" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5" opacity="0.9"/>
  <text x="485" y="309" text-anchor="middle" font-size="10" fill="#1a5c24">App (HxPR Helm + SDK)</text>

  <!-- Messaging SNS/SQS→SB: M, Med → (508. 440) -->
  <ellipse cx="510" cy="445" rx="100" ry="17" fill="#feecf8" stroke="#E7157B" stroke-width="1.5" opacity="0.9"/>
  <text x="510" y="449" text-anchor="middle" font-size="10" fill="#9a0040">Messaging (SNS/SQS→SB)</text>

  <!-- IRSA→WIF Identity: M, High → (470, 175) — CRITICAL -->
  <ellipse cx="460" cy="185" rx="90" ry="19" fill="#f8cecc" stroke="#b85450" stroke-width="2.5" opacity="0.95"/>
  <text x="460" y="182" text-anchor="middle" font-size="10" fill="#7a0000" font-weight="bold">IRSA→Workload Identity</text>
  <text x="460" y="196" text-anchor="middle" font-size="9" fill="#aa0000">⚠ High Risk</text>

  <!-- OpenSearch: L, High → (700, 175) — CRITICAL -->
  <ellipse cx="700" cy="178" rx="70" ry="19" fill="#f8cecc" stroke="#b85450" stroke-width="2.5" opacity="0.95"/>
  <text x="700" y="175" text-anchor="middle" font-size="10" fill="#7a0000" font-weight="bold">OpenSearch</text>
  <text x="700" y="189" text-anchor="middle" font-size="9" fill="#aa0000">⚠ No Managed API</text>

  <!-- Legend -->
  <rect x="80" y="680" width="760" height="60" fill="#f8f8f8" rx="4" stroke="#ddd" stroke-width="1"/>
  <text x="90" y="698" font-size="11" fill="#333" font-weight="bold">Risk zones:</text>
  <rect x="90" y="706" width="14" height="10" fill="#ffd7d7" opacity="0.8"/>
  <text x="110" y="715" font-size="10" fill="#cc0000">Critical (High risk)</text>
  <rect x="230" y="706" width="14" height="10" fill="#ffeacc" opacity="0.8"/>
  <text x="250" y="715" font-size="10" fill="#cc8800">Watch (High effort)</text>
  <rect x="370" y="706" width="14" height="10" fill="#d5f0db" opacity="0.8"/>
  <text x="390" y="715" font-size="10" fill="#007722">Quick Wins (Low risk + effort)</text>
  <rect x="560" y="706" width="14" height="10" fill="#d4e8ff" opacity="0.8"/>
  <text x="580" y="715" font-size="10" fill="#0050aa">Complex-Manageable</text>
  <text x="90" y="732" font-size="10" fill="#888" font-style="italic">Effort scale: S = 1–2 weeks · M = 3–6 weeks · L = 7–12 weeks · Risk: L=Low, M=Medium, H=High</text>
</svg>
