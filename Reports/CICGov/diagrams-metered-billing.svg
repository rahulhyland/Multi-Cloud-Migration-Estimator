  <text x="15" y="470" font-size="9" fill="#6c757d">* Azure Cosmos DB Serverless: $0.25/1M RU — comparable to DynamoDB on-demand at discovered PAY_PER_REQUEST billing mode.</text>
  <text x="15" y="484" font-size="9" fill="#6c757d">** GCP Firestore: $0.06/100K reads = $0.60/1M reads — 2.4× AWS DynamoDB per read, but offset by free tier (50K reads/day free).</text>
  <text x="15" y="498" font-size="9" fill="#34a853">GCP Pub/Sub: first 10 GiB/month FREE — at ~2M × 1KB avg = 2GB, cicgov messaging cost ≈ $0/month vs AWS $0.80–$1.00/month.</text>
  <text x="15" y="512" font-size="9" fill="#34a853">GCP Cloud Logging: first 50 GiB/month FREE — at ~50 GB ingested, cicgov logging cost ≈ $0/month vs AWS CloudWatch $25/month.</text>
  <text x="15" y="526" font-size="9" fill="#6c757d">Confidence: High for row-level unit prices; Medium for volume-based totals (actual DynamoDB billing_mode=var.billing_mode — assumed PAY_PER_REQUEST).</text>
