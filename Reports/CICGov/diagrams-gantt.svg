<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 535" width="1100" height="535" style="background:#fff;">
  <defs></defs>
  <rect x="0" y="0" width="1100" height="535" fill="#fff" stroke="#dee2e6" stroke-width="1"/>
  <text x="550" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#212529">cicgov Migration — Recommended 30/60/90/120-Day Phased Timeline</text>
  <text x="550" y="42" text-anchor="middle" font-size="10" fill="#6c757d">Target: Azure (Speed-First) | 4 phases driven by dependency depth, data risk, and prod-au requirement</text>

  <!-- Phase headers -->
  <rect x="20" y="55" width="245" height="30" rx="4" fill="#0d6efd"/>
  <text x="142" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Phase 1: Days 1–30</text>
  <rect x="283" y="55" width="245" height="30" rx="4" fill="#6f42c1"/>
  <text x="405" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Phase 2: Days 31–60</text>
  <rect x="546" y="55" width="245" height="30" rx="4" fill="#198754"/>
  <text x="668" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Phase 3: Days 61–90</text>
  <rect x="809" y="55" width="271" height="30" rx="4" fill="#fd7e14"/>
  <text x="944" y="76" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Phase 4: Days 91–120</text>

  <!-- Phase labels below header -->
  <text x="142" y="100" text-anchor="middle" font-size="10" fill="#0d6efd" font-weight="bold">Foundation + Non-Prod</text>
  <text x="405" y="100" text-anchor="middle" font-size="10" fill="#6f42c1" font-weight="bold">Data + Messaging + Staging</text>
  <text x="668" y="100" text-anchor="middle" font-size="10" fill="#198754" font-weight="bold">IAM Hardening + Prod US</text>
  <text x="944" y="100" text-anchor="middle" font-size="10" fill="#fd7e14" font-weight="bold">Prod AU + Optimize</text>

  <!-- Timeline bar -->
  <rect x="20" y="108" width="1060" height="14" rx="7" fill="#e9ecef"/>
  <rect x="20" y="108" width="265" height="14" rx="7" fill="#0d6efd" opacity="0.7"/>
  <rect x="285" y="108" width="245" height="14" fill="#6f42c1" opacity="0.7"/>
  <rect x="530" y="108" width="245" height="14" fill="#198754" opacity="0.7"/>
  <rect x="775" y="108" width="305" height="14" rx="7" fill="#fd7e14" opacity="0.7"/>
  <text x="152" y="120" text-anchor="middle" font-size="9" fill="#fff">Days 1–30</text>
  <text x="407" y="120" text-anchor="middle" font-size="9" fill="#fff">Days 31–60</text>
  <text x="652" y="120" text-anchor="middle" font-size="9" fill="#fff">Days 61–90</text>
  <text x="927" y="120" text-anchor="middle" font-size="9" fill="#fff">Days 91–120</text>

  <!-- Phase 1 tasks -->
  <rect x="20" y="128" width="245" height="280" rx="4" fill="#f0f4ff" stroke="#0d6efd" stroke-width="1"/>
  <text x="30" y="147" font-size="9" font-weight="bold" fill="#0d6efd">Objective: Landing zone + dev/sandbox</text>
  <text x="30" y="163" font-size="9" fill="#212529">□ Azure subscription + management groups</text>
  <text x="30" y="177" font-size="9" fill="#212529">□ AKS cluster (arm64 Dpsv5) sandbox + dev</text>
  <text x="30" y="191" font-size="9" fill="#212529">□ VNet + subnets + NSG (match VPC layout)</text>
  <text x="30" y="205" font-size="9" fill="#212529">□ Azure API Management (Consumption tier)</text>
  <text x="30" y="219" font-size="9" fill="#212529">□ Application Gateway WAF_v2</text>
  <text x="30" y="233" font-size="9" fill="#212529">□ Azure DNS zone + ACM→managed cert</text>
  <text x="30" y="247" font-size="9" fill="#212529">□ Datadog agent DaemonSet for AKS</text>
  <text x="30" y="261" font-size="9" fill="#212529">□ Deploy cicgov Helm chart (sandbox)</text>
  <text x="30" y="275" font-size="9" fill="#212529">□ Azure Key Vault (KMS replacement)</text>
  <text x="30" y="289" font-size="9" fill="#212529">□ Key Vault CSI driver (Secrets replacement)</text>
  <text x="30" y="303" font-size="9" fill="#212529">□ Terraform: azurerm provider skeleton</text>
  <text x="30" y="317" font-size="9" fill="#212529">□ Spacelift stacks for Azure env</text>
  <text x="30" y="331" font-size="9" fill="#212529">□ Azure App Configuration (SSM replacement)</text>
  <rect x="24" y="352" width="237" height="48" rx="3" fill="#dce7f8" stroke="#0d6efd" stroke-width="1"/>
  <text x="30" y="368" font-size="9" font-weight="bold" fill="#0d47a1">Exit Criteria:</text>
  <text x="30" y="381" font-size="9" fill="#0d47a1">cicgov API responds in sandbox (Azure)</text>
  <text x="30" y="394" font-size="9" fill="#0d47a1">All smoke tests pass | Datadog traces visible</text>

  <!-- Phase 2 tasks -->
  <rect x="283" y="128" width="245" height="280" rx="4" fill="#f3eeff" stroke="#6f42c1" stroke-width="1"/>
  <text x="293" y="147" font-size="9" font-weight="bold" fill="#6f42c1">Objective: Data + Messaging migration</text>
  <text x="293" y="163" font-size="9" fill="#212529">□ Cosmos DB NoSQL (DynamoDB replacement)</text>
  <text x="293" y="177" font-size="9" fill="#212529">□ Schema mapping: PK/SK → doc path</text>
  <text x="293" y="191" font-size="9" fill="#212529">□ GSI → Cosmos composite index mapping</text>
  <text x="293" y="205" font-size="9" fill="#212529">□ Data migration rehearsal (sandbox data)</text>
  <text x="293" y="219" font-size="9" fill="#212529">□ Azure Service Bus Standard namespace</text>
  <text x="293" y="233" font-size="9" fill="#212529">□ 8 queues → SB topics + subscriptions</text>
  <text x="293" y="247" font-size="9" fill="#212529">□ SQL filter expressions (≡ SNS filters)</text>
  <text x="293" y="261" font-size="9" fill="#212529">□ Azure Functions (Lambda replacement)</text>
  <text x="293" y="275" font-size="9" fill="#212529">□ Azure Cache for Redis (in-cluster Redis)</text>
  <text x="293" y="289" font-size="9" fill="#212529">□ Cross-org messaging (HxPR, NCP, Studio)</text>
  <text x="293" y="303" font-size="9" fill="#212529">□ Staging environment deployment</text>
  <text x="293" y="317" font-size="9" fill="#212529">□ Integration tests (E2E suite)</text>
  <text x="293" y="331" font-size="9" fill="#212529">□ DR plan: Cosmos geo-redundancy config</text>
  <rect x="287" y="352" width="237" height="48" rx="3" fill="#ede7f6" stroke="#6f42c1" stroke-width="1"/>
  <text x="293" y="368" font-size="9" font-weight="bold" fill="#4a148c">Exit Criteria:</text>
  <text x="293" y="381" font-size="9" fill="#4a148c">Full E2E tests pass on staging (Azure)</text>
  <text x="293" y="394" font-size="9" fill="#4a148c">Data migration rehearsal completes in &lt;2h</text>

  <!-- Phase 3 tasks -->
  <rect x="546" y="128" width="245" height="280" rx="4" fill="#edf7ef" stroke="#198754" stroke-width="1"/>
  <text x="556" y="147" font-size="9" font-weight="bold" fill="#198754">Objective: IAM hardening + Prod US cutover</text>
  <text x="556" y="163" font-size="9" fill="#212529">□ Entra Workload Identity (IRSA replacement)</text>
  <text x="556" y="177" font-size="9" fill="#212529">□ Managed Identity RBAC roles (vs IRSA)</text>
  <text x="556" y="191" font-size="9" fill="#212529">□ Cross-tenant IAM: Credentials service</text>
  <text x="556" y="205" font-size="9" fill="#212529">□ Key Vault RBAC (vs KMS key policies)</text>
  <text x="556" y="219" font-size="9" fill="#212529">□ Azure App Registrations (IDP clients)</text>
  <text x="556" y="233" font-size="9" fill="#212529">□ SOC2 evidence artifacts for Azure</text>
  <text x="556" y="247" font-size="9" fill="#212529">□ Production DynamoDB → Cosmos data migration</text>
  <text x="556" y="261" font-size="9" fill="#212529">□ Production traffic cutover (DNS flip)</text>
  <text x="556" y="275" font-size="9" fill="#212529">□ HPA stress testing (1→4 replicas)</text>
  <text x="556" y="289" font-size="9" fill="#212529">□ WAF rule validation (OWASP top 10)</text>
  <text x="556" y="303" font-size="9" fill="#212529">□ Cutover go-live + hypercare window (72h)</text>
  <text x="556" y="317" font-size="9" fill="#212529">□ AWS stack freeze (no new deploys)</text>
  <text x="556" y="331" font-size="9" fill="#212529">□ Maintain AWS in warm standby (rollback)</text>
  <rect x="550" y="352" width="237" height="48" rx="3" fill="#d4edda" stroke="#198754" stroke-width="1"/>
  <text x="556" y="368" font-size="9" font-weight="bold" fill="#155724">Exit Criteria:</text>
  <text x="556" y="381" font-size="9" fill="#155724">Prod US on Azure ≥14 days stable</text>
  <text x="556" y="394" font-size="9" fill="#155724">Latency P99 ≤ AWS baseline | Zero P1 incidents</text>

  <!-- Phase 4 tasks -->
  <rect x="809" y="128" width="271" height="280" rx="4" fill="#fff5e6" stroke="#fd7e14" stroke-width="1"/>
  <text x="819" y="147" font-size="9" font-weight="bold" fill="#fd7e14">Objective: Prod AU + Cost optimization</text>
  <text x="819" y="163" font-size="9" fill="#212529">□ Australia East AKS cluster deployment</text>
  <text x="819" y="177" font-size="9" fill="#212529">□ Cosmos DB geo-replicated to Australia East</text>
  <text x="819" y="191" font-size="9" fill="#212529">□ Service Bus geo-disaster recovery</text>
  <text x="819" y="205" font-size="9" fill="#212529">□ Australia East DNS zone + routing</text>
  <text x="819" y="219" font-size="9" fill="#212529">□ prod-au data residency validation (SOC2)</text>
  <text x="819" y="233" font-size="9" fill="#212529">□ Traffic cutover: prod-au AWS → Azure AU</text>
  <text x="819" y="247" font-size="9" fill="#212529">□ AWS resource decommission (staggered)</text>
  <text x="819" y="261" font-size="9" fill="#212529">□ RTO/RPO validation (4h/30min target)</text>
  <text x="819" y="275" font-size="9" fill="#212529">□ Azure Reserved Instances pricing review</text>
  <text x="819" y="289" font-size="9" fill="#212529">□ KEDA / HPA tuning (burst patterns)</text>
  <text x="819" y="303" font-size="9" fill="#212529">□ EU region planning (West Europe)</text>
  <text x="819" y="317" font-size="9" fill="#212529">□ AWS account closure / cost reporting</text>
  <text x="819" y="331" font-size="9" fill="#212529">□ Final SOC2 evidence package for Azure</text>
  <rect x="813" y="352" width="263" height="48" rx="3" fill="#ffe5cc" stroke="#fd7e14" stroke-width="1"/>
  <text x="819" y="368" font-size="9" font-weight="bold" fill="#c55a11">Exit Criteria:</text>
  <text x="819" y="381" font-size="9" fill="#c55a11">All envs (dev/staging/prod/prod-au) on Azure</text>
  <text x="819" y="394" font-size="9" fill="#c55a11">AWS spend = $0 | SOC2 control mapping complete</text>

  <!-- Bottom bar: Architecture decisions required before start -->
  <rect x="20" y="415" width="1060" height="106" rx="5" fill="#f8f9fa" stroke="#adb5bd" stroke-width="1.5"/>
  <text x="540" y="433" text-anchor="middle" font-size="10" font-weight="bold" fill="#212529">Required Architecture Decisions Before Execution</text>
  <text x="30" y="450" font-size="9" fill="#495057">1. DynamoDB schema review: Confirm billing_mode=PAY_PER_REQUEST (not PROVISIONED) before Cosmos serverless sizing — affects cost model.</text>
  <text x="30" y="464" font-size="9" fill="#495057">2. Service Bus tier: Standard ($9.81/mo base) vs Premium ($677/mo) — Standard lacks geo-DR; confirm if prod-au requires geo-redundant messaging.</text>
  <text x="30" y="478" font-size="9" fill="#495057">3. Cross-org identity: Confirm HxP IdP OIDC federation path for Azure Entra — determines if hxp_idpclient Terraform resource can be reused or requires rewrite.</text>
  <text x="30" y="492" font-size="9" fill="#495057">4. EU region: prod-eu commented out in aws_account_ids — confirm if Azure West Europe must be provisioned in this migration scope or deferred.</text>
  <text x="30" y="506" font-size="9" fill="#495057">5. Spacelift role binding: Azure provider requires new Spacelift stack role ARN-equivalent (service principal) — design before Phase 1 begins.</text>
</svg>
