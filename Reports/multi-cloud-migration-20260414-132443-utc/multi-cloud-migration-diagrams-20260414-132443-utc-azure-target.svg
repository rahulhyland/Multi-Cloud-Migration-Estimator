<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Azure Target Architecture</title>
  <desc id="desc">Proposed Azure target architecture with equivalent components and flows.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #eef2ff; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .cluster { fill: #ecfccb; stroke: #365314; stroke-width: 2; rx: 10; ry: 10; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; ry: 8; }
      .msg { fill: #ffedd5; stroke: #c2410c; stroke-width: 2; rx: 8; ry: 8; }
      .sec { fill: #fce7f3; stroke: #be185d; stroke-width: 2; rx: 8; ry: 8; }
      .data { fill: #d1fae5; stroke: #047857; stroke-width: 2; rx: 8; ry: 8; }
      .obs { fill: #fde68a; stroke: #92400e; stroke-width: 2; rx: 8; ry: 8; }
      .txt { font-family: 'DejaVu Sans', 'Segoe UI', sans-serif; font-size: 16px; fill: #0f172a; paint-order: stroke; stroke: #ffffff; stroke-width: 2px; }
      .small { font-size: 14px; }
      .line1 { stroke: #0ea5e9; stroke-width: 3; fill: none; marker-end: url(#a1); }
      .line2 { stroke: #22c55e; stroke-width: 3; fill: none; marker-end: url(#a2); }
      .line3 { stroke: #f97316; stroke-width: 3; fill: none; marker-end: url(#a3); }
      .line4 { stroke: #e11d48; stroke-width: 3; fill: none; marker-end: url(#a4); }
      .line5 { stroke: #14b8a6; stroke-width: 3; fill: none; marker-end: url(#a5); }
    </style>
    <marker id="a1" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 z" fill="#0ea5e9"/></marker>
    <marker id="a2" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 z" fill="#22c55e"/></marker>
    <marker id="a3" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 z" fill="#f97316"/></marker>
    <marker id="a4" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 z" fill="#e11d48"/></marker>
    <marker id="a5" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 z" fill="#14b8a6"/></marker>
  </defs>

  <rect class="bg" width="1600" height="900"/>
  <text class="txt" x="30" y="40">Azure Target Architecture</text>

  <rect class="panel" x="40" y="70" width="180" height="60"/><text class="txt small" x="60" y="105">Clients / Upstream</text>
  <rect class="panel" x="270" y="70" width="180" height="60"/><text class="txt small" x="315" y="105">Azure DNS</text>
  <rect class="msg" x="500" y="70" width="280" height="60"/><text class="txt small" x="530" y="105">Front Door / App Gateway + WAF</text>

  <rect class="panel" x="40" y="170" width="1510" height="690"/><text class="txt small" x="60" y="200">VNet/Subnets</text>
  <rect class="cluster" x="80" y="220" width="960" height="440"/><text class="txt small" x="100" y="250">AKS Cluster Boundary</text>

  <rect class="box" x="120" y="280" width="200" height="70"/><text class="txt small" x="165" y="320">REST Pod</text>
  <rect class="box" x="350" y="280" width="210" height="70"/><text class="txt small" x="395" y="320">Router Pod</text>
  <rect class="box" x="590" y="270" width="350" height="90"/>
  <text class="txt small" x="620" y="305">Engine group target deployment</text>
  <text class="txt small" x="620" y="327">tika/imagemagick/libreoffice/misc/docfilters/docmerge/aio</text>

  <rect class="box" x="120" y="390" width="220" height="60"/><text class="txt small" x="170" y="425">KEDA option</text>
  <rect class="box" x="370" y="390" width="220" height="60"/><text class="txt small" x="410" y="425">Network Policies</text>
  <rect class="sec" x="620" y="390" width="300" height="60"/><text class="txt small" x="660" y="425">Kubernetes Secrets via Key Vault CSI</text>

  <rect class="msg" x="1080" y="250" width="230" height="70"/><text class="txt small" x="1110" y="292">Service Bus Topics/Queues</text>
  <rect class="sec" x="1320" y="250" width="220" height="70"/><text class="txt small" x="1360" y="292">Key Vault Keys</text>
  <rect class="sec" x="1320" y="340" width="220" height="70"/><text class="txt small" x="1350" y="382">Key Vault Secrets</text>
  <rect class="data" x="1080" y="430" width="230" height="70"/><text class="txt small" x="1125" y="472">Search target service</text>
  <rect class="data" x="1320" y="430" width="220" height="70"/><text class="txt small" x="1350" y="472">MongoDB Atlas Azure</text>
  <rect class="obs" x="120" y="500" width="330" height="60"/><text class="txt small" x="155" y="535">Datadog + Azure Monitor</text>

  <path class="line1" d="M220 100 L270 100"/>
  <path class="line1" d="M450 100 L500 100"/>
  <path class="line2" d="M780 100 L780 315 L560 315"/>
  <path class="line2" d="M320 315 L350 315"/>
  <path class="line2" d="M560 315 L590 315"/>
  <path class="line3" d="M560 315 L1080 285"/>
  <path class="line4" d="M560 315 L1320 285"/>
  <path class="line4" d="M560 315 L1320 375"/>
  <path class="line5" d="M560 315 L1080 465"/>
  <path class="line5" d="M560 315 L1320 465"/>
  <path class="line3" d="M450 530 L1080 465"/>
</svg>
