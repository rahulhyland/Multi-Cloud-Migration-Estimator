<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Regional cost comparison chart Azure vs GCP">
  <defs>
    <style>
      .bg { fill: #0d1426; }
      .txt { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #f4fbff; paint-order: stroke; stroke: #09101c; stroke-width: 1px; }
      .title { font-size: 22px; font-weight: 700; }
      .axis { stroke: #9ed8ff; stroke-width: 2; }
      .grid { stroke: #26405f; stroke-width: 1; }
      .azure { fill: #33c3ff; }
      .gcp { fill: #7dff9f; }
      .label { font-size: 13px; }
      .value { font-size: 12px; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="txt title" x="34" y="42">Regional 30-Day Total Cost Comparison (USD)</text>
  <text class="txt" x="34" y="66">Directional estimate from section 5.2 totals: Azure vs GCP</text>

  <line class="axis" x1="120" y1="110" x2="120" y2="620"/>
  <line class="axis" x1="120" y1="620" x2="1120" y2="620"/>

  <line class="grid" x1="120" y1="535" x2="1120" y2="535"/>
  <line class="grid" x1="120" y1="450" x2="1120" y2="450"/>
  <line class="grid" x1="120" y1="365" x2="1120" y2="365"/>
  <line class="grid" x1="120" y1="280" x2="1120" y2="280"/>
  <line class="grid" x1="120" y1="195" x2="1120" y2="195"/>
  <line class="grid" x1="120" y1="110" x2="1120" y2="110"/>

  <text class="txt label" x="42" y="625">0</text>
  <text class="txt label" x="20" y="540">4k</text>
