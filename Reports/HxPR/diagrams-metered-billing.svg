<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 660" width="1100" height="660" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="660" fill="#ffffff" rx="8"/>
  <text x="550" y="36" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">HxPR Metered Billing Tier Comparison — Key Services (USD per unit)</text>
  <text x="550" y="54" text-anchor="middle" font-size="11" fill="#555">AWS US baseline vs Azure US vs GCP US · On-demand pricing</text>

  <!-- Axes -->
  <line x1="68" y1="55" x2="68" y2="540" stroke="#333" stroke-width="2"/>
  <line x1="68" y1="540" x2="1080" y2="540" stroke="#333" stroke-width="2"/>
  <text x="22" y="300" text-anchor="middle" font-size="11" fill="#555" transform="rotate(-90,22,300)">USD per unit</text>

  <!-- Grid lines at $0.1, $0.2, $0.3, $0.4 ($1 = 1000px... need better scale) -->
  <!-- Scale: max $0.43/node-hr -> use $0.50 = 500 "units", where $0.001 = 1px -->
  <!-- So bar height = value * 1000px. $0.43 = 430px. But chart is 485px tall. Use scale: $0.50 = 400px, 1px = $0.00125 -->
  <!-- height = value / 0.00125 = value * 800 -->
  <!-- $0.43 → 344px; $0.167 → 134px; $0.09 → 72px; $0.048 → 38px; $0.023 → 18px; $0.008 → 6px; $0.03 → 24px; $0.40 → 320px -->

  <!-- Grid -->
  <line x1="68" y1="460" x2="1080" y2="460" stroke="#eee" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="62" y="464" text-anchor="end" font-size="9" fill="#888">$0.10</text>
  <line x1="68" y1="380" x2="1080" y2="380" stroke="#eee" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="62" y="384" text-anchor="end" font-size="9" fill="#888">$0.20</text>
  <line x1="68" y1="300" x2="1080" y2="300" stroke="#eee" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="62" y="304" text-anchor="end" font-size="9" fill="#888">$0.30</text>
  <line x1="68" y1="220" x2="1080" y2="220" stroke="#eee" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="62" y="224" text-anchor="end" font-size="9" fill="#888">$0.40</text>
  <text x="62" y="144" text-anchor="end" font-size="9" fill="#888">$0.50</text>

  <!-- S3/Blob/GCS ($/GB-month): AWS=0.023, Azure=0.018, GCP=0.020 → h=18,14,16 -->
  <rect x="90" y="522" width="28" height="18" fill="#FF9900" opacity="0.9"/>
  <rect x="121" y="526" width="28" height="14" fill="#0078d4" opacity="0.9"/>
  <rect x="152" y="524" width="28" height="16" fill="#34a853" opacity="0.9"/>
  <text x="120" y="514" text-anchor="middle" font-size="9" fill="#444">$0.023/$0.018/$0.020</text>
  <text x="120" y="562" text-anchor="middle" font-size="10" fill="#333">Storage</text>
  <text x="120" y="574" text-anchor="middle" font-size="9" fill="#555">($/GB-month)</text>

  <!-- vCPU-hour m5.xlarge equiv: AWS=0.048, Azure=0.048, GCP=0.048 → h=38 each -->
  <rect x="230" y="502" width="28" height="38" fill="#FF9900" opacity="0.9"/>
  <rect x="261" y="502" width="28" height="38" fill="#0078d4" opacity="0.9"/>
  <rect x="292" y="502" width="28" height="38" fill="#34a853" opacity="0.9"/>
  <text x="260" y="494" text-anchor="middle" font-size="9" fill="#444">$0.048 each</text>
  <text x="260" y="562" text-anchor="middle" font-size="10" fill="#333">vCPU-hour</text>
  <text x="260" y="574" text-anchor="middle" font-size="9" fill="#555">(m5.xl equiv)</text>

  <!-- OpenSearch/Azure AI Search per instance-hr: AWS=0.167, Azure=0.112, GCP=N/A → h=134,90,gray -->
  <rect x="370" y="406" width="28" height="134" fill="#FF9900" opacity="0.9"/>
  <rect x="401" y="450" width="28" height="90" fill="#0078d4" opacity="0.9"/>
  <rect x="432" y="510" width="28" height="30" fill="#cccccc" opacity="0.7"/>
  <text x="400" y="398" text-anchor="middle" font-size="9" fill="#444">$0.167/$0.112/N/A¹</text>
  <text x="400" y="562" text-anchor="middle" font-size="10" fill="#333">OpenSearch</text>
  <text x="400" y="574" text-anchor="middle" font-size="9" fill="#555">($/inst-hour)</text>

  <!-- MongoDB Atlas M40 per node-hr: AWS=0.430, Azure=0.430, GCP=0.430 → h=344 each -->
  <rect x="510" y="196" width="28" height="344" fill="#FF9900" opacity="0.9"/>
  <rect x="541" y="196" width="28" height="344" fill="#0078d4" opacity="0.9"/>
  <rect x="572" y="196" width="28" height="344" fill="#34a853" opacity="0.9"/>
  <text x="541" y="188" text-anchor="middle" font-size="9" fill="#444">$0.430 (all clouds)</text>
  <text x="541" y="562" text-anchor="middle" font-size="10" fill="#333">MongoDB Atlas M40</text>
  <text x="541" y="574" text-anchor="middle" font-size="9" fill="#555">($/node-hour)</text>

  <!-- SQS/Service Bus/Pub-Sub over 1M: AWS=0.40, Azure=0.436, GCP=0.040 → h=320,349,32 -->
  <rect x="650" y="220" width="28" height="320" fill="#FF9900" opacity="0.9"/>
  <rect x="681" y="191" width="28" height="349" fill="#0078d4" opacity="0.9"/>
  <rect x="712" y="508" width="28" height="32" fill="#34a853" opacity="0.9"/>
  <text x="681" y="183" text-anchor="middle" font-size="9" fill="#444">$0.40/$0.436/$0.040</text>
  <text x="681" y="562" text-anchor="middle" font-size="10" fill="#333">Messaging</text>
  <text x="681" y="574" text-anchor="middle" font-size="9" fill="#555">($/1M req, over 1M)</text>
  <!-- GCP annotation -->
  <text x="740" y="510" font-size="8" fill="#34a853">GCP $0.04</text>

  <!-- ALB/App GW per LCU-hr: AWS=0.008, Azure=0.007, GCP=0.006 → h=6,5.6,4.8 → too small, use 10x scale label -->
  <rect x="810" y="534" width="28" height="6" fill="#FF9900" opacity="0.9"/>
  <rect x="841" y="535" width="28" height="5" fill="#0078d4" opacity="0.9"/>
  <rect x="872" y="536" width="28" height="4" fill="#34a853" opacity="0.9"/>
  <text x="841" y="526" text-anchor="middle" font-size="9" fill="#444">$0.008/$0.007/$0.006</text>
  <text x="841" y="562" text-anchor="middle" font-size="10" fill="#333">LB / WAF</text>
  <text x="841" y="574" text-anchor="middle" font-size="9" fill="#555">($/LCU-hr)</text>

  <!-- Egress per GB: AWS=0.090, Azure=0.087, GCP=0.085 → h=72,70,68 -->
  <rect x="950" y="468" width="28" height="72" fill="#FF9900" opacity="0.9"/>
  <rect x="981" y="470" width="28" height="70" fill="#0078d4" opacity="0.9"/>
  <rect x="1012" y="472" width="28" height="68" fill="#34a853" opacity="0.9"/>
  <text x="981" y="460" text-anchor="middle" font-size="9" fill="#444">$0.090/$0.087/$0.085</text>
  <text x="981" y="562" text-anchor="middle" font-size="10" fill="#333">Egress</text>
  <text x="981" y="574" text-anchor="middle" font-size="9" fill="#555">($/GB out ≤10TB)</text>

  <!-- Legend -->
  <rect x="200" y="600" width="14" height="10" fill="#FF9900" opacity="0.9"/>
  <text x="220" y="609" font-size="11" fill="#333">AWS US (baseline)</text>
  <rect x="360" y="600" width="14" height="10" fill="#0078d4" opacity="0.9"/>
  <text x="380" y="609" font-size="11" fill="#333">Azure US</text>
  <rect x="470" y="600" width="14" height="10" fill="#34a853" opacity="0.9"/>
  <text x="490" y="609" font-size="11" fill="#333">GCP US</text>
  <rect x="560" y="600" width="14" height="10" fill="#cccccc" opacity="0.7"/>
  <text x="580" y="609" font-size="11" fill="#555">N/A (no managed svc)</text>

  <text x="68" y="645" font-size="10" fill="#888" font-style="italic">¹ GCP has no managed OpenSearch; self-managed on GKE priced as compute · scale: $0.001 ≈ 0.8px</text>
</svg>
