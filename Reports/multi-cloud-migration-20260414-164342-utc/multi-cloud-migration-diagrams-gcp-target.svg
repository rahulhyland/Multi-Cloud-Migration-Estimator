<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-label="GCP target architecture diagram">
  <defs>
    <style>
      .bg { fill: #0a1320; }
      .panel { fill: #12243b; stroke: #55d6ff; stroke-width: 2; rx: 10; }
      .node { fill: #1e3552; stroke: #93e7ff; stroke-width: 1.8; rx: 8; }
      .sec { fill: #33244a; stroke: #ff9dd9; stroke-width: 1.8; rx: 8; }
      .msg { fill: #1f3c2f; stroke: #8cffb2; stroke-width: 1.8; rx: 8; }
      .txt { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; font-size: 14px; fill: #f3fbff; paint-order: stroke; stroke: #081427; stroke-width: 1px; }
      .small { font-size: 12px; }
      .title { font-size: 20px; font-weight: 700; }
      .a { stroke: #63ebff; stroke-width: 3; fill: none; marker-end: url(#m1); }
      .b { stroke: #ff9dd9; stroke-width: 3; fill: none; marker-end: url(#m2); }
      .c { stroke: #a6ffbf; stroke-width: 3; fill: none; marker-end: url(#m3); }
    </style>
    <marker id="m1" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#63ebff"/></marker>
    <marker id="m2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#ff9dd9"/></marker>
    <marker id="m3" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#a6ffbf"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1500" height="980"/>
