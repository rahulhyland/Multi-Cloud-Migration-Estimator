  <rect class="sec" x="1005" y="655" width="100" height="40"/><text class="txt small" x="1025" y="680">Entra ID</text>
  <rect class="node" x="500" y="715" width="170" height="40"/><text class="txt small" x="525" y="740">Azure Files (NFS)</text>
