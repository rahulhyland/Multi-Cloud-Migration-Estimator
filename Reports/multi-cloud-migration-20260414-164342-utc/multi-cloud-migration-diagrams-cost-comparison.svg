  <text class="txt label" x="12" y="370">12k</text>
  <text class="txt label" x="12" y="285">16k</text>
  <text class="txt label" x="12" y="200">20k</text>

  <rect class="azure" x="240" y="258" width="90" height="362"/>
  <rect class="gcp" x="350" y="250" width="90" height="370"/>
