  <text x="240" y="422" class="note">Python 3.10 · VPC Connector</text>
  <text x="240" y="438" class="note">env_decommission function</text>
  <text x="240" y="454" class="note">malware_quarantine function</text>
  <text x="240" y="470" class="note">Triggered by GCP SCC + Cloud DLP</text>
  <text x="240" y="486" class="note">scan result event</text>

  <!-- ── Bottom: Pub/Sub, GCS ── -->
  <!-- Pub/Sub -->
  <rect x="60" y="1058" width="420" height="125" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="2"/>
  <text x="270" y="1080" class="box-label-top">GCP Cloud Pub/Sub</text>
  <text x="270" y="1098" class="note">21 subscriptions + message attribute filters (SNS filter equiv.)</text>
  <text x="270" y="1116" class="note">3 topics: async-tasks · repo-events · transform-reply</text>
  <text x="270" y="1134" class="note">Pull + push delivery · dead-letter topics</text>
  <text x="270" y="1150" class="note">KMS CMEK encryption · $0.04/M msgs (10× cheaper than SQS)</text>
  <text x="270" y="1168" class="note">SDK: pubsub-java client library</text>

  <!-- GCS -->
  <rect x="510" y="1058" width="400" height="125" rx="6" fill="#ffe0b2" stroke="#e65100" stroke-width="2"/>
  <text x="710" y="1080" class="box-label-top">GCP Cloud Storage (Standard · CMEK)</text>
  <text x="710" y="1098" class="note">content · upload · bulk-ingest buckets</text>
  <text x="710" y="1116" class="note">retention bucket (Object Retention policy — S3 Object Lock equiv.)</text>
  <text x="710" y="1134" class="note">velero backup bucket (cross-region replication ≤15 min)</text>
  <text x="710" y="1152" class="note">GCP Cloud KMS CMEK encryption (SSE)</text>
  <text x="710" y="1170" class="note">$0.020/GB-month Standard (US) — vs $0.023/GB S3</text>

  <!-- MongoDB Atlas GCP -->
  <rect x="1690" y="422" width="210" height="125" rx="6" fill="#e1d5e7" stroke="#7b1fa2" stroke-width="2"/>
