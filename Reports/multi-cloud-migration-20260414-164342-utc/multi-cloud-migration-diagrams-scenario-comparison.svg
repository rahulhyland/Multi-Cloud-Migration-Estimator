<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Scenario comparison chart">
  <defs>
    <style>
      .bg { fill: #0d1425; }
      .txt { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #f4fbff; paint-order: stroke; stroke: #070f1b; stroke-width: 1px; }
      .title { font-size: 22px; font-weight: 700; }
      .axis { stroke: #9ed8ff; stroke-width: 2; }
      .grid { stroke: #243f5f; stroke-width: 1; }
      .cost { fill: #38c7ff; }
      .speed { fill: #8cffab; }
      .risk { fill: #ff9ed9; }
      .lbl { font-size: 13px; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="txt title" x="32" y="42">Scenario Comparison: Cost-first vs Speed-first vs Risk-first</text>
  <text class="txt" x="32" y="66">Higher score indicates stronger fit for that criterion (directional)</text>

  <line class="axis" x1="120" y1="600" x2="1120" y2="600"/>
  <line class="axis" x1="120" y1="600" x2="120" y2="120"/>
  <line class="grid" x1="120" y1="520" x2="1120" y2="520"/>
  <line class="grid" x1="120" y1="440" x2="1120" y2="440"/>
  <line class="grid" x1="120" y1="360" x2="1120" y2="360"/>
  <line class="grid" x1="120" y1="280" x2="1120" y2="280"/>
  <line class="grid" x1="120" y1="200" x2="1120" y2="200"/>

  <text class="txt lbl" x="86" y="606">0</text>
  <text class="txt lbl" x="86" y="526">2</text>
  <text class="txt lbl" x="86" y="446">4</text>
  <text class="txt lbl" x="86" y="366">6</text>
  <text class="txt lbl" x="86" y="286">8</text>
  <text class="txt lbl" x="78" y="206">10</text>

  <text class="txt lbl" x="210" y="640">Cost-first</text>
  <rect class="cost" x="210" y="220" width="70" height="380"/>
  <rect class="speed" x="295" y="310" width="70" height="290"/>
  <rect class="risk" x="380" y="355" width="70" height="245"/>

  <text class="txt lbl" x="560" y="640">Speed-first</text>
  <rect class="cost" x="560" y="330" width="70" height="270"/>
  <rect class="speed" x="645" y="200" width="70" height="400"/>
  <rect class="risk" x="730" y="365" width="70" height="235"/>

  <text class="txt lbl" x="900" y="640">Risk-first</text>
  <rect class="cost" x="900" y="300" width="70" height="300"/>
  <rect class="speed" x="985" y="350" width="70" height="250"/>
  <rect class="risk" x="1070" y="210" width="70" height="390"/>

  <rect x="820" y="36" width="18" height="18" class="cost"/><text class="txt lbl" x="844" y="50">Cost score</text>
  <rect x="940" y="36" width="18" height="18" class="speed"/><text class="txt lbl" x="964" y="50">Speed score</text>
  <rect x="1060" y="36" width="18" height="18" class="risk"/><text class="txt lbl" x="1084" y="50">Risk-control score</text>
</svg>
