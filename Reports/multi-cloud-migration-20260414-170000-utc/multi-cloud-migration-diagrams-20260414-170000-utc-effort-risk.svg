<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #1a1a1a; }
      .axis-label { font-size: 12px; font-weight: bold; fill: #333333; }
      .cap-label { font-size: 10px; fill: #ffffff; font-weight: bold; text-anchor: middle; }
      .quad-label { font-size: 11px; font-style: italic; fill: #888888; }
    </style>
  </defs>
  <rect width="1200" height="800" fill="#f8f8f8" rx="8"/>

  <!-- Title -->
  <text x="600" y="38" class="title" text-anchor="middle">HxTS Migration Effort vs Risk — Capability Quadrant</text>
  <text x="600" y="58" font-size="11" text-anchor="middle" fill="#555555" font-family="Arial">Bubble size = relative migration complexity | X = Effort (Small→Large) | Y = Risk (Low→High, inverted)</text>

  <!-- Quadrant lines -->
  <line x1="110" y1="80" x2="110" y2="730" stroke="#999999" stroke-width="1.5"/>
  <line x1="110" y1="730" x2="1150" y2="730" stroke="#999999" stroke-width="1.5"/>
  <line x1="630" y1="80" x2="630" y2="730" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6,4"/>
  <line x1="110" y1="405" x2="1150" y2="405" stroke="#cccccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Quadrant background fills -->
  <rect x="110" y="80" width="520" height="325" fill="#e8f5e9" opacity="0.6"/>
  <rect x="630" y="80" width="520" height="325" fill="#fff9c4" opacity="0.6"/>
  <rect x="110" y="405" width="520" height="325" fill="#fff3e0" opacity="0.6"/>
  <rect x="630" y="405" width="520" height="325" fill="#ffebee" opacity="0.6"/>

  <!-- Quadrant labels -->
  <text x="370" y="100" class="quad-label" text-anchor="middle">Low Effort / Low Risk — Quick wins</text>
  <text x="890" y="100" class="quad-label" text-anchor="middle">High Effort / Low Risk — Plan carefully</text>
  <text x="370" y="720" class="quad-label" text-anchor="middle">Low Effort / High Risk — Validate first</text>
  <text x="890" y="720" class="quad-label" text-anchor="middle" fill="#d32f2f" font-weight="bold">High Effort / HIGH RISK — Deep focus needed</text>

  <!-- Axis labels -->
  <text x="630" y="760" class="axis-label" text-anchor="middle">Effort →</text>
  <text x="95" y="405" class="axis-label" text-anchor="middle" transform="rotate(-90, 95, 405)">Risk (Low→High) ↑</text>
  <text x="130" y="750" class="axis-label" font-size="10">Small</text>
  <text x="1100" y="750" class="axis-label" font-size="10" text-anchor="end">Large</text>
  <text x="120" y="720" class="axis-label" font-size="10">High</text>
  <text x="120" y="100" class="axis-label" font-size="10">Low</text>

  <!-- === CAPABILITIES === -->
  <!-- 1. Observability / Datadog → S / Low → quadrant: Low Effort / Low Risk -->
  <!-- x: 200, y: 200 (top-left quad) -->
  <circle cx="200" cy="200" r="40" fill="#4caf50" stroke="#1b5e20" stroke-width="2" opacity="0.9"/>
  <text x="200" y="196" class="cap-label">Datadog</text>
  <text x="200" y="209" class="cap-label">(Observability)</text>
  <text x="200" y="222" font-size="9" fill="#ffffff" text-anchor="middle">S/Low ✅</text>

  <!-- 2. ECR→ACR/AR (Registry) → S / Low -->
  <circle cx="360" cy="280" r="35" fill="#66bb6a" stroke="#1b5e20" stroke-width="2" opacity="0.9"/>
  <text x="360" y="276" class="cap-label">Registry</text>
  <text x="360" y="289" class="cap-label">ECR→ACR/AR</text>
  <text x="360" y="302" font-size="9" fill="#ffffff" text-anchor="middle">S/Low ✅</text>

  <!-- 3. DNS → S / Low -->
  <circle cx="200" cy="330" r="30" fill="#81c784" stroke="#1b5e20" stroke-width="2" opacity="0.9"/>
  <text x="200" y="326" class="cap-label">DNS</text>
  <text x="200" y="339" class="cap-label">S/Low</text>

  <!-- 4. Velero Backup → S / Medium → Low Effort, medium risk = straddles horiz axis -->
  <circle cx="490" cy="380" r="38" fill="#ff9800" stroke="#e65100" stroke-width="2" opacity="0.9"/>
  <text x="490" y="376" class="cap-label">Velero Backup</text>
  <text x="490" y="389" class="cap-label">S3→Blob/GCS</text>
  <text x="490" y="402" font-size="9" fill="#ffffff" text-anchor="middle">S/Med ⚠</text>

  <!-- 5. Networking/NetPolicy → S / Low -->
  <circle cx="350" cy="140" r="32" fill="#4caf50" stroke="#1b5e20" stroke-width="2" opacity="0.9"/>
  <text x="350" y="136" class="cap-label">Network</text>
  <text x="350" y="149" class="cap-label">Policy (Calico)</text>
  <text x="350" y="162" font-size="9" fill="#ffffff" text-anchor="middle">S/Low ✅</text>

  <!-- 6. Karpenter interim → M / Medium → High Effort / Low Risk quad -->
  <circle cx="800" cy="250" r="45" fill="#ff9800" stroke="#e65100" stroke-width="2" opacity="0.9"/>
  <text x="800" y="242" class="cap-label">Karpenter</text>
  <text x="800" y="255" class="cap-label">Interim (VMSS)</text>
  <text x="800" y="268" class="cap-label">Azure only</text>
  <text x="800" y="281" font-size="9" fill="#ffffff" text-anchor="middle">M/Med ⚠</text>

  <!-- 7. SQS→Service Bus Queuing → M / Medium → boundary -->
  <circle cx="660" cy="390" r="42" fill="#ff9800" stroke="#e65100" stroke-width="2" opacity="0.9"/>
  <text x="660" y="382" class="cap-label">Queuing</text>
  <text x="660" y="395" class="cap-label">SQS→SB/Pub/Sub</text>
  <text x="660" y="408" font-size="9" fill="#ffffff" text-anchor="middle">M/Med ⚠</text>

  <!-- 8. EFS Migration → M / Medium → boundary -->
  <circle cx="830" cy="380" r="45" fill="#ff9800" stroke="#e65100" stroke-width="2" opacity="0.9"/>
  <text x="830" y="372" class="cap-label">EFS→Azure</text>
  <text x="830" y="385" class="cap-label">Files/Filestore</text>
  <text x="830" y="398" class="cap-label">SFS migration</text>
  <text x="830" y="411" font-size="9" fill="#ffffff" text-anchor="middle">M/Med ⚠ NEW</text>

  <!-- 9. Identity / OIDC → M / High → High Effort / High Risk quad -->
  <circle cx="700" cy="570" r="48" fill="#f44336" stroke="#d32f2f" stroke-width="3" opacity="0.9"/>
  <text x="700" y="558" class="cap-label">Identity</text>
  <text x="700" y="571" class="cap-label">OIDC→Entra ID</text>
  <text x="700" y="584" class="cap-label">/ Workload Ident.</text>
  <text x="700" y="597" font-size="9" fill="#ffffff" text-anchor="middle">M/High 🔴</text>

  <!-- 10. WAF Translation → L / High → rightmost, high risk -->
  <circle cx="1000" cy="590" r="58" fill="#d32f2f" stroke="#b71c1c" stroke-width="3" opacity="0.9"/>
  <text x="1000" y="572" class="cap-label" font-size="12">WAF Rules</text>
  <text x="1000" y="587" class="cap-label" font-size="12">Translation</text>
  <text x="1000" y="602" class="cap-label" font-size="12">5 overrides</text>
  <text x="1000" y="617" class="cap-label" font-size="12">+2 custom rules</text>
  <text x="1000" y="632" font-size="9" fill="#ffffff" text-anchor="middle">L/High 🔴 ~40% rewrite</text>

  <!-- 11. SNS → SB Topics → S-M / Low-Med -->
  <circle cx="500" cy="500" r="35" fill="#ff9800" stroke="#e65100" stroke-width="2" opacity="0.9"/>
  <text x="500" y="493" class="cap-label">SNS Topics</text>
  <text x="500" y="506" class="cap-label">→ SB / Pub/Sub</text>
  <text x="500" y="519" font-size="9" fill="#ffffff" text-anchor="middle">S-M/Med</text>

  <!-- 12. Compute EKS→AKS/GKE → M / Low -->
  <circle cx="980" cy="130" r="50" fill="#1976d2" stroke="#0d47a1" stroke-width="3" opacity="0.9"/>
  <text x="980" y="118" class="cap-label" font-size="12">Compute</text>
  <text x="980" y="133" class="cap-label" font-size="12">EKS→AKS/GKE</text>
  <text x="980" y="148" class="cap-label" font-size="12">k8s 1.33 compat.</text>
  <text x="980" y="163" font-size="9" fill="#ffffff" text-anchor="middle">M/Low (AKS) | S/Low (GKE)</text>

  <!-- Legend -->
  <rect x="110" y="750" width="950" height="42" rx="4" fill="#263238"/>
  <circle cx="150" cy="771" r="12" fill="#4caf50"/>
  <text x="170" y="775" font-size="10" fill="#ffffff" font-family="Arial">Low risk</text>
  <circle cx="250" cy="771" r="12" fill="#ff9800"/>
  <text x="270" y="775" font-size="10" fill="#ffffff" font-family="Arial">Medium risk</text>
  <circle cx="380" cy="771" r="12" fill="#f44336"/>
  <text x="400" y="775" font-size="10" fill="#ffffff" font-family="Arial">High risk</text>
  <circle cx="490" cy="771" r="12" fill="#d32f2f"/>
  <text x="510" y="775" font-size="10" fill="#ffffff" font-family="Arial">Very high risk</text>
  <text x="640" y="768" font-size="10" fill="#ffffff" font-family="Arial">Bubble size = relative effort</text>
  <text x="840" y="768" font-size="10" fill="#f44336" font-weight="bold" font-family="Arial">NEW = finding not in prior report (EFS migration)</text>
</svg>
