  <rect x="1480" y="240" width="110" height="55" class="box-yellow" rx="5"/>
  <text x="1535" y="268" class="text" style="font-size: 10px;">Secrets</text>
  <rect x="1320" y="320" width="130" height="55" class="box-yellow" rx="5"/>
