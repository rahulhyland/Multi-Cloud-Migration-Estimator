<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Migration scenario comparison chart: cost-first vs speed-first vs risk-first">
  <defs>
    <style>
      .bg{fill:#0d1726}.T{font-family:'IBM Plex Sans','Segoe UI',sans-serif;fill:#ddf0ff;paint-order:stroke;stroke:#060f1e;stroke-width:0.8px}
      .axis{stroke:#3a5a80;stroke-width:1.5}.grid{stroke:#1f3254;stroke-width:1}
      .cost{fill:#ffd166}.speed{fill:#33c3ff}.risk{fill:#ff9ad8}
      .label{font-size:12px}.title{font-size:20px;font-weight:700}.legend{font-size:13px}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="T title" x="600" y="44" text-anchor="middle">Decision Scenarios — Score Comparison (0–10 scale)</text>

  <!-- Legend -->
  <rect class="cost" x="870" y="90" width="20" height="14"/><text class="T legend" x="898" y="102">Cost Savings Score</text>
  <rect class="speed" x="870" y="112" width="20" height="14"/><text class="T legend" x="898" y="124">Speed-to-Done Score</text>
  <rect class="risk" x="870" y="134" width="20" height="14"/><text class="T legend" x="898" y="146">Risk Reduction Score</text>

  <!-- Y axis (score 0-10, scale: 52px per unit) -->
  <line class="axis" x1="100" y1="80" x2="100" y2="600"/>
  <line class="axis" x1="100" y1="600" x2="820" y2="600"/>
  <text class="T label" x="90" y="604" text-anchor="end">0</text>
  <text class="T label" x="90" y="552" text-anchor="end">1</text>
  <text class="T label" x="90" y="500" text-anchor="end">2</text>
  <text class="T label" x="90" y="448" text-anchor="end">3</text>
  <text class="T label" x="90" y="396" text-anchor="end">4</text>
  <text class="T label" x="90" y="344" text-anchor="end">5</text>
  <text class="T label" x="90" y="292" text-anchor="end">6</text>
  <text class="T label" x="90" y="240" text-anchor="end">7</text>
  <text class="T label" x="90" y="188" text-anchor="end">8</text>
  <text class="T label" x="90" y="136" text-anchor="end">9</text>
  <text class="T label" x="90" y="84" text-anchor="end">10</text>

  <!-- Grid lines every 2 units -->
  <line class="grid" x1="100" y1="496" x2="820" y2="496"/>
  <line class="grid" x1="100" y1="392" x2="820" y2="392"/>
  <line class="grid" x1="100" y1="288" x2="820" y2="288"/>
  <line class="grid" x1="100" y1="184" x2="820" y2="184"/>
  <line class="grid" x1="100" y1="80" x2="820" y2="80"/>

  <!-- Scenario 1: Cost-First — recommended Azure migration
       Cost savings: 8 → h=416, y=184
       Speed: 5 → h=260, y=340
       Risk: 6 → h=312, y=288 -->
  <text class="T" x="260" y="636" text-anchor="middle" font-size="13" fill="#a8d8ff">Cost-First (Azure)</text>
  <rect class="cost" x="156" y="184" width="60" height="416"/>
  <text class="T label" x="186" y="176" text-anchor="middle" fill="#ffd166">8</text>
  <rect class="speed" x="226" y="340" width="60" height="260"/>
  <text class="T label" x="256" y="332" text-anchor="middle" fill="#33c3ff">5</text>
  <rect class="risk" x="296" y="288" width="60" height="312"/>
  <text class="T label" x="326" y="280" text-anchor="middle" fill="#ff9ad8">6</text>

  <!-- Scenario 2: Speed-First — GCP (faster tooling, Autopilot)
       Cost savings: 5 → 260, 340
       Speed: 9 → 468, 132
       Risk: 5 → 260, 340 -->
  <text class="T" x="490" y="636" text-anchor="middle" font-size="13" fill="#a8d8ff">Speed-First (GCP)</text>
  <rect class="cost" x="386" y="340" width="60" height="260"/>
  <text class="T label" x="416" y="332" text-anchor="middle" fill="#ffd166">5</text>
  <rect class="speed" x="456" y="132" width="60" height="468"/>
  <text class="T label" x="486" y="124" text-anchor="middle" fill="#33c3ff">9</text>
  <rect class="risk" x="526" y="340" width="60" height="260"/>
  <text class="T label" x="556" y="332" text-anchor="middle" fill="#ff9ad8">5</text>

  <!-- Scenario 3: Risk-First — phased dual-cloud
       Cost savings: 6 → 312, 288
       Speed: 4 → 208, 392
       Risk: 9 → 468, 132 -->
  <text class="T" x="710" y="636" text-anchor="middle" font-size="13" fill="#a8d8ff">Risk-First (Phased)</text>
  <rect class="cost" x="616" y="288" width="60" height="312"/>
  <text class="T label" x="646" y="280" text-anchor="middle" fill="#ffd166">6</text>
  <rect class="speed" x="686" y="392" width="60" height="208"/>
  <text class="T label" x="716" y="384" text-anchor="middle" fill="#33c3ff">4</text>
  <rect class="risk" x="756" y="132" width="60" height="468"/>
  <text class="T label" x="786" y="124" text-anchor="middle" fill="#ff9ad8">9</text>

  <text class="T" x="600" y="668" text-anchor="middle" font-size="11" fill="#6a9abf">Scores are directional rankings across the three optimisation dimensions (0=worst, 10=best).</text>
</svg>
