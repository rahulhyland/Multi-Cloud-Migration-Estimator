  <text x="845" y="457" class="note">GCS storage SDK</text>
  <text x="845" y="473" class="note">0.3–1 vCPU / 1.5–2 Gi</text>

  <rect x="965" y="387" width="210" height="90" rx="6" fill="#dae8fc" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="1070" y="409" class="box-label-top">HXPR API Pod 2</text>
  <text x="1070" y="425" class="note">hxpr-app-jvm v2.1.280</text>
  <text x="1070" y="441" class="note">GCP OpenSearch SDKs</text>
  <text x="1070" y="457" class="note">Atlas JDBC driver unchanged</text>
  <text x="1070" y="473" class="note">0.3–1 vCPU / 1.5–2 Gi</text>

  <rect x="1190" y="387" width="210" height="90" rx="6" fill="#dae8fc" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="1295" y="409" class="box-label-top">HXPR API Pod 3</text>
  <text x="1295" y="425" class="note">hxpr-app-jvm v2.1.280</text>
  <text x="1295" y="441" class="note">liveness /nuxeo/runningstatus</text>
  <text x="1295" y="457" class="note">GCP Secret Manager CSI</text>
  <text x="1295" y="473" class="note">0.3–1 vCPU / 1.5–2 Gi</text>

  <rect x="1415" y="387" width="165" height="90" rx="6" fill="#dae8fc" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="1497" y="413" class="box-label-top">Router Pod</text>
  <text x="1497" y="431" class="note">transform routing</text>
  <text x="1497" y="449" class="note">GCP-hosted hxts URL</text>

  <rect x="740" y="495" width="840" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1"/>
  <text x="1160" y="519" class="box-label-top">Transform Engine Workers [Not provisioned in this IaC scope]</text>
  <text x="1160" y="536" class="note">tika · imagemagick · libreoffice · docfilters · docmerge — config in hxts scope</text>

  <rect x="740" y="565" width="280" height="58" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="880" y="587" class="box-label-top">GCP Workload Identity</text>
  <text x="880" y="605" class="note">Replaces IRSA · 10+ service accounts</text>

  <rect x="740" y="636" width="280" height="55" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="880" y="658" class="box-label-top">GCP Secret Manager</text>
  <text x="880" y="675" class="note">DB creds · Pub/Sub topics · CMEK refs</text>

  <rect x="1040" y="565" width="200" height="55" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="1140" y="585" class="box-label-top">KEDA v2.x</text>
  <text x="1140" y="602" class="note">Event-driven HPA · Karpenter equiv.</text>

  <!-- Cloud Functions -->
  <rect x="80" y="382" width="320" height="115" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
