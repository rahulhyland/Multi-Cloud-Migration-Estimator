<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="1200" height="550" style="background:#0d1726;font-family:Arial,sans-serif;">
  <defs>
    <style>
      .title { font-size:15px; font-weight:bold; fill:#FFD700; }
      .axis-label { font-size:10px; fill:#B0D4F0; }
      .bar-label { font-size:9px; fill:#FFD700; font-weight:bold; }
      .cat-label { font-size:9px; fill:#AAD8FF; font-weight:bold; }
      .legend-text { font-size:11px; fill:#E8F4FD; }
    </style>
  </defs>
  <text x="600" y="28" text-anchor="middle" class="title">30-Day Total Run-Rate by Capability — AWS vs Azure vs GCP (US East, USD)</text>

  <!-- Axes -->
  <line x1="150" y1="460" x2="150" y2="50" stroke="#555" stroke-width="1"/>
  <line x1="150" y1="460" x2="1170" y2="460" stroke="#555" stroke-width="1"/>

  <!-- Y labels (scale: $0-$900, 460px height → 460/900=0.511 px/$) -->
  <text x="145" y="464" text-anchor="end" class="axis-label">$0</text>
  <text x="145" y="413" text-anchor="end" class="axis-label">$100</text>
  <text x="145" y="362" text-anchor="end" class="axis-label">$200</text>
  <text x="145" y="311" text-anchor="end" class="axis-label">$300</text>
  <text x="145" y="260" text-anchor="end" class="axis-label">$400</text>
  <text x="145" y="209" text-anchor="end" class="axis-label">$500</text>
  <text x="145" y="158" text-anchor="end" class="axis-label">$600</text>
  <text x="145" y="107" text-anchor="end" class="axis-label">$700</text>
  <text x="145" y="56" text-anchor="end" class="axis-label">$800</text>

  <!-- Grid -->
  <line x1="150" y1="413" x2="1170" y2="413" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="362" x2="1170" y2="362" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="311" x2="1170" y2="311" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="260" x2="1170" y2="260" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="209" x2="1170" y2="209" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="150" y1="158" x2="1170" y2="158" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Capability groups (7 capabilities)bar width 22px, gap 4px, group gap 20px -->
  <!-- Scale: px per dollar = 460/800 = 0.575 -->

  <!-- 1. Compute (EKS/AKS/GKE) -->
  <text x="222" y="480" text-anchor="middle" class="cat-label">Compute</text>
  <!-- AWS: $730 → h=420 y=40 -->
  <rect x="168" y="40" width="22" height="420" fill="#FF9900" opacity="0.9"/>
  <text x="179" y="36" text-anchor="middle" class="bar-label">$730</text>
  <!-- Azure: $640 → h=368 y=92 -->
  <rect x="194" y="92" width="22" height="368" fill="#0078D4" opacity="0.9"/>
  <text x="205" y="88" text-anchor="middle" class="bar-label">$640</text>
  <!-- GCP: $560 → h=322 y=138 -->
  <rect x="220" y="138" width="22" height="322" fill="#34A853" opacity="0.9"/>
  <text x="231" y="134" text-anchor="middle" class="bar-label">$560</text>

  <!-- 2. Networking -->
  <text x="365" y="480" text-anchor="middle" class="cat-label">Networking</text>
  <!-- AWS: $280 → h=161 y=299 -->
  <rect x="310" y="299" width="22" height="161" fill="#FF9900" opacity="0.9"/>
  <text x="321" y="295" text-anchor="middle" class="bar-label">$280</text>
  <!-- Azure: $240 → h=138 y=322 -->
  <rect x="336" y="322" width="22" height="138" fill="#0078D4" opacity="0.9"/>
  <text x="347" y="318" text-anchor="middle" class="bar-label">$240</text>
  <!-- GCP: $210 → h=121 y=339 -->
  <rect x="362" y="339" width="22" height="121" fill="#34A853" opacity="0.9"/>
  <text x="373" y="335" text-anchor="middle" class="bar-label">$210</text>

  <!-- 3. Messaging (SQS+SNS / Service Bus / Pub/Sub) -->
  <text x="510" y="480" text-anchor="middle" class="cat-label">Messaging</text>
  <!-- AWS: $190 → h=109 y=351 -->
  <rect x="455" y="351" width="22" height="109" fill="#FF9900" opacity="0.9"/>
  <text x="466" y="347" text-anchor="middle" class="bar-label">$190</text>
  <!-- Azure: $175 → h=101 y=359 -->
  <rect x="481" y="359" width="22" height="101" fill="#0078D4" opacity="0.9"/>
  <text x="492" y="355" text-anchor="middle" class="bar-label">$175</text>
  <!-- GCP: $145 → h=83 y=377 -->
  <rect x="507" y="377" width="22" height="83" fill="#34A853" opacity="0.9"/>
  <text x="518" y="373" text-anchor="middle" class="bar-label">$145</text>

  <!-- 4. Storage (S3/EFS/Blob/Files/GCS/Filestore) -->
  <text x="655" y="480" text-anchor="middle" class="cat-label">Storage</text>
  <!-- AWS: $310 → h=178 y=282 -->
  <rect x="600" y="282" width="22" height="178" fill="#FF9900" opacity="0.9"/>
  <text x="611" y="278" text-anchor="middle" class="bar-label">$310</text>
  <!-- Azure: $285 → h=164 y=296 -->
  <rect x="626" y="296" width="22" height="164" fill="#0078D4" opacity="0.9"/>
  <text x="637" y="292" text-anchor="middle" class="bar-label">$285</text>
  <!-- GCP: $250 → h=144 y=316 -->
  <rect x="652" y="316" width="22" height="144" fill="#34A853" opacity="0.9"/>
  <text x="663" y="312" text-anchor="middle" class="bar-label">$250</text>

  <!-- 5. Identity/Security (KMS / Key Vault / Secret Mgr) -->
  <text x="800" y="480" text-anchor="middle" class="cat-label">Security/IAM</text>
  <!-- AWS: $145 → h=83 y=377 -->
  <rect x="745" y="377" width="22" height="83" fill="#FF9900" opacity="0.9"/>
  <text x="756" y="373" text-anchor="middle" class="bar-label">$145</text>
  <!-- Azure: $130 → h=75 y=385 -->
  <rect x="771" y="385" width="22" height="75" fill="#0078D4" opacity="0.9"/>
  <text x="782" y="381" text-anchor="middle" class="bar-label">$130</text>
  <!-- GCP: $120 → h=69 y=391 -->
  <rect x="797" y="391" width="22" height="69" fill="#34A853" opacity="0.9"/>
  <text x="808" y="387" text-anchor="middle" class="bar-label">$120</text>

  <!-- 6. Observability (Datadog + CloudWatch) -->
  <text x="945" y="480" text-anchor="middle" class="cat-label">Observability</text>
  <!-- AWS: $580 → h=333 y=127 -->
  <rect x="890" y="127" width="22" height="333" fill="#FF9900" opacity="0.9"/>
  <text x="901" y="123" text-anchor="middle" class="bar-label">$580</text>
  <!-- Azure: $520 → h=299 y=161 -->
  <rect x="916" y="161" width="22" height="299" fill="#0078D4" opacity="0.9"/>
  <text x="927" y="157" text-anchor="middle" class="bar-label">$520</text>
  <!-- GCP: $490 → h=282 y=178 -->
  <rect x="942" y="178" width="22" height="282" fill="#34A853" opacity="0.9"/>
  <text x="953" y="174" text-anchor="middle" class="bar-label">$490</text>

  <!-- 7. Data/Backup (Velero/S3 CRR) -->
  <text x="1090" y="480" text-anchor="middle" class="cat-label">Backup/DR</text>
  <!-- AWS: $585 → h=336 y=124 -->
  <rect x="1035" y="124" width="22" height="336" fill="#FF9900" opacity="0.9"/>
  <text x="1046" y="120" text-anchor="middle" class="bar-label">$585</text>
  <!-- Azure: $540 → h=311 y=149 -->
  <rect x="1061" y="149" width="22" height="311" fill="#0078D4" opacity="0.9"/>
  <text x="1072" y="145" text-anchor="middle" class="bar-label">$540</text>
  <!-- GCP: $435 → h=250 y=210 -->
  <rect x="1087" y="210" width="22" height="250" fill="#34A853" opacity="0.9"/>
  <text x="1098" y="206" text-anchor="middle" class="bar-label">$435</text>

  <!-- Legend -->
  <rect x="910" y="60" width="15" height="12" fill="#FF9900"/><text x="930" y="71" class="legend-text">AWS US</text>
  <rect x="910" y="82" width="15" height="12" fill="#0078D4"/><text x="930" y="93" class="legend-text">Azure East US</text>
  <rect x="910" y="104" width="15" height="12" fill="#34A853"/><text x="930" y="115" class="legend-text">GCP us-east1</text>

  <text x="600" y="520" text-anchor="middle" font-size="9" fill="#888">Directional USD estimates. Compute includes m5.xlarge equiv node pool (3–25 nodes). Observability includes Datadog infra hosts.</text>
</svg>
