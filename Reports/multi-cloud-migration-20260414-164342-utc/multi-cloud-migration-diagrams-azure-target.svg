  <rect class="node" x="50" y="185" width="180" height="42"/><text class="txt small" x="72" y="211">App Gateway Ingress</text>
  <rect class="sec" x="245" y="185" width="185" height="42"/><text class="txt small" x="282" y="211">Azure WAF</text>

  <rect class="panel" x="470" y="80" width="650" height="510"/>
