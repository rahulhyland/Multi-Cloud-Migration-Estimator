  <text x="1795" y="1130" class="note">rancher.us.tools.hyland.dev</text>
  <text x="1795" y="1148" class="note">OKTA RBAC groups preserved</text>

  <!-- ── Arrows ── -->
  <!-- Internet → Cloud DNS → LB -->
  <line x1="900" y1="105" x2="670" y2="128" stroke="#0066cc" stroke-width="2.5" stroke-dasharray="4,2" marker-end="url(#arrow-blue)"/>
  <line x1="720" y1="180" x2="790" y2="205" stroke="#0066cc" stroke-width="2.5" marker-end="url(#arrow-blue)" filter="url(#glow)"/>
  <!-- LB → NGINX -->
  <line x1="770" y1="265" x2="550" y2="370" stroke="#0066cc" stroke-width="2.5" marker-end="url(#arrow-blue)" filter="url(#glow)"/>
  <!-- NGINX → Pods -->
  <line x1="690" y1="406" x2="740" y2="432" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="690" y1="416" x2="965" y2="432" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="690" y1="426" x2="1190" y2="432" stroke="#0066cc" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- Pods → Pub/Sub -->
  <path d="M845,477 C845,1010 270,1010 270,1058" fill="none" stroke="#ff6600" stroke-width="2.5" stroke-dasharray="7,3" marker-end="url(#arrow-orange)"/>
  <!-- Pods → GCS -->
