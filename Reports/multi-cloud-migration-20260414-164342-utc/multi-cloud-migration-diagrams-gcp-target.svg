  <rect class="node" x="225" y="125" width="205" height="42"/><text class="txt small" x="248" y="151">Cloud DNS + HTTPS LB</text>
  <rect class="node" x="50" y="185" width="180" height="42"/><text class="txt small" x="72" y="211">Ingress Gateway</text>
  <rect class="sec" x="245" y="185" width="185" height="42"/><text class="txt small" x="287" y="211">Cloud Armor</text>

  <rect class="panel" x="470" y="80" width="650" height="510"/>
  <text class="txt" x="490" y="108">GKE Cluster Boundary</text>
