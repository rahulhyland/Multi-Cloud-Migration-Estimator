  <rect class="sec" x="1005" y="655" width="100" height="40"/><text class="txt small" x="1024" y="680">IAM</text>
  <rect class="node" x="500" y="715" width="170" height="40"/><text class="txt small" x="545" y="740">Filestore</text>
  <rect class="node" x="685" y="715" width="170" height="40"/><text class="txt small" x="730" y="740">GCS Backup</text>
  <rect class="node" x="870" y="715" width="235" height="40"/><text class="txt small" x="892" y="740">Private Service Connect + VPC</text>

  <rect class="panel" x="1140" y="80" width="330" height="750"/>
  <text class="txt" x="1160" y="108">Operations</text>
  <rect class="node" x="1170" y="130" width="280" height="44"/><text class="txt small" x="1205" y="157">Cloud Monitoring</text>
  <rect class="node" x="1170" y="190" width="280" height="44"/><text class="txt small" x="1250" y="217">Datadog</text>
  <rect class="node" x="1170" y="250" width="280" height="44"/><text class="txt small" x="1215" y="277">Cloud Logging</text>
