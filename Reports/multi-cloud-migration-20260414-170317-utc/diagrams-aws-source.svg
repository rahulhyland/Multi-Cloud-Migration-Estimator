<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="980" viewBox="0 0 1560 980" role="img" aria-label="AWS source architecture diagram">
  <defs>
    <style>
      .bg{fill:#0b1220}.panel{fill:#121a2b;stroke:#4cc9f0;stroke-width:2;rx:10}.node{fill:#1b2640;stroke:#8ad7ff;stroke-width:1.8;rx:8}.sec{fill:#2a1f3d;stroke:#ff85c2;stroke-width:1.8;rx:8}.msg{fill:#1d3626;stroke:#76ff9f;stroke-width:1.8;rx:8}.obs{fill:#3b2a1b;stroke:#ffd166;stroke-width:1.8;rx:8}
      .T{font-family:'IBM Plex Sans','Segoe UI',sans-serif;fill:#f5fbff;paint-order:stroke;stroke:#06101d;stroke-width:1px}
      .sm{font-size:12px}.ti{font-size:20px;font-weight:700}
      .aA{stroke:#55f4ff;stroke-width:3;fill:none;marker-end:url(#hA)}.aB{stroke:#ff9de0;stroke-width:3;fill:none;marker-end:url(#hB)}.aC{stroke:#9cffb3;stroke-width:3;fill:none;marker-end:url(#hC)}.aD{stroke:#ffd36b;stroke-width:3;fill:none;marker-end:url(#hD)}
    </style>
    <filter id="gA"><feGaussianBlur stdDeviation="1.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="hA" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#55f4ff"/></marker>
    <marker id="hB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#ff9de0"/></marker>
    <marker id="hC" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#9cffb3"/></marker>
    <marker id="hD" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#ffd36b"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1560" height="980"/>
  <text class="T ti" x="36" y="42">AWS Source Architecture — HxTS Transform Service (From IaC)</text>

  <!-- Edge panel -->
  <rect class="panel" x="30" y="65" width="420" height="210" rx="10"/>
  <text class="T" x="48" y="93" font-size="14">Clients and Edge</text>
  <rect class="node" x="48" y="108" width="158" height="40" rx="8"/><text class="T sm" x="60" y="133">Clients / Upstream Apps</text>
  <rect class="node" x="220" y="108" width="210" height="40" rx="8"/><text class="T sm" x="233" y="133">Route53 (DNS + health checks)</text>
  <rect class="node" x="48" y="162" width="178" height="40" rx="8"/><text class="T sm" x="64" y="187">ALB / NLB Ingress</text>
  <rect class="sec" x="240" y="162" width="190" height="40" rx="8"/><text class="T sm" x="275" y="187">WAFv2 + CW Log Group</text>

  <!-- EKS cluster -->
  <rect class="panel" x="470" y="65" width="680" height="520" rx="10"/>
  <text class="T" x="490" y="93" font-size="14">EKS Cluster Boundary — m5.xlarge managed node group</text>
  <rect class="node" x="495" y="112" width="138" height="40" rx="8"/><text class="T sm" x="518" y="137">REST Pod</text>
  <rect class="node" x="648" y="112" width="138" height="40" rx="8"/><text class="T sm" x="673" y="137">Router Pod</text>
  <rect class="node" x="800" y="112" width="138" height="40" rx="8"/><text class="T sm" x="841" y="137">KEDA</text>
  <rect class="sec" x="954" y="112" width="168" height="40" rx="8"/><text class="T sm" x="970" y="137">Network Policies</text>

  <!-- Engine group -->
  <rect class="panel" x="495" y="170" width="627" height="170" rx="8"/>
  <text class="T sm" x="510" y="196">Engine Group</text>
  <rect class="node" x="510" y="208" width="80" height="36" rx="6"/><text class="T sm" x="534" y="231">tika</text>
  <rect class="node" x="598" y="208" width="118" height="36" rx="6"/><text class="T sm" x="613" y="231">imagemagick</text>
  <rect class="node" x="726" y="208" width="102" height="36" rx="6"/><text class="T sm" x="743" y="231">libreoffice</text>
  <rect class="node" x="838" y="208" width="80" height="36" rx="6"/><text class="T sm" x="862" y="231">misc</text>
  <rect class="node" x="928" y="208" width="102" height="36" rx="6"/><text class="T sm" x="946" y="231">docfilters</text>
  <rect class="node" x="510" y="254" width="110" height="36" rx="6"/><text class="T sm" x="530" y="277">docmerge</text>
  <rect class="node" x="630" y="254" width="80" height="36" rx="6"/><text class="T sm" x="654" y="277">aio</text>
  <rect class="sec" x="722" y="254" width="190" height="36" rx="6"/><text class="T sm" x="748" y="277">Kubernetes Secrets</text>
  <rect class="sec" x="922" y="254" width="108" height="36" rx="6"/><text class="T sm" x="942" y="277">Pod Identity</text>

  <!-- Extra EKS items -->
  <rect class="node" x="495" y="360" width="188" height="40" rx="8"/><text class="T sm" x="530" y="385">VPC Endpoint Service</text>
  <rect class="obs" x="700" y="360" width="170" height="40" rx="8"/><text class="T sm" x="760" y="385">Datadog Agent</text>
  <rect class="node" x="886" y="360" width="180" height="40" rx="8"/><text class="T sm" x="925" y="385">EBS CSI Driver</text>
  <rect class="node" x="495" y="415" width="200" height="40" rx="8"/><text class="T sm" x="535" y="440">CoreDNS / kube-proxy</text>
  <rect class="node" x="710" y="415" width="180" height="40" rx="8"/><text class="T sm" x="760" y="440">Karpenter</text>
  <rect class="node" x="906" y="415" width="160" height="40" rx="8"/><text class="T sm" x="945" y="440">pod_identity_agent</text>
  <rect class="node" x="495" y="465" width="570" height="40" rx="8"/><text class="T sm" x="710" y="490">cert-manager / Bottlerocket / Velero backup client</text>

  <!-- Messaging and security panel -->
  <rect class="panel" x="470" y="605" width="680" height="225" rx="10"/>
  <text class="T" x="490" y="633" font-size="14">Messaging, Security and Storage Services</text>
  <rect class="msg" x="495" y="648" width="110" height="40" rx="8"/><text class="T sm" x="532" y="673">SQS ×14</text>
  <rect class="msg" x="618" y="648" width="110" height="40" rx="8"/><text class="T sm" x="657" y="673">SNS ×2</text>
  <rect class="sec" x="742" y="648" width="110" height="40" rx="8"/><text class="T sm" x="780" y="673">KMS</text>
  <rect class="sec" x="866" y="648" width="170" height="40" rx="8"/><text class="T sm" x="893" y="673">Secrets Manager</text>
  <rect class="node" x="495" y="706" width="170" height="40" rx="8"/><text class="T sm" x="535" y="731">EFS (elastic, KMS)</text>
  <rect class="node" x="680" y="706" width="220" height="40" rx="8"/><text class="T sm" x="720" y="731">S3 Velero (STANDARD+CRR)</text>
  <rect class="sec" x="915" y="706" width="210" height="40" rx="8"/><text class="T sm" x="945" y="731">IAM Roles / IRSA</text>
  <rect class="obs" x="495" y="760" width="145" height="36" rx="8"/><text class="T sm" x="535" y="783">CloudWatch Logs</text>
  <rect class="node" x="655" y="760" width="145" height="36" rx="8"/><text class="T sm" x="694" y="783">SSM Parameters</text>
  <rect class="node" x="815" y="760" width="145" height="36" rx="8"/><text class="T sm" x="842" y="783">ACM Certificates</text>

  <!-- Operations -->
  <rect class="panel" x="1168" y="65" width="360" height="770" rx="10"/>
  <text class="T" x="1188" y="93" font-size="14">Operations and Network</text>
  <rect class="obs" x="1188" y="112" width="318" height="44" rx="8"/><text class="T sm" x="1300" y="139">Datadog</text>
  <rect class="obs" x="1188" y="170" width="318" height="44" rx="8"/><text class="T sm" x="1272" y="197">CloudWatch Logs</text>
  <rect class="node" x="1188" y="228" width="318" height="62" rx="8"/><text class="T sm" x="1200" y="255">VPC + Subnets</text><text class="T sm" x="1200" y="275">Public / Private Segments</text>
  <rect class="node" x="1188" y="304" width="318" height="44" rx="8"/><text class="T sm" x="1256" y="331">Route53 Records</text>
  <rect class="node" x="1188" y="362" width="318" height="44" rx="8"/><text class="T sm" x="1256" y="389">Security Groups</text>
  <rect class="sec" x="1188" y="420" width="318" height="44" rx="8"/><text class="T sm" x="1268" y="447">WAF (ALB policy)</text>
  <rect class="node" x="1188" y="478" width="318" height="44" rx="8"/><text class="T sm" x="1260" y="505">Rancher Import</text>
  <rect class="sec" x="1188" y="536" width="318" height="44" rx="8"/><text class="T sm" x="1220" y="563">Not found in IaC: Shield Adv.</text>
  <rect class="node" x="1188" y="594" width="318" height="44" rx="8"/><text class="T sm" x="1222" y="621">Backup region (eu-west-1)</text>

  <!-- Arrows: request flow -->
  <path class="aA" d="M206 128 L220 128"/>
  <path class="aA" d="M127 148 L127 162"/>
  <path class="aA" d="M226 182 L495 132"/>
  <path class="aB" d="M430 182 L240 182"/>
  <!-- Compute flow -->
  <path class="aA" d="M633 132 L648 132"/>
  <path class="aA" d="M786 132 L800 132"/>
  <!-- Engine signals -->
  <path class="aC" d="M717 152 L717 208"/>
  <path class="aC" d="M563 152 L563 208"/>
  <!-- Messaging -->
  <path class="aD" d="M860 152 L858 648"/>
  <path class="aD" d="M548 290 L548 648"/>
  <path class="aD" d="M680 290 L680 648"/>
  <!-- Observability -->
  <path class="aA" d="M785 380 L1188 197"/>
  <path class="aA" d="M680 726 L1188 310"/>
</svg>
