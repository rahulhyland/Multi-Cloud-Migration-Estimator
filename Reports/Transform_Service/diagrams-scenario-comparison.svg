<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="1100" height="520" style="background:#0d1726;font-family:Arial,sans-serif;">
  <defs>
    <style>
      .title { font-size:15px; font-weight:bold; fill:#FFD700; }
      .axis-label { font-size:10px; fill:#B0D4F0; }
      .bar-label { font-size:10px; fill:#FFD700; font-weight:bold; }
      .cat-label { font-size:11px; fill:#AAD8FF; font-weight:bold; }
      .legend-text { font-size:11px; fill:#E8F4FD; }
      .score-label { font-size:12px; fill:#E8F4FD; font-weight:bold; }
    </style>
  </defs>
  <text x="550" y="28" text-anchor="middle" class="title">Decision Scenarios — Cost-First vs Speed-First vs Risk-First (Score out of 10)</text>

  <!-- Axes -->
  <line x1="100" y1="440" x2="100" y2="60" stroke="#555" stroke-width="1"/>
  <line x1="100" y1="440" x2="1060" y2="440" stroke="#555" stroke-width="1"/>

  <!-- Y labels (0-10) -->
  <text x="95" y="444" text-anchor="end" class="axis-label">0</text>
  <text x="95" y="396" text-anchor="end" class="axis-label">2</text>
  <text x="95" y="348" text-anchor="end" class="axis-label">4</text>
  <text x="95" y="300" text-anchor="end" class="axis-label">6</text>
  <text x="95" y="252" text-anchor="end" class="axis-label">8</text>
  <text x="95" y="204" text-anchor="end" class="axis-label">10</text>
  <text x="95" y="156" text-anchor="end" class="axis-label">12</text>

  <line x1="100" y1="396" x2="1060" y2="396" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="348" x2="1060" y2="348" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="300" x2="1060" y2="300" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="252" x2="1060" y2="252" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="100" y1="204" x2="1060" y2="204" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Scenario 1: Cost-First (Azure) -->
  <text x="303" y="468" text-anchor="middle" class="cat-label">Cost-First (→ GCP)</text>

  <!-- Cost savings: GCP 8/10 h=156 y=252 -->
  <rect x="145" y="252" width="30" height="156" fill="#34A853" opacity="0.9"/>
  <text x="160" y="248" text-anchor="middle" class="bar-label">8</text>
  <!-- Migration speed: GCP 7 h=137 y=271 -->
  <rect x="185" y="271" width="30" height="137" fill="#4285F4" opacity="0.85"/>
  <text x="200" y="267" text-anchor="middle" class="bar-label">7</text>
  <!-- Risk level (inverted, lower=better for risk): GCP 6 h=117 y=291 -->
  <rect x="225" y="291" width="30" height="117" fill="#EA4335" opacity="0.85"/>
  <text x="240" y="287" text-anchor="middle" class="bar-label">6</text>
  <!-- Ops complexity: GCP 6 h=117 y=291 -->
  <rect x="265" y="291" width="30" height="117" fill="#FBBC04" opacity="0.85"/>
  <text x="280" y="287" text-anchor="middle" class="bar-label">6</text>
  <!-- Vendor fit: GCP 7 h=137 y=271 -->
  <rect x="305" y="271" width="30" height="137" fill="#9C27B0" opacity="0.85"/>
  <text x="320" y="267" text-anchor="middle" class="bar-label">7</text>

  <!-- Scenario 2: Speed-First (Azure) -->
  <text x="618" y="468" text-anchor="middle" class="cat-label">Speed-First (→ Azure)</text>
  <!-- Cost savings: Azure 7 h=137 y=271 -->
  <rect x="460" y="271" width="30" height="137" fill="#34A853" opacity="0.9"/>
  <text x="475" y="267" text-anchor="middle" class="bar-label">7</text>
  <!-- Migration speed: Azure 9 h=175 y=233 -->
  <rect x="500" y="233" width="30" height="175" fill="#4285F4" opacity="0.85"/>
  <text x="515" y="229" text-anchor="middle" class="bar-label">9</text>
  <!-- Risk: Azure 7 h=137 y=271 -->
  <rect x="540" y="271" width="30" height="137" fill="#EA4335" opacity="0.85"/>
  <text x="555" y="267" text-anchor="middle" class="bar-label">7</text>
  <!-- Ops complexity: Azure 8 h=156 y=252 -->
  <rect x="580" y="252" width="30" height="156" fill="#FBBC04" opacity="0.85"/>
  <text x="595" y="248" text-anchor="middle" class="bar-label">8</text>
  <!-- Vendor fit: Azure 8 h=156 y=252 -->
  <rect x="620" y="252" width="30" height="156" fill="#9C27B0" opacity="0.85"/>
  <text x="635" y="248" text-anchor="middle" class="bar-label">8</text>

  <!-- Scenario 3: Risk-First (Azure phased) -->
  <text x="910" y="468" text-anchor="middle" class="cat-label">Risk-First (Phased Azure)</text>
  <!-- Cost savings: 6 h=117 y=291 -->
  <rect x="760" y="291" width="30" height="117" fill="#34A853" opacity="0.9"/>
  <text x="775" y="287" text-anchor="middle" class="bar-label">6</text>
  <!-- Migration speed: 6 h=117 y=291 -->
  <rect x="800" y="291" width="30" height="117" fill="#4285F4" opacity="0.85"/>
  <text x="815" y="287" text-anchor="middle" class="bar-label">6</text>
  <!-- Risk (inverted best=10): 9 h=175 y=233 -->
  <rect x="840" y="233" width="30" height="175" fill="#EA4335" opacity="0.85"/>
  <text x="855" y="229" text-anchor="middle" class="bar-label">9</text>
  <!-- Ops complexity: 7 h=137 y=271 -->
  <rect x="880" y="271" width="30" height="137" fill="#FBBC04" opacity="0.85"/>
  <text x="895" y="267" text-anchor="middle" class="bar-label">7</text>
  <!-- Vendor fit: 8 h=156 y=252 -->
  <rect x="920" y="252" width="30" height="156" fill="#9C27B0" opacity="0.85"/>
  <text x="935" y="248" text-anchor="middle" class="bar-label">8</text>

  <!-- Legend (dimensions) -->
  <rect x="120" y="60" width="12" height="10" fill="#34A853"/><text x="136" y="70" class="legend-text">Cost Savings</text>
  <rect x="120" y="78" width="12" height="10" fill="#4285F4"/><text x="136" y="88" class="legend-text">Migration Speed</text>
  <rect x="120" y="96" width="12" height="10" fill="#EA4335"/><text x="136" y="106" class="legend-text">Risk Mitigation</text>
  <rect x="120" y="114" width="12" height="10" fill="#FBBC04"/><text x="136" y="124" class="legend-text">Ops Simplicity</text>
  <rect x="120" y="132" width="12" height="10" fill="#9C27B0"/><text x="136" y="142" class="legend-text">Vendor / Ecosystem Fit</text>

  <text x="550" y="500" text-anchor="middle" font-size="9" fill="#888">Score 0–10 per dimension across decision scenarios. Higher = better for that criterion. Risk Mitigation = quality of risk controls in that scenario.</text>
</svg>
