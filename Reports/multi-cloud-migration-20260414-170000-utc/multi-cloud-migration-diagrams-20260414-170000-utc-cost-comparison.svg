<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #1a1a1a; }
      .subtitle { font-size: 12px; fill: #555555; }
      .axis-label { font-size: 11px; font-weight: bold; fill: #333333; }
      .bar-label { font-size: 11px; font-weight: bold; fill: #1a1a1a; }
      .value-label { font-size: 10px; fill: #ffffff; font-weight: bold; }
      .delta-pos { font-size: 11px; fill: #2e7d32; font-weight: bold; }
      .delta-neg { font-size: 11px; fill: #b71c1c; font-weight: bold; }
      .note { font-size: 10px; fill: #333333; }
    </style>
  </defs>
  <rect width="1400" height="900" fill="#fafafa" rx="8"/>

  <!-- Title -->
  <text x="700" y="38" class="title" text-anchor="middle">HxTS Regional Cost Comparison — AWS vs Azure vs GCP (USD, Directional)</text>
  <text x="700" y="58" class="subtitle" text-anchor="middle">30-day run-rate per region | 5 environments (sandbox/dev/staging/prod/prod-eu) | Compute + Messaging + Storage + Ingress + Observability</text>

  <!-- Y-axis baseline -->
  <line x1="80" y1="90" x2="80" y2="740" stroke="#999999" stroke-width="1.5"/>
  <!-- X-axis baseline -->
  <line x1="80" y1="740" x2="1350" y2="740" stroke="#999999" stroke-width="1.5"/>

  <!-- Y-axis labels (monthly totals) -->
  <text x="70" y="100" class="axis-label" text-anchor="end">$25K</text>
  <line x1="78" y1="100" x2="1350" y2="100" stroke="#eeeeee" stroke-width="1"/>
  <text x="70" y="200" class="axis-label" text-anchor="end">$20K</text>
  <line x1="78" y1="200" x2="1350" y2="200" stroke="#eeeeee" stroke-width="1"/>
  <text x="70" y="300" class="axis-label" text-anchor="end">$15K</text>
  <line x1="78" y1="300" x2="1350" y2="300" stroke="#eeeeee" stroke-width="1"/>
  <text x="70" y="400" class="axis-label" text-anchor="end">$10K</text>
  <line x1="78" y1="400" x2="1350" y2="400" stroke="#eeeeee" stroke-width="1"/>
  <text x="70" y="500" class="axis-label" text-anchor="end">$5K</text>
  <line x1="78" y1="500" x2="1350" y2="500" stroke="#eeeeee" stroke-width="1"/>
  <text x="70" y="600" class="axis-label" text-anchor="end">$2.5K</text>
  <line x1="78" y1="600" x2="1350" y2="600" stroke="#eeeeee" stroke-width="1"/>
  <text x="70" y="740" class="axis-label" text-anchor="end">$0</text>

  <!-- Scale: 1K = 28.8px so 25K = 720px, 20K=576px, 15K=432px, 10K=288px, 5K=144px  |  base = 740 -->
  <!-- AWS US prod env blended monthly 30d: ~$21,700/mo → bar height = 624px → y = 740-624=116 -->
  <!-- Azure US: ~$18,400/mo → height=529 → y=211 -->
  <!-- GCP US: ~$14,500/mo → height=418 → y=322 -->
  <!-- EU roughly same due to pricing parity -->

  <!-- === US EAST Region === -->
  <text x="280" y="780" class="bar-label" text-anchor="middle" font-size="13">US East Region (us-east-1)</text>

  <!-- AWS US -->
  <rect x="115" y="116" width="90" height="624" rx="4" fill="#FF9900" stroke="#c47a00" stroke-width="1.5"/>
  <text x="160" y="390" class="value-label" text-anchor="middle" transform="rotate(-90, 160, 390)">$21,707/mo</text>
  <text x="160" y="750" class="bar-label" text-anchor="middle" font-size="9">AWS US</text>
  <text x="160" y="108" class="bar-label" text-anchor="middle" font-size="10">baseline</text>

  <!-- Azure US -->
  <rect x="220" y="211" width="90" height="529" rx="4" fill="#0078D4" stroke="#004da0" stroke-width="1.5"/>
  <text x="265" y="460" class="value-label" text-anchor="middle" transform="rotate(-90, 265, 460)">$18,422/mo</text>
  <text x="265" y="750" class="bar-label" text-anchor="middle" font-size="9">Azure US</text>
  <text x="265" y="203" class="delta-pos" text-anchor="middle">–15.1%</text>

  <!-- GCP US -->
  <rect x="325" y="322" width="90" height="418" rx="4" fill="#34A853" stroke="#1e7e34" stroke-width="1.5"/>
  <text x="370" y="520" class="value-label" text-anchor="middle" transform="rotate(-90, 370, 520)">$14,918/mo</text>
  <text x="370" y="750" class="bar-label" text-anchor="middle" font-size="9">GCP US</text>
  <text x="370" y="314" class="delta-pos" text-anchor="middle">–31.3%</text>

  <!-- === EU WEST Region === -->
  <text x="600" y="780" class="bar-label" text-anchor="middle" font-size="13">EU (eu-central-1 / europe-west1)</text>

  <!-- AWS EU -->
  <rect x="445" y="116" width="90" height="624" rx="4" fill="#FF9900" stroke="#c47a00" stroke-width="1.5"/>
  <text x="490" y="390" class="value-label" text-anchor="middle" transform="rotate(-90, 490, 390)">$21,707/mo</text>
  <text x="490" y="750" class="bar-label" text-anchor="middle" font-size="9">AWS EU</text>

  <!-- Azure EU -->
  <rect x="550" y="202" width="90" height="538" rx="4" fill="#0078D4" stroke="#004da0" stroke-width="1.5"/>
  <text x="595" y="460" class="value-label" text-anchor="middle" transform="rotate(-90, 595, 460)">$18,712/mo</text>
  <text x="595" y="750" class="bar-label" text-anchor="middle" font-size="9">Azure EU</text>
  <text x="595" y="194" class="delta-pos" text-anchor="middle">–13.8%</text>

  <!-- GCP EU -->
  <rect x="655" y="305" width="90" height="435" rx="4" fill="#34A853" stroke="#1e7e34" stroke-width="1.5"/>
  <text x="700" y="510" class="value-label" text-anchor="middle" transform="rotate(-90, 700, 510)">$15,625/mo</text>
  <text x="700" y="750" class="bar-label" text-anchor="middle" font-size="9">GCP EU</text>
  <text x="700" y="297" class="delta-pos" text-anchor="middle">–28.0%</text>

  <!-- AU / AP Region (projected, assume 10% premium on AWS) -->
  <text x="920" y="780" class="bar-label" text-anchor="middle" font-size="13">AU / AP Region (projected)</text>

  <!-- AWS AU -->
  <rect x="775" y="96" width="90" height="644" rx="4" fill="#FF9900" stroke="#c47a00" stroke-width="1.5"/>
  <text x="820" y="380" class="value-label" text-anchor="middle" transform="rotate(-90, 820, 380)">$23,878/mo +10%</text>
  <text x="820" y="750" class="bar-label" text-anchor="middle" font-size="9">AWS AU</text>
  <text x="820" y="88" class="bar-label" text-anchor="middle" font-size="10">est.</text>

  <!-- Azure AU -->
  <rect x="880" y="185" width="90" height="555" rx="4" fill="#0078D4" stroke="#004da0" stroke-width="1.5"/>
  <text x="925" y="450" class="value-label" text-anchor="middle" transform="rotate(-90, 925, 450)">$20,264/mo</text>
  <text x="925" y="750" class="bar-label" text-anchor="middle" font-size="9">Azure AU</text>
  <text x="925" y="177" class="delta-pos" text-anchor="middle">–15.1%</text>

  <!-- GCP AU -->
  <rect x="985" y="290" width="90" height="450" rx="4" fill="#34A853" stroke="#1e7e34" stroke-width="1.5"/>
  <text x="1030" y="505" class="value-label" text-anchor="middle" transform="rotate(-90, 1030, 505)">$16,715/mo</text>
  <text x="1030" y="750" class="bar-label" text-anchor="middle" font-size="9">GCP AU</text>
  <text x="1030" y="282" class="delta-pos" text-anchor="middle">–30.0%</text>

  <!-- Legend -->
  <rect x="1130" y="100" width="150" height="30" rx="4" fill="#FF9900" stroke="#c47a00"/>
  <text x="1145" y="120" class="bar-label" fill="#1a1a1a" font-size="11">AWS (baseline)</text>
  <rect x="1130" y="145" width="150" height="30" rx="4" fill="#0078D4" stroke="#004da0"/>
  <text x="1145" y="165" class="bar-label" fill="#ffffff" font-size="11">Azure (–10.1 to –15.1%)</text>
  <rect x="1130" y="190" width="150" height="30" rx="4" fill="#34A853" stroke="#1e7e34"/>
  <text x="1145" y="210" class="bar-label" fill="#ffffff" font-size="11">GCP (–28 to –31.3%)</text>

  <!-- Cumulative note -->
  <rect x="80" y="800" width="1280" height="85" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="700" y="822" class="bar-label" text-anchor="middle" font-size="12">Multi-Environment Blended Annual Run-Rate (5 envs): AWS ~$260,484/yr | Azure ~$221,064/yr (–15.1%) | GCP ~$178,614/yr (–31.4%)</text>
  <text x="700" y="843" class="note" text-anchor="middle">One-time migration: Azure ~$46.5K | GCP ~$41.5K. Azure payback ~13 months. GCP payback ~14 months (higher run-rate delta vs migration cost)</text>
  <text x="700" y="862" class="note" text-anchor="middle">Major cost drivers: EKS/AKS/GKE compute (55%), SQS/SB/Pub/Sub messaging (15%), EFS/Azure Files/Filestore (8%), Data Transfer (12%), KMS+DNS+Observability (10%)</text>
  <text x="700" y="881" class="note" text-anchor="middle">⚠ All figures are DIRECTIONAL ESTIMATES based on public list pricing. Not contract quotes. Currency: USD. AU region estimated (not in current AWS footprint).</text>
</svg>
