<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620" font-family="Segoe UI, Arial, sans-serif">
  <rect width="1100" height="620" fill="#ffffff" rx="8"/>
  <text x="550" y="36" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">HxPR Regional Cost Comparison — 30-Day Total Run-Rate (USD)</text>

  <!-- Y axis labels (scale: $6000 max, 1px = $12, y_bar = 530 - value/12) -->
  <text x="62" y="530" text-anchor="end" font-size="10" fill="#555">$0</text>
  <text x="62" y="488" text-anchor="end" font-size="10" fill="#555">$500</text>
  <text x="62" y="447" text-anchor="end" font-size="10" fill="#555">$1,000</text>
  <text x="62" y="405" text-anchor="end" font-size="10" fill="#555">$1,500</text>
  <text x="62" y="363" text-anchor="end" font-size="10" fill="#555">$2,000</text>
  <text x="62" y="322" text-anchor="end" font-size="10" fill="#555">$2,500</text>
  <text x="62" y="280" text-anchor="end" font-size="10" fill="#555">$3,000</text>
  <text x="62" y="238" text-anchor="end" font-size="10" fill="#555">$3,500</text>
  <text x="62" y="197" text-anchor="end" font-size="10" fill="#555">$4,000</text>
  <text x="62" y="155" text-anchor="end" font-size="10" fill="#555">$4,500</text>
  <text x="62" y="113" text-anchor="end" font-size="10" fill="#555">$5,000</text>
  <text x="62" y="72" text-anchor="end" font-size="10" fill="#555">$5,500</text>

  <!-- Grid lines -->
  <line x1="68" y1="530" x2="1060" y2="530" stroke="#e0e0e0" stroke-width="1"/>
  <line x1="68" y1="113" x2="1060" y2="113" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="68" y1="197" x2="1060" y2="197" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="68" y1="280" x2="1060" y2="280" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="68" y1="363" x2="1060" y2="363" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="68" y1="447" x2="1060" y2="447" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Axes -->
  <line x1="68" y1="55" x2="68" y2="535" stroke="#333" stroke-width="2"/>
  <line x1="68" y1="530" x2="1065" y2="530" stroke="#333" stroke-width="2"/>
  <text x="22" y="300" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,22,300)">USD / month</text>

  <!-- Bar width 60, gap ~50 between groups, ~20 between bars in group -->
  <!-- AWS US $5,092 → h=424, y=106 -->
  <rect x="90" y="106" width="60" height="424" fill="#FF9900" opacity="0.9"/>
  <text x="120" y="98" text-anchor="middle" font-size="10" font-weight="bold" fill="#FF9900">$5,092</text>
  <text x="120" y="556" text-anchor="middle" font-size="10" fill="#333">AWS&#xa;US</text>
  <!-- AWS EU $5,579 → h=465, y=65 -->
  <rect x="165" y="65" width="60" height="465" fill="#FF9900" opacity="0.9"/>
  <text x="195" y="57" text-anchor="middle" font-size="10" font-weight="bold" fill="#d47a00">$5,579</text>
  <text x="195" y="556" text-anchor="middle" font-size="10" fill="#333">AWS&#xa;EU</text>
  <!-- AWS AU $5,925 → h=494, y=36 -->
  <rect x="240" y="36" width="60" height="494" fill="#FF9900" opacity="0.9"/>
  <text x="270" y="28" text-anchor="middle" font-size="10" font-weight="bold" fill="#d47a00">$5,925</text>
  <text x="270" y="556" text-anchor="middle" font-size="10" fill="#333">AWS&#xa;AU</text>

  <!-- Azure US $4,678 → h=390, y=140 -->
  <rect x="380" y="140" width="60" height="390" fill="#0078d4" opacity="0.9"/>
  <text x="410" y="132" text-anchor="middle" font-size="10" font-weight="bold" fill="#0078d4">$4,678</text>
  <text x="410" y="556" text-anchor="middle" font-size="10" fill="#333">Azure&#xa;US</text>
  <!-- Azure EU $5,055 → h=421, y=109 -->
  <rect x="455" y="109" width="60" height="421" fill="#0078d4" opacity="0.9"/>
  <text x="485" y="101" text-anchor="middle" font-size="10" font-weight="bold" fill="#0078d4">$5,055</text>
  <text x="485" y="556" text-anchor="middle" font-size="10" fill="#333">Azure&#xa;EU</text>
  <!-- Azure AU $5,434 → h=453, y=77 -->
  <rect x="530" y="77" width="60" height="453" fill="#0078d4" opacity="0.9"/>
  <text x="560" y="69" text-anchor="middle" font-size="10" font-weight="bold" fill="#004ea2">$5,434</text>
  <text x="560" y="556" text-anchor="middle" font-size="10" fill="#333">Azure&#xa;AU</text>

  <!-- GCP US $4,428 → h=369, y=161 -->
  <rect x="670" y="161" width="60" height="369" fill="#34a853" opacity="0.9"/>
  <text x="700" y="153" text-anchor="middle" font-size="10" font-weight="bold" fill="#34a853">$4,428</text>
  <text x="700" y="556" text-anchor="middle" font-size="10" fill="#333">GCP&#xa;US</text>
  <!-- GCP EU $4,818 → h=402, y=128 -->
  <rect x="745" y="128" width="60" height="402" fill="#34a853" opacity="0.9"/>
  <text x="775" y="120" text-anchor="middle" font-size="10" font-weight="bold" fill="#34a853">$4,818</text>
  <text x="775" y="556" text-anchor="middle" font-size="10" fill="#333">GCP&#xa;EU</text>
  <!-- GCP AU $5,119 → h=427, y=103 -->
  <rect x="820" y="103" width="60" height="427" fill="#34a853" opacity="0.9"/>
  <text x="850" y="95" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e7e34">$5,119</text>
  <text x="850" y="556" text-anchor="middle" font-size="10" fill="#333">GCP&#xa;AU</text>

  <!-- Group labels -->
  <text x="195" y="578" text-anchor="middle" font-size="12" font-weight="bold" fill="#FF9900">AWS (Baseline)</text>
  <text x="485" y="578" text-anchor="middle" font-size="12" font-weight="bold" fill="#0078d4">Azure</text>
  <text x="770" y="578" text-anchor="middle" font-size="12" font-weight="bold" fill="#34a853">GCP</text>

  <!-- Delta annotations -->
  <text x="485" y="595" text-anchor="middle" font-size="10" fill="#0078d4">-8% to -9% vs AWS</text>
  <text x="770" y="595" text-anchor="middle" font-size="10" fill="#34a853">-13% to -14% vs AWS</text>

  <!-- Legend -->
  <rect x="300" y="605" width="14" height="10" fill="#FF9900" opacity="0.9"/>
  <text x="320" y="614" font-size="10" fill="#333">AWS</text>
  <rect x="380" y="605" width="14" height="10" fill="#0078d4" opacity="0.9"/>
  <text x="400" y="614" font-size="10" fill="#333">Azure</text>
  <rect x="460" y="605" width="14" height="10" fill="#34a853" opacity="0.9"/>
  <text x="480" y="614" font-size="10" fill="#333">GCP</text>
  <text x="560" y="614" font-size="10" fill="#888" font-style="italic">Directional USD estimates · On-demand pricing</text>
</svg>
