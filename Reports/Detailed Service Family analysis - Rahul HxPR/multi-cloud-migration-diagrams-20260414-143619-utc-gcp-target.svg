<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1500" width="1920" height="1500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0066cc"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6600"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#009900"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9900cc"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cc0000"/>
    </marker>
    <style>
      .title { font-size: 18px; font-weight: bold; fill: #1a1a2e; }
      .section-label { font-size: 12px; font-weight: bold; fill: #1b5e20; }
      .box-label { font-size: 10px; fill: #1a1a2e; text-anchor: middle; }
      .box-label-top { font-size: 11px; font-weight: bold; fill: #1a1a2e; text-anchor: middle; }
      .note { font-size: 9px; fill: #424242; text-anchor: middle; }
      .dashed-note { font-size: 9px; fill: #888; text-anchor: middle; font-style: italic; }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1500" fill="#f1f8e9"/>

  <!-- Title -->
  <text x="960" y="35" text-anchor="middle" class="title">GCP Target Architecture — HxPR Platform Migration</text>

  <!-- Internet -->
  <rect x="660" y="50" width="600" height="55" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="960" y="72" class="box-label-top">Internet / Upstream Clients</text>
  <text x="960" y="90" class="note">hxp.experience.hyland.com · hxp.app.hyland.com · hxp.app.hyland.eu</text>

  <!-- Cloud DNS -->
  <rect x="450" y="128" width="300" height="52" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="600" y="150" class="box-label-top">GCP Cloud DNS</text>
  <text x="600" y="168" class="note">experience.hyland.com / app.hyland.eu zones</text>

  <!-- cert-manager -->
  <rect x="780" y="128" width="280" height="52" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="920" y="150" class="box-label-top">cert-manager v1.20.0</text>
  <text x="920" y="168" class="note">GCP Cloud DNS01 solver · Workload Identity</text>

  <!-- HTTPS LB + Cloud Armor -->
  <rect x="550" y="205" width="580" height="60" rx="8" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="840" y="228" class="box-label-top">GCP HTTPS External Load Balancer (Premium) + Cloud Armor</text>
  <text x="840" y="246" class="note">CRS managed rules · custom SSL policy (TLS 1.2+) · Backend Service timeout 900s</text>

  <!-- GCP VPC -->
  <rect x="40" y="290" width="1840" height="1060" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="60" y="314" class="section-label">GCP VPC (us-central1 · europe-west1) — 3 Zones · Private Subnets</text>

  <!-- GKE Cluster -->
