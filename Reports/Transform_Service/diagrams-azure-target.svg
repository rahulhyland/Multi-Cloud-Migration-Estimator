<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100" style="background:#0d1b2a;font-family:Arial,sans-serif;">
  <defs>
    <style>
      .title { font-size:15px; font-weight:bold; fill:#00B4FF; }
      .label { font-size:11px; fill:#E8F4FD; font-weight:bold; }
      .sublabel { font-size:9px; fill:#A0C8E8; }
      .section-title { font-size:13px; font-weight:bold; fill:#00FFCC; }
      .arrow { stroke:#00FF88; stroke-width:2.5; fill:none; marker-end:url(#ah); }
      .arrow-msg { stroke:#FF9900; stroke-width:2; fill:none; stroke-dasharray:6,3; marker-end:url(#ah-o); }
      .arrow-sec { stroke:#FF4444; stroke-width:2; fill:none; stroke-dasharray:4,3; marker-end:url(#ah-r); }
      .arrow-obs { stroke:#AA00FF; stroke-width:2; fill:none; stroke-dasharray:3,3; marker-end:url(#ah-p); }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#00FF88"/></marker>
    <marker id="ah-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF9900"/></marker>
    <marker id="ah-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF4444"/></marker>
    <marker id="ah-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#AA00FF"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Azure VNet wrapper -->
  <rect x="10" y="10" width="1580" height="1080" rx="8" fill="#0a1826" stroke="#0078D4" stroke-width="3"/>
  <text x="20" y="35" class="title" filter="url(#glow)">Azure Virtual Network — HxTS Target (East US / West Europe)</text>
  <rect x="1350" y="12" width="235" height="28" rx="4" fill="#0078D4" opacity="0.9"/>
  <text x="1360" y="30" font-size="11" font-weight="bold" fill="#fff">US: eastus  |  EU: westeurope</text>

  <!-- Top row: edge / security / identity -->
  <rect x="20" y="48" width="120" height="55" rx="6" fill="#0a2030" stroke="#0078D4" stroke-width="2"/>
  <text x="30" y="68" class="label">Azure DNS</text>
  <text x="30" y="82" class="sublabel">Private + Public Zones</text>

  <rect x="155" y="48" width="170" height="55" rx="6" fill="#0a2030" stroke="#0078D4" stroke-width="2"/>
  <text x="165" y="68" class="label">Front Door + WAF</text>
  <text x="165" y="82" class="sublabel">Global edge · OWASP ruleset</text>

  <rect x="340" y="48" width="185" height="55" rx="6" fill="#0a2030" stroke="#0078D4" stroke-width="2"/>
  <text x="350" y="68" class="label">App Gateway v2</text>
  <text x="350" y="82" class="sublabel">Regional ingress · SSL term</text>

  <rect x="540" y="48" width="180" height="55" rx="6" fill="#1a0a3a" stroke="#8C4FFF" stroke-width="2"/>
  <text x="550" y="68" class="label">Private Endpoint</text>
  <text x="550" y="82" class="sublabel">≈ VPC Endpoint Service</text>

  <rect x="735" y="48" width="175" height="55" rx="6" fill="#2a0a0a" stroke="#f44336" stroke-width="2"/>
  <text x="745" y="68" class="label">Azure Key Vault</text>
  <text x="745" y="82" class="sublabel">Secrets + CMK encryption</text>

  <rect x="925" y="48" width="185" height="55" rx="6" fill="#2a0a0a" stroke="#f44336" stroke-width="2"/>
  <text x="935" y="68" class="label">Managed Identity</text>
  <text x="935" y="82" class="sublabel">Workload-level RBAC (≈ IRSA)</text>

  <rect x="1125" y="48" width="180" height="55" rx="6" fill="#2a0a0a" stroke="#f44336" stroke-width="2"/>
  <text x="1135" y="68" class="label">Entra ID</text>
  <text x="1135" y="82" class="sublabel">OIDC / OAuth2 / SSO</text>

  <rect x="1320" y="48" width="175" height="55" rx="6" fill="#2a2a00" stroke="#d6b656" stroke-width="2"/>
  <text x="1330" y="68" class="label">ACR (georeplicated)</text>
  <text x="1330" y="82" class="sublabel">≈ ECR · container images</text>

  <!-- Arrows row -->
  <line x1="140" y1="75" x2="153" y2="75" class="arrow"/>
  <line x1="325" y1="75" x2="338" y2="75" class="arrow"/>
  <line x1="525" y1="75" x2="538" y2="75" class="arrow"/>

  <!-- AKS cluster -->
  <rect x="20" y="118" width="1560" height="730" rx="8" fill="#081510" stroke="#4CAF50" stroke-width="2"/>
  <text x="30" y="140" class="section-title">AKS Cluster — Standard_D4s_v3 (min:3 / max:25) · Node Auto Provisioner · Azure CNI</text>

  <!-- Addons row -->
  <rect x="30" y="148" width="140" height="50" rx="5" fill="#1a2a0a" stroke="#d6b656" stroke-width="1.5"/>
  <text x="40" y="167" class="label">KEDA v2.x</text>
  <text x="40" y="181" class="sublabel">Service Bus Scaler</text>

  <rect x="185" y="148" width="150" height="50" rx="5" fill="#1a2a0a" stroke="#d6b656" stroke-width="1.5"/>
  <text x="195" y="167" class="label">ingress-nginx</text>
  <text x="195" y="181" class="sublabel">Internal Azure LB</text>

  <rect x="350" y="148" width="150" height="50" rx="5" fill="#1a2a0a" stroke="#d6b656" stroke-width="1.5"/>
  <text x="360" y="167" class="label">cert-manager</text>
  <text x="360" y="181" class="sublabel">Azure DNS ACME</text>

  <rect x="515" y="148" width="165" height="50" rx="5" fill="#2a1a3a" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="525" y="167" class="label">Datadog Agent</text>
  <text x="525" y="181" class="sublabel">APM + infra metrics</text>

  <rect x="695" y="148" width="155" height="50" rx="5" fill="#2a0a0a" stroke="#f44336" stroke-width="1.5"/>
  <text x="705" y="167" class="label">Velero</text>
  <text x="705" y="181" class="sublabel">Backup → Azure Blob</text>

  <rect x="865" y="148" width="180" height="50" rx="5" fill="#1a2a0a" stroke="#d6b656" stroke-width="1.5"/>
  <text x="875" y="167" class="label">AKS Addons</text>
  <text x="875" y="181" class="sublabel">OMS / Policy / Monitor</text>

  <rect x="1060" y="148" width="195" height="50" rx="5" fill="#1a0a2a" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="1070" y="167" class="label">CSI Secret Store</text>
  <text x="1070" y="181" class="sublabel">Key Vault integration</text>

  <!-- HXTS namespace -->
  <rect x="30" y="210" width="1540" height="510" rx="6" fill="#0f1f0f" stroke="#555" stroke-width="1.5"/>
  <text x="42" y="232" font-size="12" font-weight="bold" fill="#FFD700">Namespace: hxts-&#123;environment&#125;</text>

  <!-- Core service pods -->
  <rect x="42" y="244" width="215" height="100" rx="5" fill="#0d2a0d" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="52" y="264" class="label">REST Pod</text>
  <text x="52" y="278" class="sublabel">hxp-transform-rest:3.0.x</text>
  <text x="52" y="292" class="sublabel">Image migrated ECR → ACR</text>
  <text x="52" y="306" class="sublabel">CPU: 800m–2000m</text>
  <text x="52" y="320" class="sublabel">Mem: 750Mi–1500Mi · port 8095</text>

  <rect x="270" y="244" width="215" height="100" rx="5" fill="#0d2a0d" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="280" y="264" class="label">Router Pod</text>
  <text x="280" y="278" class="sublabel">hxp-transform-router:3.0.x</text>
  <text x="280" y="292" class="sublabel">Service Bus queue scaler</text>
  <text x="280" y="306" class="sublabel">CPU: 800m–2000m</text>
  <text x="280" y="320" class="sublabel">Mem: 750Mi–1500Mi</text>

  <!-- Engine pods -->
  <rect x="42" y="356" width="170" height="75" rx="5" fill="#0a1a3a" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="52" y="376" class="label">Tika Engine</text>
  <text x="52" y="390" class="sublabel">hxp-transform-tika:3.0.x</text>
  <text x="52" y="404" class="sublabel">Service Bus scaler (3/msg)</text>

  <rect x="224" y="356" width="185" height="75" rx="5" fill="#0a1a3a" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="234" y="376" class="label">ImageMagick Engine</text>
  <text x="234" y="390" class="sublabel">hxp-transform-imagemagick</text>
  <text x="234" y="404" class="sublabel">Mem lim: 2000Mi</text>

  <rect x="421" y="356" width="175" height="75" rx="5" fill="#0a1a3a" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="431" y="376" class="label">LibreOffice Engine</text>
  <text x="431" y="390" class="sublabel">hxp-transform-libreoffice</text>
  <text x="431" y="404" class="sublabel">scaler: 10 msgs</text>

  <rect x="608" y="356" width="170" height="75" rx="5" fill="#0a1a3a" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="618" y="376" class="label">DocFilters Engine</text>
  <text x="618" y="390" class="sublabel">hxp-transform-docfilters</text>
  <text x="618" y="404" class="sublabel">scaler: 2 msgs</text>

  <rect x="790" y="356" width="170" height="75" rx="5" fill="#0a1a3a" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="800" y="376" class="label">DocMerge Engine</text>
  <text x="800" y="390" class="sublabel">hxp-transform-docmerge</text>
  <text x="800" y="404" class="sublabel">scaler: 2 msgs</text>

  <rect x="972" y="356" width="150" height="75" rx="5" fill="#0a1a3a" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="982" y="376" class="label">Misc Engine</text>
  <text x="982" y="390" class="sublabel">hxp-transform-misc</text>
  <text x="982" y="404" class="sublabel">scaler: 3 msgs</text>

  <rect x="1134" y="356" width="150" height="75" rx="5" fill="#0a1a3a" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="1144" y="376" class="label">AIO Engine</text>
  <text x="1144" y="390" class="sublabel">hxp-transform-aio</text>
  <text x="1144" y="404" class="sublabel">scaler: 2 msgs</text>

  <!-- Policy / network -->
  <rect x="42" y="450" width="195" height="60" rx="5" fill="#1a2a0a" stroke="#d6b656" stroke-width="1.5"/>
  <text x="52" y="469" class="label">Network Policies</text>
  <text x="52" y="483" class="sublabel">Azure CNI + Cilium</text>
  <text x="52" y="497" class="sublabel">engine namespace isolation</text>

  <rect x="250" y="450" width="195" height="60" rx="5" fill="#1a0a2a" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="260" y="469" class="label">Workload Identity Binding</text>
  <text x="260" y="483" class="sublabel">Managed Identity → Key Vault</text>
  <text x="260" y="497" class="sublabel">Service Bus access</text>

  <!-- Bottom AWS equivalent services -->
  <rect x="20" y="860" width="230" height="120" rx="6" fill="#1a1a00" stroke="#FF9900" stroke-width="2"/>
  <text x="30" y="882" class="label">Azure Service Bus Premium</text>
  <text x="30" y="897" class="sublabel">≈ SQS + SNS combined</text>
  <text x="30" y="912" class="sublabel">transform-request (topic)</text>
  <text x="30" y="927" class="sublabel">transform-reply (topic)</text>
  <text x="30" y="942" class="sublabel">7× engine subscriptions</text>
  <text x="30" y="957" class="sublabel">CMK encrypted, private link</text>

  <rect x="265" y="860" width="205" height="120" rx="6" fill="#1a1a00" stroke="#FF9900" stroke-width="2"/>
  <text x="275" y="882" class="label">Azure Blob Storage</text>
  <text x="275" y="897" class="sublabel">≈ S3 Velero backup</text>
  <text x="275" y="912" class="sublabel">RA-GRS (cross-region)</text>
  <text x="275" y="927" class="sublabel">CMK (Key Vault) encrypted</text>
  <text x="275" y="942" class="sublabel">Replication ≤ 15 min</text>

  <rect x="485" y="860" width="205" height="120" rx="6" fill="#1a1a00" stroke="#FF9900" stroke-width="2"/>
  <text x="495" y="882" class="label">Azure Files Premium</text>
  <text x="495" y="897" class="sublabel">≈ EFS shared storage</text>
  <text x="495" y="912" class="sublabel">SMB / NFS protocols</text>
  <text x="495" y="927" class="sublabel">LRS or ZRS replication</text>

  <rect x="705" y="860" width="210" height="120" rx="6" fill="#1a0010" stroke="#E7157B" stroke-width="2"/>
  <text x="715" y="882" class="label">Azure Monitor</text>
  <text x="715" y="897" class="sublabel">≈ CloudWatch Logs/Metrics</text>
  <text x="715" y="912" class="sublabel">Log Analytics Workspace</text>
  <text x="715" y="927" class="sublabel">+ Datadog APM integration</text>
  <text x="715" y="942" class="sublabel">Datadog dashboards retained</text>

  <rect x="930" y="860" width="200" height="120" rx="6" fill="#0a2030" stroke="#0078D4" stroke-width="2"/>
  <text x="940" y="882" class="label">Azure Container Registry</text>
  <text x="940" y="897" class="sublabel">≈ ECR</text>
  <text x="940" y="912" class="sublabel">Geo-replicated</text>
  <text x="940" y="927" class="sublabel">Premium tier · private endpoint</text>

  <rect x="1145" y="860" width="200" height="120" rx="6" fill="#2a0a0a" stroke="#f44336" stroke-width="2"/>
  <text x="1155" y="882" class="label">Key Vault + Managed ID</text>
  <text x="1155" y="897" class="sublabel">≈ KMS + Secrets Manager</text>
  <text x="1155" y="912" class="sublabel">RBAC-based access</text>
  <text x="1155" y="927" class="sublabel">Soft-delete + purge protect</text>

  <!-- Flow arrows -->
  <line x1="155" y1="344" x2="155" y2="860" class="arrow-msg"/>
  <line x1="382" y1="344" x2="382" y2="860" class="arrow-msg"/>
  <line x1="844" y1="198" x2="820" y2="860" class="arrow-obs" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="20" y="990" width="700" height="80" rx="6" fill="#060c12" stroke="#555"/>
  <text x="30" y="1010" font-size="12" font-weight="bold" fill="#FFD700">Legend</text>
  <line x1="30" y1="1025" x2="80" y2="1025" class="arrow"/><text x="85" y="1030" class="sublabel">Request flow</text>
  <line x1="180" y1="1025" x2="230" y2="1025" class="arrow-msg"/><text x="235" y="1030" class="sublabel">Messaging / event flow</text>
  <line x1="360" y1="1025" x2="410" y2="1025" class="arrow-obs"/><text x="415" y="1030" class="sublabel">Observability / scaling</text>
  <line x1="570" y1="1025" x2="620" y2="1025" class="arrow-sec"/><text x="625" y="1030" class="sublabel">Security dependency</text>
</svg>
