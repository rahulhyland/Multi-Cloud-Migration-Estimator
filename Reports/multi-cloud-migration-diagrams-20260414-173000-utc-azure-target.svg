<svg xmlns="http://www.w3.org/2000/svg" width="1460" height="380" viewBox="0 0 1460 380" style="background:#ffffff;font-family:Arial,sans-serif;">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="730" y="38" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">HxTS — Azure Target Architecture</text>

  <!-- 1. Clients / HxP Services -->
  <rect x="40" y="120" width="180" height="60" rx="6" ry="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="130" y="147" font-size="12" text-anchor="middle" fill="#000000">Clients /</text>
  <text x="130" y="163" font-size="12" text-anchor="middle" fill="#000000">HxP Services</text>

  <!-- 2. Azure DNS + Front Door + WAF -->
  <rect x="270" y="110" width="300" height="80" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="420" y="143" font-size="11" text-anchor="middle" fill="#000000">Azure DNS + Front Door /</text>
  <text x="420" y="159" font-size="11" text-anchor="middle" fill="#000000">App Gateway + WAF</text>
  <text x="420" y="175" font-size="10" text-anchor="middle" fill="#555555">TLS via Key Vault certs</text>

  <!-- 3. AKS -->
  <rect x="620" y="90" width="260" height="120" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="750" y="143" font-size="12" text-anchor="middle" fill="#000000">AKS (Router, Rest, Engines)</text>
  <text x="750" y="161" font-size="11" text-anchor="middle" fill="#000000">KEDA + Cluster Autoscaler</text>

  <!-- 4. Azure Service Bus -->
  <rect x="930" y="100" width="210" height="80" rx="6" ry="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="1035" y="135" font-size="12" text-anchor="middle" fill="#000000">Azure Service Bus</text>
  <text x="1035" y="151" font-size="10" text-anchor="middle" fill="#000000">Topics + Queues</text>

  <!-- 5. Azure Files / Blob -->
  <rect x="1196" y="110" width="230" height="70" rx="6" ry="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1311" y="142" font-size="12" text-anchor="middle" fill="#000000">Azure Files / Blob Storage</text>
  <text x="1311" y="158" font-size="10" text-anchor="middle" fill="#000000">CMK + Backup Vault</text>

  <!-- 6. Azure Monitor + Datadog -->
  <rect x="620" y="265" width="240" height="60" rx="6" ry="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="740" y="292" font-size="12" text-anchor="middle" fill="#000000">Azure Monitor</text>
  <text x="740" y="308" font-size="10" text-anchor="middle" fill="#000000">+ Datadog</text>

  <!-- Arrows -->
  <!-- Clients → Edge -->
  <line x1="220" y1="150" x2="268" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Edge → AKS -->
  <line x1="570" y1="150" x2="618" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- AKS → Service Bus -->
  <line x1="880" y1="135" x2="928" y2="135" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- AKS → Azure Files -->
  <line x1="880" y1="155" x2="1194" y2="148" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- AKS → Monitor -->
  <line x1="750" y1="210" x2="740" y2="263" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Embedded mxGraphModel for draw.io editing -->
  <mxGraphModel dx="1600" dy="900" grid="1" gridSize="10">
    <root>
      <mxCell id="0"/>
      <mxCell id="1" parent="0"/>
      <mxCell id="22" value="Clients / HxP Services" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#dae8fc;strokeColor=#6c8ebf;" vertex="1" parent="1"><mxGeometry x="40" y="120" width="180" height="60" as="geometry"/></mxCell>
      <mxCell id="23" value="Azure DNS + Front Door / App Gateway + WAF&#xa;TLS (Key Vault certs)" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#fff2cc;strokeColor=#d6b656;" vertex="1" parent="1"><mxGeometry x="270" y="110" width="300" height="80" as="geometry"/></mxCell>
      <mxCell id="24" value="AKS (Router, Rest, Engines)&#xa;KEDA + Cluster Autoscaler" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;" vertex="1" parent="1"><mxGeometry x="620" y="90" width="260" height="120" as="geometry"/></mxCell>
      <mxCell id="25" value="Azure Service Bus&#xa;Topics + Queues" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;" vertex="1" parent="1"><mxGeometry x="930" y="100" width="210" height="80" as="geometry"/></mxCell>
      <mxCell id="26" value="Azure Files / Blob Storage&#xa;CMK + Backup Vault" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#e1d5e7;strokeColor=#9673a6;" vertex="1" parent="1"><mxGeometry x="1196" y="110" width="230" height="70" as="geometry"/></mxCell>
      <mxCell id="27" value="Azure Monitor + Datadog" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ffe6cc;strokeColor=#d79b00;" vertex="1" parent="1"><mxGeometry x="620" y="265" width="240" height="60" as="geometry"/></mxCell>
      <mxCell id="28" style="endArrow=classic;html=1;" edge="1" parent="1" source="22" target="23"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="29" style="endArrow=classic;html=1;" edge="1" parent="1" source="23" target="24"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="30" style="endArrow=classic;html=1;" edge="1" parent="1" source="24" target="25"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="31" style="endArrow=classic;html=1;" edge="1" parent="1" source="24" target="26"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="32" style="endArrow=classic;html=1;" edge="1" parent="1" source="24" target="27"><mxGeometry relative="1" as="geometry"/></mxCell>
    </root>
  </mxGraphModel>
</svg>
