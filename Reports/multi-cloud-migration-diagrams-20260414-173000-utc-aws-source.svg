<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="380" viewBox="0 0 1400 380" style="background:#ffffff;font-family:Arial,sans-serif;">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="38" font-size="16" font-weight="bold" text-anchor="middle" fill="#333333">HxTS — Current AWS Source Architecture</text>

  <!-- 1. Clients / HxP Services -->
  <rect x="40" y="120" width="180" height="60" rx="6" ry="6" fill="#dae8fc" stroke="#6c8ebf" stroke-width="1.5"/>
  <text x="130" y="147" font-size="12" text-anchor="middle" fill="#000000">Clients /</text>
  <text x="130" y="163" font-size="12" text-anchor="middle" fill="#000000">HxP Services</text>

  <!-- 2. Route53 + ACM + WAF + ALB -->
  <rect x="270" y="120" width="240" height="60" rx="6" ry="6" fill="#fff2cc" stroke="#d6b656" stroke-width="1.5"/>
  <text x="390" y="145" font-size="11" text-anchor="middle" fill="#000000">Route53 + ACM + WAF</text>
  <text x="390" y="161" font-size="11" text-anchor="middle" fill="#000000">+ Public ALB</text>

  <!-- 3. EKS + Karpenter + KEDA -->
  <rect x="560" y="90" width="260" height="120" rx="6" ry="6" fill="#d5e8d4" stroke="#82b366" stroke-width="1.5"/>
  <text x="690" y="143" font-size="12" text-anchor="middle" fill="#000000">EKS (Router, Rest, Engines)</text>
  <text x="690" y="161" font-size="11" text-anchor="middle" fill="#000000">Karpenter 1.10.0 + KEDA 2.17</text>

  <!-- 4. SNS Topics -->
  <rect x="860" y="70" width="200" height="70" rx="6" ry="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="960" y="100" font-size="12" text-anchor="middle" fill="#000000">SNS Topics</text>
  <text x="960" y="116" font-size="10" text-anchor="middle" fill="#000000">transform-request/reply</text>

  <!-- 5. SQS Queues -->
  <rect x="860" y="170" width="200" height="70" rx="6" ry="6" fill="#f8cecc" stroke="#b85450" stroke-width="1.5"/>
  <text x="960" y="200" font-size="12" text-anchor="middle" fill="#000000">SQS Queues</text>
  <text x="960" y="216" font-size="10" text-anchor="middle" fill="#000000">~28/env · KMS-encrypted</text>

  <!-- 6. EFS + S3 -->
  <rect x="1110" y="120" width="230" height="60" rx="6" ry="6" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.5"/>
  <text x="1225" y="147" font-size="12" text-anchor="middle" fill="#000000">EFS + S3 (Velero)</text>
  <text x="1225" y="163" font-size="10" text-anchor="middle" fill="#000000">KMS CMK-encrypted</text>

  <!-- 7. Datadog + CloudWatch -->
  <rect x="560" y="265" width="230" height="60" rx="6" ry="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="1.5"/>
  <text x="675" y="292" font-size="12" text-anchor="middle" fill="#000000">Datadog</text>
  <text x="675" y="308" font-size="10" text-anchor="middle" fill="#000000">+ CloudWatch</text>

  <!-- Arrows -->
  <!-- Clients → Edge -->
  <line x1="220" y1="150" x2="268" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- Edge → EKS -->
  <line x1="510" y1="150" x2="558" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- EKS → SNS -->
  <line x1="820" y1="120" x2="858" y2="108" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- EKS → SQS -->
  <line x1="820" y1="172" x2="858" y2="192" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- EKS → EFS/S3 -->
  <line x1="820" y1="150" x2="1108" y2="150" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <!-- EKS → Datadog -->
  <line x1="690" y1="210" x2="675" y2="263" stroke="#555555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Embedded mxGraphModel for draw.io editing -->
  <mxGraphModel dx="1600" dy="900" grid="1" gridSize="10">
    <root>
      <mxCell id="0"/>
      <mxCell id="1" parent="0"/>
      <mxCell id="2" value="Clients / HxP Services" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#dae8fc;strokeColor=#6c8ebf;" vertex="1" parent="1"><mxGeometry x="40" y="120" width="180" height="60" as="geometry"/></mxCell>
      <mxCell id="3" value="Route53 + ACM + WAF + Public ALB" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#fff2cc;strokeColor=#d6b656;" vertex="1" parent="1"><mxGeometry x="270" y="120" width="240" height="60" as="geometry"/></mxCell>
      <mxCell id="4" value="EKS (Router, Rest, Engines)&#xa;Karpenter 1.10.0 + KEDA 2.17" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#d5e8d4;strokeColor=#82b366;" vertex="1" parent="1"><mxGeometry x="560" y="90" width="260" height="120" as="geometry"/></mxCell>
      <mxCell id="5" value="SNS Topics&#xa;transform-request/reply" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;" vertex="1" parent="1"><mxGeometry x="860" y="70" width="200" height="70" as="geometry"/></mxCell>
      <mxCell id="6" value="SQS Queues&#xa;~28/env · KMS-encrypted" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#f8cecc;strokeColor=#b85450;" vertex="1" parent="1"><mxGeometry x="860" y="170" width="200" height="70" as="geometry"/></mxCell>
      <mxCell id="7" value="EFS + S3 (Velero)&#xa;KMS CMK-encrypted" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#e1d5e7;strokeColor=#9673a6;" vertex="1" parent="1"><mxGeometry x="1110" y="120" width="230" height="60" as="geometry"/></mxCell>
      <mxCell id="8" value="Datadog + CloudWatch" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ffe6cc;strokeColor=#d79b00;" vertex="1" parent="1"><mxGeometry x="560" y="265" width="230" height="60" as="geometry"/></mxCell>
      <mxCell id="9" style="endArrow=classic;html=1;" edge="1" parent="1" source="2" target="3"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="10" style="endArrow=classic;html=1;" edge="1" parent="1" source="3" target="4"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="11" style="endArrow=classic;html=1;" edge="1" parent="1" source="4" target="5"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="12" style="endArrow=classic;html=1;" edge="1" parent="1" source="4" target="6"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="13" style="endArrow=classic;html=1;" edge="1" parent="1" source="4" target="7"><mxGeometry relative="1" as="geometry"/></mxCell>
      <mxCell id="14" style="endArrow=classic;html=1;" edge="1" parent="1" source="4" target="8"><mxGeometry relative="1" as="geometry"/></mxCell>
    </root>
  </mxGraphModel>
</svg>
