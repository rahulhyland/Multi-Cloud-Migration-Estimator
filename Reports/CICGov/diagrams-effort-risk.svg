<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" width="900" height="580">
  <rect x="0" y="0" width="900" height="580" fill="#ffffff" stroke="#dee2e6" stroke-width="1"/>
  <text x="450" y="28" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="bold" fill="#212529">Migration Effort vs Risk &#x2014; cicgov Capabilities</text>
  <text x="450" y="44" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#6c757d">Bubble size = relative IaC resource count. X = Migration Effort (S&#x2192;L), Y = Migration Risk (Low&#x2192;High)</text>

  <!-- Quadrant shading: BL=favorable(green), TL=caution(orange), TR=critical(red), BR=manageable(yellow) -->
  <rect x="90" y="60" width="360" height="215" fill="#fff3cd" opacity="0.45"/>
  <rect x="450" y="60" width="360" height="215" fill="#f8d7da" opacity="0.45"/>
  <rect x="90" y="275" width="360" height="215" fill="#d4edda" opacity="0.45"/>
  <rect x="450" y="275" width="360" height="215" fill="#fff3cd" opacity="0.3"/>

  <!-- Grid lines -->
  <line x1="90" y1="275" x2="810" y2="275" stroke="#dee2e6" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="450" y1="60" x2="450" y2="490" stroke="#dee2e6" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- Axes -->
  <line x1="90" y1="60" x2="90" y2="490" stroke="#adb5bd" stroke-width="1.5"/>
  <line x1="90" y1="490" x2="810" y2="490" stroke="#adb5bd" stroke-width="1.5"/>

  <!-- Axis arrow tips -->
  <polygon points="806,486 814,490 806,494" fill="#adb5bd"/>
  <polygon points="86,64 90,56 94,64" fill="#adb5bd"/>

  <!-- Axis titles -->
  <text x="450" y="518" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" fill="#495057">Migration Effort &#x2192;</text>
  <text x="30" y="275" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="12" font-weight="bold" fill="#495057" transform="rotate(-90,30,275)">Migration Risk &#x2192;</text>

  <!-- X-axis tick labels (S / M / L zones) -->
  <text x="215" y="506" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#6c757d">S (Small)</text>
  <text x="450" y="506" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#6c757d">M (Medium)</text>
  <text x="690" y="506" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#6c757d">L (Large)</text>

  <!-- Y-axis tick labels -->
  <text x="78" y="490" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#6c757d">Low</text>
  <text x="78" y="280" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#6c757d">Med</text>
  <text x="78" y="80" text-anchor="end" font-family="'Segoe UI',Arial,sans-serif" font-size="10" fill="#6c757d">High</text>

  <!-- Quadrant corner labels (corrected: top=High risk, bottom=Low risk) -->
  <text x="270" y="78" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#856404">Small Effort + High Risk</text>
  <text x="630" y="78" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#721c24">Large Effort + High Risk &#x26A0;</text>
  <text x="270" y="467" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#155724">Small Effort + Low Risk &#x2713;</text>
  <text x="630" y="467" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#856404">Large Effort + Low Risk</text>

  <!-- ======================================================
       BUBBLES — positions verified non-overlapping (min gap 22.6 px):
       Compute       M/M  cx=400 cy=265 r=28
       IaC/Spacelift M/M  cx=510 cy=235 r=18   gap vs Compute: 68 px
       Networking    L/M  cx=680 cy=260 r=22
       Data          L/H  cx=700 cy=115 r=28
       IAM/Security  M/H  cx=460 cy=120 r=24
       Functions     S/L  cx=155 cy=385 r=16
       Redis         S/L  cx=245 cy=420 r=14
       Observability S/L  cx=175 cy=438 r=18   gap vs Functions: 22.6 px
       Messaging     S/L  cx=305 cy=395 r=22
  ====================================================== -->

  <!-- ============================================================
       BUBBLE COLOR PALETTE — all solid opaque fills with WCAG AA
       contrast ratio ≥ 4.5:1 against white text:
       Compute       #1a56db  (blue,    contrast ~5.5:1)
       IaC/Spacelift #374151  (slate,   contrast ~9.2:1)
       Networking    #0f766e  (teal,    contrast ~5.8:1)
       Data          #b91c1c  (red,     contrast ~6.0:1)
       IAM/Security  #c2410c  (deep-or, contrast ~5.4:1)
       Functions     #92400e  (amber,   contrast ~6.3:1)
       Redis         #9b1c1c  (crimson, contrast ~6.2:1)
       Observability #065f46  (green,   contrast ~7.8:1)
       Messaging     #4c1d95  (purple,  contrast ~9.6:1)
  ============================================================ -->

  <!-- 1. Compute (M/M) — #1a56db solid blue -->
  <circle cx="400" cy="265" r="28" fill="#1a56db" stroke="#1e40af" stroke-width="2"/>
  <text x="400" y="261" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="bold" fill="#ffffff">Compute</text>
  <text x="400" y="273" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#dbeafe">(EKS&#x2192;AKS/GKE)</text>
  <text x="400" y="309" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#1e40af">M/M &#x2014; arm64, IRSA changes</text>

  <!-- 2. IaC/Spacelift (M/M) — #374151 dark slate -->
  <circle cx="510" cy="235" r="18" fill="#374151" stroke="#1f2937" stroke-width="2"/>
  <text x="510" y="231" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="bold" fill="#ffffff">IaC/Spacelift</text>
  <text x="510" y="242" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#e5e7eb">10+ stacks</text>
  <text x="510" y="264" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#374151">M/M &#x2014; full TF provider rewrite</text>

  <!-- 3. Networking (L/M) — #0f766e deep teal -->
  <circle cx="680" cy="260" r="22" fill="#0f766e" stroke="#134e4a" stroke-width="2"/>
  <text x="680" y="256" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="bold" fill="#ffffff">Networking</text>
  <text x="680" y="268" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#ccfbf1">(APIGW&#x2192;APIM)</text>
  <text x="680" y="297" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#134e4a">L/M &#x2014; WAF rules, VPC link</text>

  <!-- 4. Data (L/H) — #b91c1c deep red -->
  <circle cx="700" cy="115" r="28" fill="#b91c1c" stroke="#7f1d1d" stroke-width="2"/>
  <text x="700" y="111" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="bold" fill="#ffffff">Data</text>
  <text x="700" y="123" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#fee2e2">(DynamoDB&#x2192;CosmosDB)</text>
  <text x="700" y="156" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7f1d1d">L/H &#x2014; PK/SK schema, 10 GSIs</text>

  <!-- 5. IAM/Security (M/H) — #c2410c deep orange (WCAG contrast ~5.4:1 vs white) -->
  <circle cx="460" cy="120" r="24" fill="#c2410c" stroke="#7c2d12" stroke-width="2"/>
  <text x="460" y="116" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="bold" fill="#ffffff">IAM/Security</text>
  <text x="460" y="128" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#ffedd5">(IRSA+KMS&#x2192;WI+KV)</text>
  <text x="460" y="159" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#7c2d12">M/H &#x2014; complete IAM rewrite</text>

  <!-- 6. Functions (S/L) — #92400e dark amber (was yellow, now WCAG-safe for white text) -->
  <circle cx="155" cy="385" r="16" fill="#92400e" stroke="#78350f" stroke-width="1.5"/>
  <text x="155" y="382" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Functions</text>
  <text x="155" y="393" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#fef3c7">S/L</text>

  <!-- 7. Redis (S/L) — #9b1c1c deep crimson -->
  <circle cx="245" cy="420" r="14" fill="#9b1c1c" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="245" y="417" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Redis</text>
  <text x="245" y="428" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#fee2e2">S/L</text>

  <!-- 8. Observability (S/L) — #065f46 deep emerald -->
  <circle cx="175" cy="438" r="18" fill="#065f46" stroke="#064e3b" stroke-width="1.5"/>
  <text x="175" y="434" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9" font-weight="bold" fill="#ffffff">Observ.</text>
  <text x="175" y="445" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#d1fae5">(CW&#x2192;Datadog) S/L</text>

  <!-- 9. Messaging (S/L) — #4c1d95 deep violet -->
  <circle cx="305" cy="395" r="22" fill="#4c1d95" stroke="#3b0764" stroke-width="2"/>
  <text x="305" y="391" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="10" font-weight="bold" fill="#ffffff">Messaging</text>
  <text x="305" y="403" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="8" fill="#ede9fe">(SQS+SNS&#x2192;SB) S/L</text>

  <!-- Legend — using same solid palette -->
  <rect x="90" y="530" width="720" height="30" rx="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <circle cx="112" cy="545" r="7" fill="#b91c1c"/>
  <text x="123" y="549" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#1e293b">High Risk</text>
  <circle cx="195" cy="545" r="7" fill="#c2410c"/>
  <text x="206" y="549" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#1e293b">Med-High Risk</text>
  <circle cx="298" cy="545" r="7" fill="#1a56db"/>
  <text x="309" y="549" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#1e293b">Med Risk</text>
  <circle cx="378" cy="545" r="7" fill="#065f46"/>
  <text x="389" y="549" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#1e293b">Low Risk</text>
  <text x="465" y="549" font-family="'Segoe UI',Arial,sans-serif" font-size="9" fill="#475569">Effort(S/M/L) / Risk(L/M/H). Bubble size = relative resource count.</text>
</svg>
