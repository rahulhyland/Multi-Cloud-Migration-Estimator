<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Effort versus risk chart">
  <defs>
    <style>
      .bg { fill: #0d1627; }
      .txt { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; fill: #f5fbff; paint-order: stroke; stroke: #090f1b; stroke-width: 1px; }
      .title { font-size: 22px; font-weight: 700; }
      .axis { stroke: #9ed8ff; stroke-width: 2; }
      .grid { stroke: #2a4260; stroke-width: 1; }
      .bubble1 { fill: #37c5ff; opacity: 0.9; }
      .bubble2 { fill: #80ff9f; opacity: 0.9; }
      .bubble3 { fill: #ff9dd8; opacity: 0.9; }
      .lbl { font-size: 13px; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="txt title" x="32" y="42">Migration Effort vs Risk by Capability</text>
  <text class="txt" x="32" y="66">X-axis: Implementation effort, Y-axis: Migration risk</text>

  <line class="axis" x1="120" y1="600" x2="1120" y2="600"/>
  <line class="axis" x1="120" y1="600" x2="120" y2="120"/>

  <line class="grid" x1="120" y1="440" x2="1120" y2="440"/>
  <line class="grid" x1="120" y1="280" x2="1120" y2="280"/>
  <line class="grid" x1="453" y1="120" x2="453" y2="600"/>
  <line class="grid" x1="786" y1="120" x2="786" y2="600"/>

  <text class="txt lbl" x="102" y="615">S</text>
  <text class="txt lbl" x="445" y="615">M</text>
  <text class="txt lbl" x="778" y="615">L</text>
  <text class="txt lbl" x="1090" y="615">Effort</text>

  <text class="txt lbl" x="82" y="602">L</text>
  <text class="txt lbl" x="82" y="442">M</text>
  <text class="txt lbl" x="82" y="282">H</text>
  <text class="txt lbl" x="54" y="120">Risk</text>

  <circle class="bubble3" cx="870" cy="250" r="52"/>
  <text class="txt lbl" x="820" y="255">Compute</text>

  <circle class="bubble3" cx="610" cy="255" r="48"/>
  <text class="txt lbl" x="560" y="260">Messaging</text>

  <circle class="bubble2" cx="620" cy="430" r="45"/>
  <text class="txt lbl" x="568" y="435">Storage</text>

  <circle class="bubble3" cx="900" cy="245" r="44"/>
  <text class="txt lbl" x="860" y="250">Security</text>

  <circle class="bubble1" cx="560" cy="430" r="42"/>
  <text class="txt lbl" x="505" y="435">Edge/Network</text>

  <circle class="bubble1" cx="540" cy="425" r="38"/>
  <text class="txt lbl" x="495" y="430">Observability</text>

  <rect x="900" y="36" width="18" height="18" class="bubble3"/><text class="txt lbl" x="924" y="50">High risk focus</text>
  <rect x="1040" y="36" width="18" height="18" class="bubble2"/><text class="txt lbl" x="1064" y="50">Medium risk</text>
</svg>
