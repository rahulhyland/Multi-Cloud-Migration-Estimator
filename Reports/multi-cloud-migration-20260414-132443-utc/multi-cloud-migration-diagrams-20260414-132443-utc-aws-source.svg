<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AWS Source Architecture</title>
  <desc id="desc">Current AWS source architecture with found and not found in IaC markers.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #eef2ff; stroke: #334155; stroke-width: 2; rx: 10; ry: 10; }
      .cluster { fill: #ecfccb; stroke: #365314; stroke-width: 2; rx: 10; ry: 10; }
      .found { fill: #dcfce7; stroke: #166534; stroke-width: 2; rx: 8; ry: 8; }
      .warn { fill: #ffedd5; stroke: #c2410c; stroke-width: 2; rx: 8; ry: 8; }
      .missing { fill: #ffffff; stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 5; rx: 8; ry: 8; }
      .security { fill: #fce7f3; stroke: #be185d; stroke-width: 2; rx: 8; ry: 8; }
      .data { fill: #d1fae5; stroke: #047857; stroke-width: 2; rx: 8; ry: 8; }
      .obs { fill: #fde68a; stroke: #92400e; stroke-width: 2; rx: 8; ry: 8; }
      .txt { font-family: 'DejaVu Sans', 'Segoe UI', sans-serif; font-size: 16px; fill: #0f172a; paint-order: stroke; stroke: #ffffff; stroke-width: 2px; }
      .small { font-size: 14px; }
      .arrowA { stroke: #0ea5e9; stroke-width: 3; fill: none; }
      .arrowB { stroke: #22c55e; stroke-width: 3; fill: none; }
      .arrowC { stroke: #f97316; stroke-width: 3; fill: none; }
      .arrowD { stroke: #e11d48; stroke-width: 3; fill: none; }
      .arrowE { stroke: #14b8a6; stroke-width: 3; fill: none; }
    </style>
    <marker id="ahA" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#0ea5e9"/>
    </marker>
    <marker id="ahB" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#22c55e"/>
    </marker>
    <marker id="ahC" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#f97316"/>
    </marker>
    <marker id="ahD" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#e11d48"/>
    </marker>
    <marker id="ahE" markerWidth="14" markerHeight="10" refX="11" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,5 L0,10 z" fill="#14b8a6"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>
  <text class="txt" x="30" y="40">AWS Source Architecture (IaC-derived)</text>

  <rect class="panel" x="40" y="70" width="180" height="60"/>
  <text class="txt small" x="60" y="105">Clients / Upstream</text>

  <rect class="panel" x="270" y="70" width="200" height="60"/>
  <text class="txt small" x="300" y="105">Route53 DNS/Domain</text>

  <rect class="warn" x="520" y="70" width="220" height="60"/>
  <text class="txt small" x="550" y="105">ALB + WAF Ingress</text>

  <rect class="panel" x="40" y="170" width="1510" height="690"/>
  <text class="txt small" x="60" y="200">VPC/Subnets</text>

  <rect class="cluster" x="80" y="220" width="960" height="440"/>
  <text class="txt small" x="100" y="250">EKS Cluster Boundary</text>

  <rect class="missing" x="120" y="280" width="220" height="70"/>
  <text class="txt small" x="135" y="320">REST Pod (Not found in IaC)</text>

  <rect class="missing" x="370" y="280" width="240" height="70"/>
  <text class="txt small" x="390" y="320">Router Pod (Not found in IaC)</text>

  <rect class="missing" x="640" y="270" width="380" height="90"/>
  <text class="txt small" x="655" y="305">Engine group (Not found in IaC)</text>
  <text class="txt small" x="655" y="327">tika/imagemagick/libreoffice/misc/docfilters/docmerge/aio</text>

  <rect class="missing" x="120" y="390" width="230" height="60"/>
  <text class="txt small" x="150" y="425">KEDA (Not found in IaC)</text>

  <rect class="found" x="380" y="390" width="230" height="60"/>
  <text class="txt small" x="410" y="425">Network Policies (found)</text>

  <rect class="missing" x="640" y="390" width="300" height="60"/>
  <text class="txt small" x="655" y="425">Kubernetes Secrets (Not found in IaC)</text>

  <rect class="obs" x="120" y="490" width="330" height="65"/>
  <text class="txt small" x="150" y="530">Datadog Monitors/Dashboards (found)</text>

  <rect class="missing" x="1080" y="250" width="220" height="70"/>
  <text class="txt small" x="1135" y="292">SQS (Not found)</text>

  <rect class="warn" x="1080" y="340" width="220" height="70"/>
  <text class="txt small" x="1140" y="382">SNS (found)</text>

  <rect class="security" x="1320" y="250" width="220" height="70"/>
  <text class="txt small" x="1352" y="292">KMS refs (found)</text>

  <rect class="security" x="1320" y="340" width="220" height="70"/>
  <text class="txt small" x="1350" y="382">Secrets Manager (found)</text>

  <rect class="data" x="1080" y="430" width="220" height="70"/>
  <text class="txt small" x="1120" y="472">OpenSearch (found)</text>

  <rect class="data" x="1320" y="430" width="220" height="70"/>
  <text class="txt small" x="1345" y="472">MongoDB Atlas (found)</text>

  <path class="arrowA" marker-end="url(#ahA)" d="M220 100 L270 100"/>
  <path class="arrowA" marker-end="url(#ahA)" d="M470 100 L520 100"/>
  <path class="arrowB" marker-end="url(#ahB)" d="M740 100 L740 315 L610 315"/>
  <path class="arrowB" marker-end="url(#ahB)" d="M340 315 L370 315"/>
  <path class="arrowB" marker-end="url(#ahB)" d="M610 315 L640 315"/>
  <path class="arrowC" marker-end="url(#ahC)" d="M610 315 L1080 375"/>
  <path class="arrowC" marker-end="url(#ahC)" d="M1020 315 L1080 285"/>
  <path class="arrowD" marker-end="url(#ahD)" d="M610 315 L1320 375"/>
  <path class="arrowD" marker-end="url(#ahD)" d="M1300 375 L1320 285"/>
  <path class="arrowE" marker-end="url(#ahE)" d="M610 315 L1080 465"/>
  <path class="arrowE" marker-end="url(#ahE)" d="M610 315 L1320 465"/>
  <path class="arrowC" marker-end="url(#ahC)" d="M450 520 L1080 465"/>
</svg>
