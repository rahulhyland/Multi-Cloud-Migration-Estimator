<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1100" width="1600" height="1100" style="background:#0d1a0d;font-family:Arial,sans-serif;">
  <defs>
    <style>
      .title { font-size:15px; font-weight:bold; fill:#34A853; }
      .label { font-size:11px; fill:#E8F4FD; font-weight:bold; }
      .sublabel { font-size:9px; fill:#A0C8A0; }
      .section-title { font-size:13px; font-weight:bold; fill:#00FFCC; }
      .arrow { stroke:#00FF88; stroke-width:2.5; fill:none; marker-end:url(#ah); }
      .arrow-msg { stroke:#FBBC04; stroke-width:2; fill:none; stroke-dasharray:6,3; marker-end:url(#ah-y); }
      .arrow-sec { stroke:#FF4444; stroke-width:2; fill:none; stroke-dasharray:4,3; marker-end:url(#ah-r); }
      .arrow-obs { stroke:#AA00FF; stroke-width:2; fill:none; stroke-dasharray:3,3; marker-end:url(#ah-p); }
    </style>
    <marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#00FF88"/></marker>
    <marker id="ah-y" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FBBC04"/></marker>
    <marker id="ah-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#FF4444"/></marker>
    <marker id="ah-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#AA00FF"/></marker>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- GCP VPC wrapper -->
  <rect x="10" y="10" width="1580" height="1080" rx="8" fill="#081208" stroke="#34A853" stroke-width="3"/>
  <text x="20" y="35" class="title" filter="url(#glow)">GCP VPC — HxTS Target (us-east1 / europe-west3)</text>
  <rect x="1360" y="12" width="225" height="28" rx="4" fill="#34A853"/>
  <text x="1370" y="30" font-size="11" font-weight="bold" fill="#000">US: us-east1  |  EU: europe-west3</text>

  <!-- Top row: edge / security / identity -->
  <rect x="20" y="48" width="130" height="55" rx="6" fill="#082008" stroke="#34A853" stroke-width="2"/>
  <text x="30" y="68" class="label">Cloud DNS</text>
  <text x="30" y="82" class="sublabel">Private + Public Zones</text>

  <rect x="165" y="48" width="185" height="55" rx="6" fill="#082008" stroke="#34A853" stroke-width="2"/>
  <text x="175" y="68" class="label">Cloud Armor + CDN</text>
  <text x="175" y="82" class="sublabel">WAF · OWASP 3.3 rules</text>

  <rect x="365" y="48" width="195" height="55" rx="6" fill="#082008" stroke="#4285F4" stroke-width="2"/>
  <text x="375" y="68" class="label">Cloud HTTPS LB</text>
  <text x="375" y="82" class="sublabel">Global + regional · SSL term</text>

  <rect x="575" y="48" width="195" height="55" rx="6" fill="#1a082a" stroke="#8C4FFF" stroke-width="2"/>
  <text x="585" y="68" class="label">Private Service Connect</text>
  <text x="585" y="82" class="sublabel">≈ VPC Endpoint Service</text>

  <rect x="785" y="48" width="185" height="55" rx="6" fill="#2a0808" stroke="#EA4335" stroke-width="2"/>
  <text x="795" y="68" class="label">Secret Manager</text>
  <text x="795" y="82" class="sublabel">≈ Secrets Manager + KMS</text>

  <rect x="985" y="48" width="185" height="55" rx="6" fill="#2a0808" stroke="#EA4335" stroke-width="2"/>
  <text x="995" y="68" class="label">Workload Identity</text>
  <text x="995" y="82" class="sublabel">≈ IRSA (OIDC federation)</text>

  <rect x="1185" y="48" width="180" height="55" rx="6" fill="#2a2800" stroke="#FBBC04" stroke-width="2"/>
  <text x="1195" y="68" class="label">Artifact Registry</text>
  <text x="1195" y="82" class="sublabel">≈ ECR · multi-region</text>

  <!-- Arrow row -->
  <line x1="150" y1="75" x2="163" y2="75" class="arrow"/>
  <line x1="350" y1="75" x2="363" y2="75" class="arrow"/>
  <line x1="560" y1="75" x2="573" y2="75" class="arrow"/>

  <!-- GKE cluster -->
  <rect x="20" y="118" width="1560" height="730" rx="8" fill="#040a04" stroke="#4CAF50" stroke-width="2.5"/>
  <text x="30" y="140" class="section-title">GKE Cluster — n2-standard-4 (min:3 / max:25) · Dataplane V2 · Workload Identity · KEDA</text>

  <!-- Addons -->
  <rect x="30" y="148" width="145" height="50" rx="5" fill="#1a2a08" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="40" y="167" class="label">KEDA v2.x</text>
  <text x="40" y="181" class="sublabel">Pub/Sub Scaler</text>

  <rect x="190" y="148" width="150" height="50" rx="5" fill="#1a2a08" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="200" y="167" class="label">ingress-nginx</text>
  <text x="200" y="181" class="sublabel">Internal GLB</text>

  <rect x="355" y="148" width="155" height="50" rx="5" fill="#1a2a08" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="365" y="167" class="label">cert-manager</text>
  <text x="365" y="181" class="sublabel">Cloud DNS ACME</text>

  <rect x="525" y="148" width="165" height="50" rx="5" fill="#1a0a28" stroke="#9C27B0" stroke-width="1.5"/>
  <text x="535" y="167" class="label">Datadog Agent</text>
  <text x="535" y="181" class="sublabel">APM + infra metrics</text>

  <rect x="705" y="148" width="150" height="50" rx="5" fill="#2a0808" stroke="#EA4335" stroke-width="1.5"/>
  <text x="715" y="167" class="label">Velero</text>
  <text x="715" y="181" class="sublabel">Backup → GCS</text>

  <rect x="870" y="148" width="185" height="50" rx="5" fill="#1a2a08" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="880" y="167" class="label">GKE Addons</text>
  <text x="880" y="181" class="sublabel">Config Connector / Anthos</text>

  <rect x="1070" y="148" width="195" height="50" rx="5" fill="#1a0828" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="1080" y="167" class="label">Workload ID Binding</text>
  <text x="1080" y="181" class="sublabel">GCP SA → K8s SA</text>

  <!-- HXTS namespace -->
  <rect x="30" y="210" width="1540" height="510" rx="6" fill="#060e06" stroke="#555" stroke-width="1.5"/>
  <text x="42" y="232" font-size="12" font-weight="bold" fill="#FFD700">Namespace: hxts-&#123;environment&#125;</text>

  <rect x="42" y="244" width="215" height="100" rx="5" fill="#082808" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="52" y="264" class="label">REST Pod</text>
  <text x="52" y="278" class="sublabel">hxp-transform-rest:3.0.x</text>
  <text x="52" y="292" class="sublabel">Image migrated ECR → AR</text>
  <text x="52" y="306" class="sublabel">CPU: 800m–2000m</text>
  <text x="52" y="320" class="sublabel">Mem: 750Mi–1500Mi · port 8095</text>

  <rect x="270" y="244" width="215" height="100" rx="5" fill="#082808" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="280" y="264" class="label">Router Pod</text>
  <text x="280" y="278" class="sublabel">hxp-transform-router:3.0.x</text>
  <text x="280" y="292" class="sublabel">Pub/Sub subscription scaler</text>
  <text x="280" y="306" class="sublabel">CPU: 800m–2000m</text>
  <text x="280" y="320" class="sublabel">Mem: 750Mi–1500Mi</text>

  <rect x="42" y="356" width="170" height="75" rx="5" fill="#04102a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="52" y="376" class="label">Tika Engine</text>
  <text x="52" y="390" class="sublabel">hxp-transform-tika:3.0.x</text>
  <text x="52" y="404" class="sublabel">Pub/Sub sub (3 msgs)</text>

  <rect x="224" y="356" width="185" height="75" rx="5" fill="#04102a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="234" y="376" class="label">ImageMagick Engine</text>
  <text x="234" y="390" class="sublabel">hxp-transform-imagemagick</text>
  <text x="234" y="404" class="sublabel">Mem lim: 2000Mi</text>

  <rect x="421" y="356" width="175" height="75" rx="5" fill="#04102a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="431" y="376" class="label">LibreOffice Engine</text>
  <text x="431" y="390" class="sublabel">hxp-transform-libreoffice</text>
  <text x="431" y="404" class="sublabel">sub target: 10 msgs</text>

  <rect x="608" y="356" width="170" height="75" rx="5" fill="#04102a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="618" y="376" class="label">DocFilters Engine</text>
  <text x="618" y="390" class="sublabel">hxp-transform-docfilters</text>
  <text x="618" y="404" class="sublabel">sub target: 2 msgs</text>

  <rect x="790" y="356" width="170" height="75" rx="5" fill="#04102a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="800" y="376" class="label">DocMerge Engine</text>
  <text x="800" y="390" class="sublabel">hxp-transform-docmerge</text>
  <text x="800" y="404" class="sublabel">sub target: 2 msgs</text>

  <rect x="972" y="356" width="150" height="75" rx="5" fill="#04102a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="982" y="376" class="label">Misc Engine</text>
  <text x="982" y="390" class="sublabel">hxp-transform-misc</text>
  <text x="982" y="404" class="sublabel">sub target: 3 msgs</text>

  <rect x="1134" y="356" width="150" height="75" rx="5" fill="#04102a" stroke="#4285F4" stroke-width="1.5"/>
  <text x="1144" y="376" class="label">AIO Engine</text>
  <text x="1144" y="390" class="sublabel">hxp-transform-aio</text>
  <text x="1144" y="404" class="sublabel">sub target: 2 msgs</text>

  <rect x="42" y="450" width="195" height="60" rx="5" fill="#1a2808" stroke="#FBBC04" stroke-width="1.5"/>
  <text x="52" y="469" class="label">Network Policies</text>
  <text x="52" y="483" class="sublabel">GKE Dataplane V2 (Cilium)</text>
  <text x="52" y="497" class="sublabel">engine namespace isolation</text>

  <rect x="250" y="450" width="195" height="60" rx="5" fill="#1a0828" stroke="#8C4FFF" stroke-width="1.5"/>
  <text x="260" y="469" class="label">Workload Identity Binding</text>
  <text x="260" y="483" class="sublabel">GCP SA ↔ K8s SA mapping</text>
  <text x="260" y="497" class="sublabel">Pub/Sub + Secret access</text>

  <!-- Bottom services -->
  <rect x="20" y="860" width="235" height="120" rx="6" fill="#2a2800" stroke="#FBBC04" stroke-width="2"/>
  <text x="30" y="882" class="label">Cloud Pub/Sub</text>
  <text x="30" y="897" class="sublabel">≈ SQS + SNS combined</text>
  <text x="30" y="912" class="sublabel">transform-request (topic)</text>
  <text x="30" y="927" class="sublabel">transform-reply (topic)</text>
  <text x="30" y="942" class="sublabel">7× engine subscriptions</text>
  <text x="30" y="957" class="sublabel">CMEK encrypted · ordering</text>

  <rect x="270" y="860" width="210" height="120" rx="6" fill="#2a2800" stroke="#FBBC04" stroke-width="2"/>
  <text x="280" y="882" class="label">Cloud Storage (GCS)</text>
  <text x="280" y="897" class="sublabel">≈ S3 Velero backup</text>
  <text x="280" y="912" class="sublabel">Dual-region bucket</text>
  <text x="280" y="927" class="sublabel">CMEK (Secret Manager KMS)</text>
  <text x="280" y="942" class="sublabel">Versioning enabled</text>

  <rect x="495" y="860" width="210" height="120" rx="6" fill="#2a2800" stroke="#FBBC04" stroke-width="2"/>
  <text x="505" y="882" class="label">Filestore Enterprise</text>
  <text x="505" y="897" class="sublabel">≈ EFS shared storage</text>
  <text x="505" y="912" class="sublabel">NFS v3/v4 protocols</text>
  <text x="505" y="927" class="sublabel">Regional HA, CMEK</text>

  <rect x="720" y="860" width="210" height="120" rx="6" fill="#1a0a00" stroke="#34A853" stroke-width="2"/>
  <text x="730" y="882" class="label">Cloud Logging + Monitoring</text>
  <text x="730" y="897" class="sublabel">≈ CloudWatch Logs/Metrics</text>
  <text x="730" y="912" class="sublabel">Log-based alerting</text>
  <text x="730" y="927" class="sublabel">+ Datadog APM integration</text>
  <text x="730" y="942" class="sublabel">Dashboards retained</text>

  <rect x="945" y="860" width="210" height="120" rx="6" fill="#082008" stroke="#4285F4" stroke-width="2"/>
  <text x="955" y="882" class="label">Artifact Registry</text>
  <text x="955" y="897" class="sublabel">≈ ECR</text>
  <text x="955" y="912" class="sublabel">Multi-region replication</text>
  <text x="955" y="927" class="sublabel">Private endpoint · VPC SC</text>

  <rect x="1170" y="860" width="205" height="120" rx="6" fill="#2a0808" stroke="#EA4335" stroke-width="2"/>
  <text x="1180" y="882" class="label">Secret Manager + Cloud KMS</text>
  <text x="1180" y="897" class="sublabel">≈ Secrets Manager + KMS</text>
  <text x="1180" y="912" class="sublabel">CMEK for all services</text>
  <text x="1180" y="927" class="sublabel">Workload Identity access</text>

  <!-- Messaging flow arrows -->
  <line x1="155" y1="344" x2="155" y2="860" class="arrow-msg"/>
  <line x1="382" y1="344" x2="382" y2="860" class="arrow-msg"/>
  <line x1="840" y1="198" x2="825" y2="860" class="arrow-obs" stroke-dasharray="3,3"/>

  <!-- Legend -->
  <rect x="20" y="990" width="700" height="80" rx="6" fill="#020602" stroke="#555"/>
  <text x="30" y="1010" font-size="12" font-weight="bold" fill="#FFD700">Legend</text>
  <line x1="30" y1="1025" x2="80" y2="1025" class="arrow"/><text x="85" y="1030" class="sublabel">Request flow</text>
  <line x1="180" y1="1025" x2="230" y2="1025" class="arrow-msg"/><text x="235" y="1030" class="sublabel">Messaging / event flow</text>
  <line x1="360" y1="1025" x2="410" y2="1025" class="arrow-obs"/><text x="415" y="1030" class="sublabel">Observability / scaling</text>
  <line x1="570" y1="1025" x2="620" y2="1025" class="arrow-sec"/><text x="625" y="1030" class="sublabel">Security dependency</text>
</svg>
