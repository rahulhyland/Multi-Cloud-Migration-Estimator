  <text x="1795" y="465" class="note">(GCP-backed)</text>
  <text x="1795" y="482" class="note">M40 × 3 + M30 × 1</text>
  <text x="1795" y="499" class="note">v7.0</text>
  <text x="1795" y="516" class="note">Private Service Connect</text>
  <text x="1795" y="533" class="note">auto-scale M40→M60</text>
  <text x="1795" y="550" class="note">europe-west1 / us-central1</text>

  <!-- GCP Cloud KMS -->
  <rect x="1690" y="565" width="210" height="90" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="1795" y="588" class="box-label-top">GCP Cloud KMS</text>
  <text x="1795" y="606" class="note">5+ CMEK keys (software)</text>
  <text x="1795" y="624" class="note">Key rotation enabled</text>
  <text x="1795" y="642" class="note">Workload Identity IAM</text>

  <!-- GCP Secret Manager -->
  <rect x="1690" y="672" width="210" height="80" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="1.5"/>
  <text x="1795" y="695" class="box-label-top">GCP Secret Manager</text>
  <text x="1795" y="713" class="note">Replaces AWS Secrets Manager</text>
  <text x="1795" y="731" class="note">CSI driver integration</text>
  <text x="1795" y="749" class="note">Workload Identity RBAC</text>

  <!-- GCP SCC + Cloud DLP -->
  <rect x="1690" y="770" width="210" height="95" rx="6" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="1795" y="793" class="box-label-top">GCP SCC + Cloud DLP</text>
  <text x="1795" y="810" class="note">GuardDuty equivalent</text>
  <text x="1795" y="828" class="note">DLP scan on GCS objects</text>
  <text x="1795" y="846" class="note">→ Cloud Functions</text>
  <text x="1795" y="864" class="note">quarantine trigger</text>

  <!-- GCP Cloud Logging -->
  <rect x="1690" y="883" width="210" height="90" rx="6" fill="#fff9c4" stroke="#f57f17" stroke-width="1.5"/>
  <text x="1795" y="906" class="box-label-top">GCP Cloud Logging</text>
  <text x="1795" y="924" class="note">+ Cloud Monitoring</text>
  <text x="1795" y="942" class="note">GKE control plane · Cloud Armor</text>
  <text x="1795" y="960" class="note">Functions logs · 14d retention</text>

  <!-- Datadog SaaS -->
  <rect x="1690" y="990" width="210" height="80" rx="6" fill="#e1d5e7" stroke="#7b1fa2" stroke-width="2"/>
  <text x="1795" y="1013" class="box-label-top">Datadog SaaS</text>
  <text x="1795" y="1031" class="note">APM · Metrics · Logs</text>
  <text x="1795" y="1049" class="note">SLO Monitors (unchanged)</text>
  <text x="1795" y="1067" class="note">GCP integration plugin</text>

