<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" width="1400" height="800">
  <defs>
    <style>
      text { font-family: 'Segoe UI', Arial, sans-serif; }
      .title { font-size: 18px; font-weight: bold; fill: #1a1a1a; }
      .hdr { font-size: 13px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .attr { font-size: 11px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .cell { font-size: 11px; fill: #333333; text-anchor: middle; }
      .cell-good { font-size: 11px; fill: #1b5e20; font-weight: bold; text-anchor: middle; }
      .cell-mid { font-size: 11px; fill: #e65100; text-anchor: middle; }
      .cell-bad { font-size: 11px; fill: #b71c1c; text-anchor: middle; }
      .rec { font-size: 14px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
    </style>
  </defs>
  <rect width="1400" height="800" fill="#f5f5f5" rx="8"/>

  <!-- Title -->
  <text x="700" y="38" class="title" text-anchor="middle">HxTS Migration Scenario Comparison — Cost vs Speed vs Risk Priority</text>
  <text x="700" y="58" font-size="11" text-anchor="middle" fill="#555555" font-family="Arial">Planning horizon: 24 months | AWS baseline: $260K/yr (5 envs, us-east-1 + eu-central-1)</text>

  <!-- Column headers -->
  <rect x="50" y="75" width="250" height="60" rx="4" fill="#455a64" stroke="#263238" stroke-width="1.5"/>
  <text x="175" y="105" class="attr">Attribute</text>
  <text x="175" y="125" font-size="10" fill="#cccccc" text-anchor="middle" font-family="Arial">(5 envs | 24-month horizon)</text>

  <rect x="310" y="75" width="310" height="60" rx="4" fill="#0078D4" stroke="#004da0" stroke-width="1.5"/>
  <text x="465" y="100" class="hdr">Scenario A — Cost-First</text>
  <text x="465" y="120" font-size="10" fill="#bbdefb" text-anchor="middle" font-family="Arial">Azure Primary + GCP Warm-Standby</text>

  <rect x="630" y="75" width="310" height="60" rx="4" fill="#4a148c" stroke="#311b92" stroke-width="1.5"/>
  <text x="785" y="100" class="hdr">Scenario B — Speed-First</text>
  <text x="785" y="120" font-size="10" fill="#e1bee7" text-anchor="middle" font-family="Arial">Dual-Cloud Active (Azure + GCP)</text>

  <rect x="950" y="75" width="400" height="60" rx="4" fill="#1b5e20" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="1150" y="100" class="hdr">Scenario C — Risk-First</text>
  <text x="1150" y="120" font-size="10" fill="#c8e6c9" text-anchor="middle" font-family="Arial">GCP Primary (native auto-scale) + Azure fallback</text>

  <!-- Row heights: each row ~62px. Starting at y=145 -->
  <!-- Row 1: Timeline -->
  <rect x="50" y="145" width="250" height="62" rx="2" fill="#eceff1" stroke="#b0bec5"/>
  <text x="175" y="175" class="attr" fill="#1a1a1a">Timeline to Production</text>
  <rect x="310" y="145" width="310" height="62" rx="2" fill="#e3f2fd" stroke="#0078D4"/>
  <text x="465" y="168" class="cell-good">Azure prod: Month 12</text>
  <text x="465" y="185" class="cell-good">AWS sunset: Month 25</text>
  <rect x="630" y="145" width="310" height="62" rx="2" fill="#ede7f6" stroke="#4a148c"/>
  <text x="785" y="168" class="cell">Both clouds live: Month 9</text>
  <text x="785" y="185" class="cell-mid">50/50 traffic split ongoing</text>
  <rect x="950" y="145" width="400" height="62" rx="2" fill="#e8f5e9" stroke="#1b5e20"/>
  <text x="1150" y="168" class="cell">GCP prod: Month 12</text>
  <text x="1150" y="185" class="cell">Azure standby: Month 15</text>

  <!-- Row 2: Year 1 Cost -->
  <rect x="50" y="215" width="250" height="62" rx="2" fill="#eceff1" stroke="#b0bec5"/>
  <text x="175" y="245" class="attr" fill="#1a1a1a">Year 1 Total Cost (USD)</text>
  <text x="175" y="262" font-size="9" fill="#666666" text-anchor="middle" font-family="Arial">(parallel ops + migration)</text>
  <rect x="310" y="215" width="310" height="62" rx="2" fill="#e3f2fd" stroke="#0078D4"/>
  <text x="465" y="245" class="cell-good" font-size="13">~$415K</text>
  <text x="465" y="263" class="cell-good">AWS $260K + Azure $109K ramp + $46.5K migration</text>
  <rect x="630" y="215" width="310" height="62" rx="2" fill="#ede7f6" stroke="#4a148c"/>
  <text x="785" y="245" class="cell-bad" font-size="13">~$729K</text>
  <text x="785" y="263" class="cell-bad">AWS $260K + Azure $218K + GCP $210K + $41K migration</text>
  <rect x="950" y="215" width="400" height="62" rx="2" fill="#e8f5e9" stroke="#1b5e20"/>
  <text x="1150" y="245" class="cell-mid" font-size="13">~$503K</text>
  <text x="1150" y="263" class="cell-mid">AWS $260K + GCP $202K ramp + $41K migration</text>

  <!-- Row 3: Year 2+ Run-Rate -->
  <rect x="50" y="285" width="250" height="62" rx="2" fill="#eceff1" stroke="#b0bec5"/>
  <text x="175" y="315" class="attr" fill="#1a1a1a">Year 2+ Annual Run-Rate</text>
  <rect x="310" y="285" width="310" height="62" rx="2" fill="#c8e6c9" stroke="#0078D4" stroke-width="2"/>
  <text x="465" y="308" class="cell-good" font-size="14">$221K/yr ✅ Best ROI</text>
  <text x="465" y="327" class="cell-good">–15.1% vs AWS $260K | $39K/yr savings</text>
  <text x="465" y="344" class="cell-good">24-month payback: ~14 months</text>
  <rect x="630" y="285" width="310" height="62" rx="2" fill="#ede7f6" stroke="#4a148c"/>
  <text x="785" y="308" class="cell-bad" font-size="14">$461K/yr ❌ 77% premium</text>
  <text x="785" y="327" class="cell-bad">Dual-cloud overhead negates savings</text>
  <text x="785" y="344" class="cell-bad">Not recommended for cost-conscious orgs</text>
  <rect x="950" y="285" width="400" height="62" rx="2" fill="#e8f5e9" stroke="#1b5e20"/>
  <text x="1150" y="308" class="cell-mid" font-size="14">$273K/yr (+5% vs AWS)</text>
  <text x="1150" y="327" class="cell">GCP run-rate higher due to egress pricing</text>
  <text x="1150" y="344" class="cell">Breakeven ~36+ months</text>

  <!-- Row 4: Migration Complexity -->
  <rect x="50" y="355" width="250" height="62" rx="2" fill="#eceff1" stroke="#b0bec5"/>
  <text x="175" y="385" class="attr" fill="#1a1a1a">Migration Complexity</text>
  <rect x="310" y="355" width="310" height="62" rx="2" fill="#e3f2fd" stroke="#0078D4"/>
  <text x="465" y="378" class="cell-good">Medium</text>
  <text x="465" y="395" class="cell">Sequential workstreams | clear phases</text>
  <text x="465" y="412" class="cell">WAF ~40% rewrite (biggest challenge)</text>
  <rect x="630" y="355" width="310" height="62" rx="2" fill="#ede7f6" stroke="#4a148c"/>
  <text x="785" y="378" class="cell-bad">High</text>
  <text x="785" y="395" class="cell-bad">Parallel dual-cloud operations</text>
  <text x="785" y="412" class="cell-bad">Tooling sprawl | vendor management ×2</text>
  <rect x="950" y="355" width="400" height="62" rx="2" fill="#e8f5e9" stroke="#1b5e20"/>
  <text x="1150" y="378" class="cell-mid">Medium-High</text>
  <text x="1150" y="395" class="cell">Pub/Sub API refactor (SQS→PS delta)</text>
  <text x="1150" y="412" class="cell">visibility_timeout→ack deadline mapping</text>

  <!-- Row 5: Key Constraint -->
  <rect x="50" y="425" width="250" height="62" rx="2" fill="#eceff1" stroke="#b0bec5"/>
  <text x="175" y="455" class="attr" fill="#1a1a1a">Key Constraint</text>
  <rect x="310" y="425" width="310" height="62" rx="2" fill="#e3f2fd" stroke="#0078D4"/>
  <text x="465" y="448" class="cell-mid">Karpenter GA (AKS) target H2 2026</text>
  <text x="465" y="465" class="cell">WAF translation (L effort / H risk)</text>
  <text x="465" y="482" class="cell">Entra ID Workload Identity POC needed</text>
  <rect x="630" y="425" width="310" height="62" rx="2" fill="#ede7f6" stroke="#4a148c"/>
  <text x="785" y="448" class="cell-bad">Dual-cloud complexity budget</text>
  <text x="785" y="465" class="cell-bad">2× security review surface</text>
  <text x="785" y="482" class="cell-bad">2× SRE oncall tooling</text>
  <rect x="950" y="425" width="400" height="62" rx="2" fill="#e8f5e9" stroke="#1b5e20"/>
  <text x="1150" y="448" class="cell">GCP Pub/Sub API refactor (+3 sprints est.)</text>
  <text x="1150" y="465" class="cell">EFS→Filestore NFS v3 (no v4.1)</text>
  <text x="1150" y="482" class="cell">KMS rotation cadence SOC2 validation</text>

  <!-- Row 6: Autoscaling Risk -->
  <rect x="50" y="495" width="250" height="62" rx="2" fill="#eceff1" stroke="#b0bec5"/>
  <text x="175" y="525" class="attr" fill="#1a1a1a">Karpenter / Autoscaling</text>
  <rect x="310" y="495" width="310" height="62" rx="2" fill="#e3f2fd" stroke="#0078D4"/>
  <text x="465" y="515" class="cell-mid">⚠ VMSS interim until GA H2 2026</text>
  <text x="465" y="532" class="cell">Manual node pool sizing needed</text>
  <text x="465" y="549" class="cell">Monitor AKS 1.34+ Karpenter preview</text>
  <rect x="630" y="495" width="310" height="62" rx="2" fill="#ede7f6" stroke="#4a148c"/>
  <text x="785" y="515" class="cell-mid">Same VMSS interim for Azure workloads</text>
  <text x="785" y="532" class="cell">GKE side uses native autoscaler (no risk)</text>
  <rect x="950" y="495" width="400" height="62" rx="2" fill="#c8e6c9" stroke="#1b5e20" stroke-width="2"/>
  <text x="1150" y="515" class="cell-good">✅ GKE Native Cluster Autoscaler</text>
  <text x="1150" y="532" class="cell-good">No Karpenter dependency — immediate</text>
  <text x="1150" y="549" class="cell-good">Best autoscaling option (risk eliminates)</text>

  <!-- Row 7: Recommendation -->
  <rect x="50" y="565" width="250" height="62" rx="2" fill="#455a64" stroke="#263238"/>
  <text x="175" y="595" class="attr">Recommendation</text>
  <rect x="310" y="565" width="310" height="62" rx="2" fill="#0078D4" stroke="#004da0"/>
  <text x="465" y="588" class="hdr" font-size="14">✅ RECOMMENDED</text>
  <text x="465" y="605" class="hdr" font-size="11">Best ROI | Clear 24-month path</text>
  <text x="465" y="622" class="hdr" font-size="11">–15.1% run-rate | payback ~14 months</text>
  <rect x="630" y="565" width="310" height="62" rx="2" fill="#4a148c" stroke="#311b92"/>
  <text x="785" y="588" class="hdr" font-size="14">❌ NOT RECOMMENDED</text>
  <text x="785" y="605" class="hdr" font-size="11">Cost premium negates speed benefit</text>
  <text x="785" y="622" class="hdr" font-size="11">Use only for partial pilot validation</text>
  <rect x="950" y="565" width="400" height="62" rx="2" fill="#1b5e20" stroke="#2e7d32"/>
  <text x="1150" y="588" class="hdr" font-size="14">⚠ CONDITIONAL</text>
  <text x="1150" y="605" class="hdr" font-size="11">Consider if Pub/Sub refactor cost &lt; $30K</text>
  <text x="1150" y="622" class="hdr" font-size="11">Preferred if GCP-first strategy mandated</text>

  <!-- Note bar -->
  <rect x="50" y="645" width="1300" height="55" rx="6" fill="#fff9c4" stroke="#f9a825" stroke-width="1.5"/>
  <text x="700" y="668" font-size="12" font-weight="bold" text-anchor="middle" fill="#1a1a1a" font-family="Arial">Cost Notes (USD, directional): AWS baseline $260,484/yr | Azure $221,064/yr | GCP $273,000/yr | AU region estimated (not in current footprint)</text>
  <text x="700" y="687" font-size="10" text-anchor="middle" fill="#555555" font-family="Arial">All figures are directional estimates based on public list pricing. Not contract quotes. EFS→Azure Files/Filestore is a new critical finding impacting all scenarios.</text>

  <!-- Note bottom bar -->
  <rect x="50" y="718" width="1300" height="40" rx="4" fill="#263238"/>
  <text x="700" y="744" font-size="11" text-anchor="middle" fill="#ffffff" font-family="Arial">Scenario A recommended: Azure Primary migration with 30/60/90 phased plan | 5 envs migrated phasewise | AWS sunset at Month 25 | Karpenter GA unblocks full automation H2 2026</text>
</svg>
