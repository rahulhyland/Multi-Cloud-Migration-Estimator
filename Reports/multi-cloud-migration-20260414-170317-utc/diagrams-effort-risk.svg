<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-label="Effort vs Risk bubble chart for migration capabilities">
  <defs>
    <style>
      .bg{fill:#0d1726}.T{font-family:'IBM Plex Sans','Segoe UI',sans-serif;fill:#ddf0ff;paint-order:stroke;stroke:#060f1e;stroke-width:0.8px}
      .axis{stroke:#3a5a80;stroke-width:1.5}.grid{stroke:#1f3254;stroke-width:1}
      .label{font-size:12px}.title{font-size:20px;font-weight:700}
      .bub{opacity:0.88;filter:url(#glow)}
    </style>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="700"/>
  <text class="T title" x="600" y="44" text-anchor="middle">Migration Effort vs Risk — Capability Bubble Chart</text>

  <!-- Axes -->
  <line class="axis" x1="100" y1="80" x2="100" y2="600"/>
  <line class="axis" x1="100" y1="600" x2="1000" y2="600"/>

  <!-- X axis labels (Effort) -->
  <text class="T label" x="300" y="630" text-anchor="middle" fill="#a8d8ff">S (Small)</text>
  <text class="T label" x="550" y="630" text-anchor="middle" fill="#a8d8ff">M (Medium)</text>
  <text class="T label" x="800" y="630" text-anchor="middle" fill="#a8d8ff">L (Large)</text>
  <text class="T label" x="550" y="658" text-anchor="middle" fill="#6a9abf">Effort →</text>

  <!-- Y axis labels (Risk) -->
  <text class="T label" x="90" y="535" text-anchor="end" fill="#a8d8ff">L</text>
  <text class="T label" x="90" y="380" text-anchor="end" fill="#a8d8ff">M</text>
  <text class="T label" x="90" y="215" text-anchor="end" fill="#a8d8ff">H</text>
  <text class="T label" x="40" y="390" text-anchor="middle" transform="rotate(-90,40,390)" fill="#6a9abf">Risk →</text>

  <!-- Grid -->
  <line class="grid" x1="100" y1="520" x2="1000" y2="520"/>
  <line class="grid" x1="100" y1="360" x2="1000" y2="360"/>
  <line class="grid" x1="100" y1="200" x2="1000" y2="200"/>
  <line class="grid" x1="300" y1="80" x2="300" y2="600"/>
  <line class="grid" x1="550" y1="80" x2="550" y2="600"/>
  <line class="grid" x1="800" y1="80" x2="800" y2="600"/>

  <!-- Bubbles — (effort S=300, M=550, L=800) x (risk L=520, M=360, H=200) -->
  <!-- Compute: L effort, H risk — big bubble (#ff6b8a) -->
  <circle class="bub" cx="800" cy="200" r="54" fill="#ff6b8a" stroke="#ff9fb6" stroke-width="2"/>
  <text class="T label" x="800" y="196" text-anchor="middle">Compute</text>
  <text class="T" x="800" y="212" text-anchor="middle" font-size="11">(EKS→AKS/GKE)</text>

  <!-- Messaging: M effort, M risk -->
  <circle class="bub" cx="550" cy="360" r="44" fill="#33c3ff" stroke="#7de8ff" stroke-width="2"/>
  <text class="T label" x="550" y="356" text-anchor="middle">Messaging</text>
  <text class="T" x="550" y="370" text-anchor="middle" font-size="11">(SQS/SNS→SB/PS)</text>

  <!-- Data/Storage: L effort, H risk -->
  <circle class="bub" cx="800" cy="240" r="40" fill="#ffd166" stroke="#ffe599" stroke-width="2"/>
  <text class="T label" x="940" y="244" text-anchor="middle" fill="#ffd166">Data/Storage</text>

  <!-- Identity/Security: M effort, M risk -->
  <circle class="bub" cx="550" cy="400" r="36" fill="#ff9ad8" stroke="#ffbde8" stroke-width="2"/>
  <text class="T label" x="700" y="404" text-anchor="middle" fill="#ff9ad8">Identity/Sec</text>

  <!-- Networking: M effort, L risk -->
  <circle class="bub" cx="550" cy="520" r="32" fill="#7dff9f" stroke="#aaffbf" stroke-width="2"/>
  <text class="T label" x="550" y="516" text-anchor="middle" fill="#080f1a">Networking</text>
  <text class="T" x="550" y="530" text-anchor="middle" font-size="11" fill="#040b12">(VPC→VNet/VPC)</text>

  <!-- Observability: S effort, L risk -->
  <circle class="bub" cx="300" cy="520" r="28" fill="#b39dff" stroke="#d0c0ff" stroke-width="2"/>
  <text class="T label" x="300" y="516" text-anchor="middle">Observ.</text>
  <text class="T" x="300" y="530" text-anchor="middle" font-size="11">(CW+DD)</text>

  <!-- Legend note -->
  <text class="T" x="600" y="684" text-anchor="middle" font-size="11" fill="#6a9abf">Bubble size represents relative data migration volume. Confidence: Medium.</text>
</svg>
