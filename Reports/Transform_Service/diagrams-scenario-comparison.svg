<?xml version="1.0" encoding="UTF-8"?><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600"><rect width="1200" height="600" fill="#0f1929"/><text x="600" y="38" text-anchor="middle" font-size="17" fill="#90CAF9" font-weight="bold">Migration Decision Scenarios</text><rect x="28" y="58" width="364" height="524" rx="12" fill="#0a1a2e" stroke="#34A853" stroke-width="2"/><rect x="28" y="58" width="364" height="46" rx="10" fill="#34A853" opacity="0.22"/><text x="210" y="88" text-anchor="middle" font-size="15" fill="#34A853" font-weight="bold">Cost-First</text><text x="210" y="138" text-anchor="middle" font-size="24" fill="#34A853" font-weight="bold">GCP</text><rect x="38" y="166" width="344" height="42" rx="6" fill="#111d2e"/><text x="46" y="180" font-size="10" fill="#78909C">Timeline</text><text x="46" y="196" font-size="12" fill="#E0E0E0">12–18 months</text><rect x="38" y="218" width="344" height="42" rx="6" fill="#111d2e"/><text x="46" y="232" font-size="10" fill="#78909C">Cost Delta (US 30d)</text><text x="46" y="248" font-size="12" fill="#E0E0E0">-2.6% vs AWS</text><rect x="38" y="270" width="344" height="42" rx="6" fill="#111d2e"/><text x="46" y="284" font-size="10" fill="#78909C">Risk Level</text><text x="46" y="300" font-size="12" fill="#E0E0E0">Medium</text><text x="38" y="330" font-size="10" fill="#78909C">Rationale</text><text x="38" y="345" font-size="10" fill="#B0BEC5">Lowest modeled 30-day run-rate. GKE + Pub/Sub +</text><text x="38" y="358" font-size="10" fill="#B0BEC5">Filestore map closely to current EKS + SQS + EFS</text><text x="38" y="371" font-size="10" fill="#B0BEC5">stack. KEDA Pub/Sub scaler provides</text><text x="38" y="384" font-size="10" fill="#B0BEC5">near-identical autoscaling semantics.</text><rect x="408" y="58" width="364" height="524" rx="12" fill="#0a1a2e" stroke="#0078D4" stroke-width="2"/><rect x="408" y="58" width="364" height="46" rx="10" fill="#0078D4" opacity="0.22"/><text x="590" y="88" text-anchor="middle" font-size="15" fill="#0078D4" font-weight="bold">Speed-First</text><text x="590" y="138" text-anchor="middle" font-size="24" fill="#0078D4" font-weight="bold">Azure</text><rect x="418" y="166" width="344" height="42" rx="6" fill="#111d2e"/><text x="426" y="180" font-size="10" fill="#78909C">Timeline</text><text x="426" y="196" font-size="12" fill="#E0E0E0">8–12 months</text><rect x="418" y="218" width="344" height="42" rx="6" fill="#111d2e"/><text x="426" y="232" font-size="10" fill="#78909C">Cost Delta (US 30d)</text><text x="426" y="248" font-size="12" fill="#E0E0E0">+6.1% vs AWS</text><rect x="418" y="270" width="344" height="42" rx="6" fill="#111d2e"/><text x="426" y="284" font-size="10" fill="#78909C">Risk Level</text><text x="426" y="300" font-size="12" fill="#E0E0E0">Medium</text><text x="418" y="330" font-size="10" fill="#78909C">Rationale</text><text x="418" y="345" font-size="10" fill="#B0BEC5">AKS + Azure enterprise platform tooling and</text><text x="418" y="358" font-size="10" fill="#B0BEC5">Entra ID reduce org integration time. Strong</text><text x="418" y="371" font-size="10" fill="#B0BEC5">partner ecosystem for SOC 2 accelerators.</text><text x="418" y="384" font-size="10" fill="#B0BEC5">Familiar RBAC model for enterprise teams.</text><rect x="788" y="58" width="364" height="524" rx="12" fill="#0a1a2e" stroke="#AB47BC" stroke-width="2"/><rect x="788" y="58" width="364" height="46" rx="10" fill="#AB47BC" opacity="0.22"/><text x="970" y="88" text-anchor="middle" font-size="15" fill="#AB47BC" font-weight="bold">Risk-First</text><text x="970" y="138" text-anchor="middle" font-size="24" fill="#AB47BC" font-weight="bold">Staged / Dual</text><rect x="798" y="166" width="344" height="42" rx="6" fill="#111d2e"/><text x="806" y="180" font-size="10" fill="#78909C">Timeline</text><text x="806" y="196" font-size="12" fill="#E0E0E0">18–24 months</text><rect x="798" y="218" width="344" height="42" rx="6" fill="#111d2e"/><text x="806" y="232" font-size="10" fill="#78909C">Cost Delta (US 30d)</text><text x="806" y="248" font-size="12" fill="#E0E0E0">TBD at gate</text><rect x="798" y="270" width="344" height="42" rx="6" fill="#111d2e"/><text x="806" y="284" font-size="10" fill="#78909C">Risk Level</text><text x="806" y="300" font-size="12" fill="#E0E0E0">Low</text><text x="798" y="330" font-size="10" fill="#78909C">Rationale</text><text x="798" y="345" font-size="10" fill="#B0BEC5">Pilot GCP first, retain Azure as validated</text><text x="798" y="358" font-size="10" fill="#B0BEC5">fallback. Lock primary cloud only after</text><text x="798" y="371" font-size="10" fill="#B0BEC5">phase-gate criteria—latency, cost, and</text><text x="798" y="384" font-size="10" fill="#B0BEC5">compliance—are met. Avoids lock-in risk during</text><text x="798" y="397" font-size="10" fill="#B0BEC5">transformation.</text></svg>