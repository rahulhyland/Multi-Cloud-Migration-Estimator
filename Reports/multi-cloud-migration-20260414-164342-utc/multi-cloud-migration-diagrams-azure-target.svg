<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980" role="img" aria-label="Azure target architecture diagram">
  <defs>
    <style>
      .bg { fill: #0b1322; }
      .panel { fill: #13213a; stroke: #46d1ff; stroke-width: 2; rx: 10; }
      .node { fill: #1f2f4d; stroke: #8fe2ff; stroke-width: 1.8; rx: 8; }
      .sec { fill: #2f2245; stroke: #ff9ad8; stroke-width: 1.8; rx: 8; }
      .msg { fill: #1f3a2d; stroke: #87ffae; stroke-width: 1.8; rx: 8; }
      .txt { font-family: 'IBM Plex Sans', 'Segoe UI', sans-serif; font-size: 14px; fill: #f5fbff; paint-order: stroke; stroke: #071224; stroke-width: 1px; }
      .small { font-size: 12px; }
      .title { font-size: 20px; font-weight: 700; }
      .a { stroke: #5ee7ff; stroke-width: 3; fill: none; marker-end: url(#m1); }
      .b { stroke: #ff9ad8; stroke-width: 3; fill: none; marker-end: url(#m2); }
      .c { stroke: #9fffb9; stroke-width: 3; fill: none; marker-end: url(#m3); }
    </style>
    <marker id="m1" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#5ee7ff"/></marker>
    <marker id="m2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#ff9ad8"/></marker>
    <marker id="m3" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><polygon points="0,0 10,4 0,8" fill="#9fffb9"/></marker>
  </defs>
  <rect class="bg" x="0" y="0" width="1500" height="980"/>
